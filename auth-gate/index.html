<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修仙应用集 · 灵脉认证</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06060f;
  --card: rgba(12,12,28,0.95);
  --cyan: #08f7fe;
  --purple: #a855f7;
  --pink: #ff2e63;
  --gold: #ffd700;
  --green: #00ff88;
  --dim: #667;
  --text: #e8e8f0;
  --border: rgba(255,255,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* Background Canvas */
canvas#bgCanvas{position:fixed;inset:0;z-index:0}

/* Main Container */
.gate{position:relative;z-index:10;width:min(420px,92vw);display:flex;flex-direction:column;align-items:center;gap:24px}

/* Logo */
.logo{text-align:center}
.logo-icon{font-size:64px;filter:drop-shadow(0 0 30px rgba(8,247,254,0.4));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo-title{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;margin-top:8px}
.logo-sub{font-size:12px;color:var(--dim);letter-spacing:2px;margin-top:4px}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.card-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:20px;color:var(--cyan)}

/* Tabs */
.tabs{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);margin-bottom:20px}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;background:rgba(0,0,0,0.3);color:var(--dim);transition:.3s;letter-spacing:1px}
.tab.active{background:rgba(8,247,254,0.08);color:var(--cyan);border-bottom:2px solid var(--cyan)}

/* Inputs */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase}
.field input{width:100%;padding:12px 14px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:14px;outline:none;transition:.3s}
.field input:focus{border-color:var(--cyan);box-shadow:0 0 15px rgba(8,247,254,0.15)}

/* Buttons */
.btn-primary{width:100%;padding:14px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .3s;margin-top:8px}
.btn-login{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#000}
.btn-register{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.4)}
.btn-primary:active{transform:translateY(0)}

.btn-skip{width:100%;padding:12px;border:1px solid rgba(255,255,255,0.1);border-radius:10px;background:transparent;color:var(--dim);font-size:12px;cursor:pointer;transition:.3s;margin-top:8px}
.btn-skip:hover{border-color:var(--dim);color:var(--text)}

/* Error */
.error{color:var(--pink);font-size:12px;text-align:center;min-height:18px;margin-top:8px}
.success{color:var(--green);font-size:12px;text-align:center;min-height:18px;margin-top:8px}

/* Key Input Panel (for registered users) */
.key-panel{display:none}
.key-panel.show{display:block}
.key-info{font-size:11px;color:var(--dim);line-height:1.6;margin-bottom:12px;padding:12px;background:rgba(168,85,247,0.05);border-radius:8px;border-left:3px solid var(--purple)}
.key-info strong{color:var(--gold)}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:16px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:10px;color:var(--dim);letter-spacing:2px}

/* Version badge */
.version{position:fixed;bottom:12px;right:16px;font-size:10px;color:rgba(255,255,255,0.15);z-index:100}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="gate">
  <div class="logo">
    <div class="logo-icon">🏯</div>
    <div class="logo-title">北大考研 · 修仙应用集</div>
    <div class="logo-sub">灵脉认证 · GATE PROTOCOL</div>
  </div>

  <!-- Login / Register Card -->
  <div class="card" id="authCard">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">登入修行</div>
      <div class="tab" onclick="switchTab('register')">注册道号</div>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="field">
        <label>道号 · USERNAME</label>
        <input type="text" id="loginUser" placeholder="输入道号" autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label>口令 · PASSWORD</label>
        <input type="password" id="loginPass" placeholder="输入口令" autocomplete="current-password">
      </div>
      <button class="btn-primary btn-login" onclick="doLogin()">⚡ 进入修仙界</button>
      <div class="error" id="loginErr"></div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none">
      <div class="field">
        <label>道号 · USERNAME (≥3位)</label>
        <input type="text" id="regUser" placeholder="起一个道号" autocomplete="off">
      </div>
      <div class="field">
        <label>口令 · PASSWORD (≥4位)</label>
        <input type="password" id="regPass" placeholder="设置口令" autocomplete="new-password">
      </div>
      <div class="field">
        <label>确认口令</label>
        <input type="password" id="regPass2" placeholder="再输一次口令" autocomplete="new-password">
      </div>
      <button class="btn-primary btn-register" onclick="doRegister()">📜 注册道号</button>
      <div class="error" id="regErr"></div>
      <div class="success" id="regOk"></div>
    </div>

    <div class="divider"><span>或</span></div>
    <button class="btn-skip" onclick="doSkip()">👻 游客模式 · 跳过登录（纯本地知识库）</button>
  </div>

  <!-- Key Input Card (appears after normal user login) -->
  <div class="card key-panel" id="keyCard">
    <div class="card-title">🔑 智能体钥匙注入</div>
    <div class="key-info">
      你已登入修仙界，但当前无AI钥匙。<br>
      <strong>选项1:</strong> 购买二手钥匙 → 联系管理员获取专属API Key<br>
      <strong>选项2:</strong> 跳过 → 使用本地知识库（无AI功能但可正常答题）
    </div>
    <div class="field">
      <label>二手钥匙 · API KEY</label>
      <input type="password" id="keyInput" placeholder="sk-xxxxxxxx (购买后粘贴此处)" autocomplete="off">
    </div>
    <button class="btn-primary btn-login" onclick="doActivateKey()">🔑 激活钥匙</button>
    <button class="btn-skip" onclick="doSkipKey()" style="margin-top:8px">⏭ 跳过 · 走本地知识库</button>
    <div class="error" id="keyErr"></div>
  </div>
</div>

<div class="version">PKUSDK v8.0 · GATE</div>

<script src="../shared/pku-core-sdk.js"></script>
<script>
// ─── Background Animation ───
(function(){
  const c=document.getElementById('bgCanvas'),ctx=c.getContext('2d');
  let W,H;
  const particles=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  addEventListener('resize',resize);resize();
  for(let i=0;i<80;i++)particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+.5,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.5+.1});
  (function draw(){
    ctx.fillStyle='rgba(6,6,15,0.15)';ctx.fillRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.fillStyle=`rgba(8,247,254,${p.o})`;ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    });
    // Connection lines
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){
          ctx.strokeStyle=`rgba(168,85,247,${0.08*(1-dist/120)})`;ctx.lineWidth=.5;
          ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  })();
})();

// ─── Auth Logic ───
const redirect = new URLSearchParams(window.location.search).get('redirect') || '../index.html';

// If already logged in as superuser, redirect immediately
if (PKUSDK.Auth.isSuperUser()) {
  window.location.href = redirect;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active', (tab==='login'?i===0:i===1))});
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
  document.getElementById('loginErr').textContent='';
  document.getElementById('regErr').textContent='';
  document.getElementById('regOk').textContent='';
}

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if(!user||!pass){errEl.textContent='请输入道号和口令';return}

  // Try superuser first
  if (PKUSDK.Auth.login(user, pass)) {
    // Superuser — skip key panel, go directly
    window.location.href = redirect;
    return;
  }

  // Try normal user
  if (PKUSDK.Auth.loginNormal(user, pass)) {
    // Normal user — show key panel
    document.getElementById('authCard').style.display = 'none';
    document.getElementById('keyCard').classList.add('show');
    return;
  }

  errEl.textContent = '❌ 道号或口令错误';
}

function doRegister() {
  const user = document.getElementById('regUser').value.trim();
  const pass = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;
  const errEl = document.getElementById('regErr');
  const okEl = document.getElementById('regOk');
  errEl.textContent='';okEl.textContent='';
  if(!user||!pass){errEl.textContent='请填写完整';return}
  if(pass!==pass2){errEl.textContent='两次口令不一致';return}

  const result = PKUSDK.Auth.register(user, pass);
  if(!result.ok){errEl.textContent='❌ '+result.msg;return}

  okEl.textContent='✅ 注册成功！正在登入...';
  setTimeout(()=>{
    PKUSDK.Auth.loginNormal(user, pass);
    document.getElementById('authCard').style.display='none';
    document.getElementById('keyCard').classList.add('show');
  }, 800);
}

function doActivateKey() {
  const key = document.getElementById('keyInput').value.trim();
  const errEl = document.getElementById('keyErr');
  if(!key){errEl.textContent='请输入二手钥匙';return}
  PKUSDK.Auth.setSecondhandKey(key);
  window.location.href = redirect;
}

function doSkipKey() {
  window.location.href = redirect;
}

function doSkip() {
  window.location.href = redirect;
}

// Enter key support
document.getElementById('loginPass').addEventListener('keydown', e=>{if(e.key==='Enter')doLogin()});
document.getElementById('regPass2').addEventListener('keydown', e=>{if(e.key==='Enter')doRegister()});
document.getElementById('keyInput').addEventListener('keydown', e=>{if(e.key==='Enter')doActivateKey()});
</script>
</body>
</html>
