<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>刺激战场 · 选择题速杀 — 北大考研修仙应用集</title>
  <meta name="description" content="第一人称吃鸡答题 — 跳伞空降·遭遇战·答题击杀·毒圈逼近·吃鸡">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@400;600;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ═══ 地图选择 ═══ -->
    <section id="mapScreen" class="screen">
      <div class="map-header">
        <a href="../index.html" class="back-btn">🏠</a>
        <h1 class="map-title">⚔️ 刺激战场</h1>
        <div class="map-sub">选择题速杀 · 第一人称吃鸡</div>
      </div>
      <div class="map-list" id="mapList">
        <button class="map-card" data-map="politics" id="mapPolitics">
          <div class="mc-bg mc-desert"></div>
          <div class="mc-overlay">
            <div class="mc-icon">🏜️</div>
            <div class="mc-name">政治沙漠</div>
            <div class="mc-badge">101政治 · 16题单选</div>
            <div class="mc-info">1分/题 · 真实卷面 · 毒圈5分钟</div>
          </div>
        </button>
        <button class="map-card" data-map="english" id="mapEnglish">
          <div class="mc-bg mc-snow"></div>
          <div class="mc-overlay">
            <div class="mc-icon">❄️</div>
            <div class="mc-name">极寒冰原</div>
            <div class="mc-badge">201英语 · 20题阅读选择</div>
            <div class="mc-info">2分/题 · 阅读理解 · 毒圈4分钟</div>
          </div>
        </button>
        <button class="map-card" data-map="math" id="mapMath">
          <div class="mc-bg mc-jungle"></div>
          <div class="mc-overlay">
            <div class="mc-icon">🌴</div>
            <div class="mc-name">数学雨林</div>
            <div class="mc-badge">301数学 · 10题高阶选择</div>
            <div class="mc-info">5分/题 · 高分值 · 毒圈5分钟</div>
          </div>
        </button>
        <button class="map-card" data-map="cs" id="mapCS">
          <div class="mc-bg mc-city"></div>
          <div class="mc-overlay">
            <div class="mc-icon">🏙️</div>
            <div class="mc-name">赛博都市</div>
            <div class="mc-badge">408计算机 · 40题单选</div>
            <div class="mc-info">2分/题 · 题量最大 · 毒圈6分钟</div>
          </div>
        </button>
      </div>
      <button class="start-btn" id="btnJump" disabled>🪂 跳伞开战</button>
      <button class="start-btn" style="background:linear-gradient(135deg,#08f7fe,#9d4edd);margin-top:6px;font-size:12px;padding:8px 24px;border:none;border-radius:8px;color:#fff;cursor:pointer;letter-spacing:1px" onclick="PKUAutoFetch.showModal()">📡 注入卡密 · 抓取最新压卷题</button>
    </section>

    <!-- ═══ 跳伞 ═══ -->
    <section id="paraScreen" class="screen hidden">
      <div class="para-bg" id="paraBg"></div>
      <div class="para-overlay">
        <div class="para-hud">
          <span class="para-map-name" id="paraMapName">政治沙漠 · 空降中...</span>
          <span class="para-alive" id="paraAlive">存活 100/100</span>
        </div>
        <div class="para-center">
          <div class="para-chute">🪂</div>
          <div class="para-instruction">选择降落区域</div>
        </div>
        <div class="para-zones">
          <button class="zone-btn zone-hot" onclick="BG.selectZone('hot')">
            <span class="zone-icon">🔥</span>
            <span class="zone-name">热区</span>
            <span class="zone-desc">假人密集 · 高combo</span>
          </button>
          <button class="zone-btn zone-normal" onclick="BG.selectZone('normal')">
            <span class="zone-icon">⚡</span>
            <span class="zone-name">普通区</span>
            <span class="zone-desc">节奏适中 · 稳扎稳打</span>
          </button>
          <button class="zone-btn zone-safe" onclick="BG.selectZone('safe')">
            <span class="zone-icon">🛡️</span>
            <span class="zone-name">安全区</span>
            <span class="zone-desc">假人稀疏 · 新手友好</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ═══ 战斗主界面 ═══ -->
    <section id="battleScreen" class="screen hidden">
      <!-- 战场滚动背景(3D透视) -->
      <div class="battle-bg" id="battleBg"></div>
      <div class="battle-perspective">
        <div class="battle-terrain" id="battleTerrain"></div>
      </div>

      <!-- 冲刺光速线 -->
      <div class="speed-lines hidden" id="speedLines"></div>

      <!-- 毒圈电网墙 -->
      <div class="blue-zone-wall" id="blueZoneWall"></div>

      <!-- 第一人称武器 -->
      <div class="fps-weapon" id="fpsWeapon">🔫</div>

      <!-- 毒圈边缘效果 -->
      <div class="poison-edge" id="poisonEdge"></div>

      <!-- 红色受伤闪烁 -->
      <div class="dmg-flash" id="dmgFlash"></div>

      <!-- 草丛伪装网 -->
      <div class="bush-overlay hidden" id="bushOverlay"></div>

      <!-- 击杀播报(左上) -->
      <div class="kill-feed" id="killFeed"></div>

      <!-- 顶部 HUD -->
      <div class="hud-top">
        <div class="hud-hp">
          <span class="hp-icon">❤️</span>
          <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
          <span class="hp-text" id="hpText">100%</span>
        </div>
        <div class="hud-alive" id="hudAlive">🟢 存活 100</div>
        <div class="hud-timer" id="hudTimer">⏱ 03:00</div>
        <div class="hud-score">
          <span class="score-val" id="scoreVal">0</span>分
          <span class="kill-count" id="killCount">💀 0/<span id="killTotal">16</span></span>
        </div>
      </div>

      <!-- 右上毒圈小地图 -->
      <div class="minimap-wrap" id="minimapWrap">
        <canvas id="minimap" width="100" height="100"></canvas>
        <div class="minimap-label" id="minimapLabel">毒圈 3:00</div>
      </div>

      <!-- 毒圈警告 -->
      <div class="poison-warn hidden" id="poisonWarn">⚠️ 毒圈外！持续掉血！</div>

      <!-- 连杀提示 -->
      <div class="combo-display hidden" id="comboDisplay">
        <div class="combo-text" id="comboText">🔥 三连杀!</div>
      </div>

      <!-- 奔跑搜索覆层(两题之间) -->
      <div class="run-overlay hidden" id="runOverlay">
        <div class="run-text" id="runText">🏃 搜索中...</div>
        <div class="run-footstep" id="runFootstep">👣</div>
      </div>

      <!-- 第一人称准星 -->
      <div class="crosshair" id="crosshair">
        <div class="ch-dot"></div>
        <div class="ch-h"></div><div class="ch-h ch-r"></div>
        <div class="ch-v"></div><div class="ch-v ch-b"></div>
      </div>

      <!-- 假人敌人(从远处跑来) -->
      <div class="enemy-wrap" id="enemyWrap">
        <div class="enemy-body" id="enemyBody">
          <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemyHpFill"></div></div>
          <div class="enemy-name" id="enemyName">假人兵 · Lv.1</div>
          <img class="enemy-figure" id="enemyFigure" src="peace_elite_enemy_1775748004305.png" alt="enemy">
        </div>
      </div>

      <!-- ⚠ 发现敌人! 弹窗 -->
      <div class="encounter-alert hidden" id="encounterAlert">
        <span>⚠ 发现敌人!</span>
      </div>

      <!-- 题卡 -->
      <div class="question-card hidden" id="questionCard">
        <div class="q-header">
          <span class="q-num" id="qNum">#1</span>
          <span class="q-kp" id="qKp"></span>
        </div>
        <div class="q-stem" id="qStem">加载题目中...</div>
        <div class="q-options" id="qOptions"></div>
      </div>

      <!-- 分数飞字 -->
      <div class="float-score hidden" id="floatScore">+1</div>

      <!-- 搜刮尸体 -->
      <div class="loot-popup hidden" id="lootPopup">
        <div class="loot-title">🎒 搜刮战利品</div>
        <div class="loot-item" id="lootItem">💊 +5HP</div>
      </div>

      <!-- 左下角控制轮盘 -->
      <div class="joystick-zone" id="joystickZone">
        <div class="joystick-base hidden" id="joystickBase">
          <div class="joystick-knob" id="joystickKnob"></div>
        </div>
      </div>

      <!-- 底部操作 -->
      <div class="hud-bottom" id="hudBottom">
        <!-- 战术左区：武器信息 -->
        <div class="weapon-display" id="weaponDisplay">
          <span class="weapon-icon">🔫</span>
          <div class="wd-col">
            <span class="weapon-name" id="weaponName">M416</span>
            <span class="weapon-ammo" id="weaponAmmo">30/90</span>
          </div>
        </div>

        <div class="airdrop-notify hidden" id="airdropNotify" onclick="BG.openAirdrop()">
          📦 <span id="airdropText">空投物资</span>
        </div>

        <!-- 战术中区：开火与回血 -->
        <div class="action-btns">
          <button class="fire-btn alt-fire" id="bandageBtn" disabled onclick="BG.fire(true)">🩹 缠绷带</button>
          <button class="fire-btn main-fire" id="fireBtn" disabled onclick="BG.fire(false)">🎯 开火</button>
        </div>

        <!-- 战术右区：功能道具 -->
        <div class="tactical-bar">
          <button class="tac-btn" id="drinkBtn" onclick="BG.useDrink()">🧃<span class="tac-badge" id="drinkCount">2</span></button>
          <button class="tac-btn" id="proneBtn" onclick="BG.useProne()">🙇<span class="tac-badge" id="proneCount">3</span></button>
          <button class="tac-btn" id="hintBtn" onclick="BG.useHint()">💡<span class="tac-badge" id="hintCount">3</span></button>
        </div>
      </div>
    </section>

    <!-- ═══ 空投开箱 ═══ -->
    <section id="airdropScreen" class="screen hidden">
      <div class="ad-overlay">
        <div class="ad-crate">📦</div>
        <h2 class="ad-title">空投物资！</h2>
        <div class="ad-items" id="adItems"></div>
        <button class="ad-skip" onclick="BG.closeAirdrop()">继续战斗 →</button>
      </div>
    </section>

    <!-- ═══ 结算 ═══ -->
    <section id="resultScreen" class="screen hidden">
      <div class="result-card">
        <div class="result-icon" id="resultIcon">🏆</div>
        <h1 class="result-title" id="resultTitle">大吉大利！今晚吃鸡！</h1>
        <div class="result-rank" id="resultRank">#1</div>
        <div class="result-grid">
          <div class="rg"><span class="rg-l">击杀</span><span class="rg-v" id="rKills">0/0</span></div>
          <div class="rg"><span class="rg-l">得分</span><span class="rg-v" id="rScore">0</span></div>
          <div class="rg"><span class="rg-l">最高连杀</span><span class="rg-v" id="rCombo">0</span></div>
          <div class="rg"><span class="rg-l">用时</span><span class="rg-v" id="rTime">0:00</span></div>
          <div class="rg"><span class="rg-l">剩余血量</span><span class="rg-v" id="rHp">0%</span></div>
          <div class="rg"><span class="rg-l">灵气</span><span class="rg-v" id="rQi">+0</span></div>
        </div>
        <div class="result-btns">
          <button class="fire-btn" onclick="BG.restart()">🔄 再来一局</button>
          <button class="hint-btn" onclick="BG.backToMap()">🏠 返回</button>
        </div>
      </div>
    </section>

  </div>

  <!-- 题库文件(500题/科) — 必须在 bg-data.js 之前加载 -->
  <script src="questions/cs.js"></script>
  <script src="questions/politics.js"></script>
  <script src="questions/math.js"></script>
  <script src="questions/english.js"></script>
  <!-- 数据层 + 引擎 + 主控 -->
  <script src="bg-data.js"></script>
  <script src="bg-engine.js"></script>
  <script src="bg-app.js"></script>
</body>
</html>
