<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>🔴 政治频道 · 101 · 抖音顾枢版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ═══ 全局 ═══ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#e84040;--gold:#ffd700;--dark:#0a0508;
  --card-bg:rgba(30,8,8,.95);--text:#f0e0e0;--sub:#886677;
  --border:rgba(232,64,64,.2);
}
html,body{height:100%;overflow:hidden;background:var(--dark);font-family:'Noto Sans SC',sans-serif}

/* ═══ 背景 ═══ */
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(232,64,64,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(232,64,64,.04) 1px,transparent 1px);
  background-size:40px 40px;
  animation:gridMove 20s linear infinite;z-index:0
}
@keyframes gridMove{to{background-position:40px 40px}}

.vignette{
  position:fixed;inset:0;z-index:1;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(10,5,8,.7) 100%)
}

/* ═══ 顶部栏 ═══ */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,5,8,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border)
}
.top-logo{font-family:'Orbitron';font-size:12px;color:var(--red);letter-spacing:3px}
.top-meta{font-size:11px;color:var(--sub);font-family:monospace}
.top-actions{display:flex;gap:8px}
.btn-small{
  padding:4px 10px;border:1px solid var(--border);background:transparent;
  color:var(--sub);font-size:11px;cursor:pointer;border-radius:4px;
  font-family:'Orbitron';letter-spacing:1px;transition:.2s
}
.btn-small:hover{border-color:var(--red);color:var(--red)}

/* ═══ 卡片轮播容器 ═══ */
.feed{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  overflow:hidden;touch-action:none;
  padding-top:52px;padding-bottom:80px
}

/* ═══ 单张卡片 ═══ */
.card{
  position:absolute;top:52px;left:0;right:0;
  bottom:80px;
  display:flex;flex-direction:column;justify-content:center;
  padding:28px 24px;
  opacity:0;pointer-events:none;
  transition:opacity .25s, transform .25s;
  transform:translateY(40px)
}
.card.active{opacity:1;pointer-events:auto;transform:translateY(0)}
.card.exit-up{opacity:0;transform:translateY(-60px)}
.card.exit-down{opacity:0;transform:translateY(60px)}

/* 卡片内容 */
.card-inner{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:18px;padding:28px 24px;
  box-shadow:0 20px 60px rgba(232,64,64,.08),inset 0 1px 0 rgba(255,255,255,.03);
  max-width:600px;margin:0 auto;width:100%;
  position:relative;overflow:hidden
}
.card-inner::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--red),transparent)
}

/* 卡片类型标签 */
.card-type-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.ct-badge{
  font-family:'Orbitron';font-size:9px;letter-spacing:2px;
  padding:3px 8px;border-radius:20px;
}
.ct-badge.politics{background:rgba(232,64,64,.12);color:var(--red);border:1px solid rgba(232,64,64,.3)}
.ct-badge.timed{background:rgba(255,215,0,.08);color:var(--gold);border:1px solid rgba(255,215,0,.2)}
.ct-priority{font-size:11px;color:var(--gold)}
.card-num{font-family:monospace;font-size:10px;color:var(--sub);margin-left:auto}

/* 钩子 */
.card-hook{
  font-size:15px;color:#cc8888;font-style:italic;
  margin-bottom:14px;line-height:1.7;
  border-left:3px solid var(--red);padding-left:12px
}

/* 卡片标题 */
.card-title{
  font-size:22px;font-weight:900;color:#fff;
  margin-bottom:4px;line-height:1.3
}
.card-module{font-size:11px;color:var(--sub);letter-spacing:2px;margin-bottom:16px}

/* 正文 */
.card-body{
  font-size:14px;color:var(--text);line-height:2;
  white-space:pre-line;margin-bottom:16px
}

/* 记忆锚 */
.card-memory{
  background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.15);
  border-radius:8px;padding:10px 14px;
  font-size:12px;color:var(--gold);line-height:1.7
}
.card-memory::before{content:'💡 ';font-style:normal}

/* 关键词 */
.card-keywords{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.kw{
  font-size:10px;padding:2px 8px;border-radius:20px;
  background:rgba(232,64,64,.06);color:#aa6666;border:1px solid rgba(232,64,64,.1)
}

/* 原文展开 */
.card-original{
  margin-top:12px;padding:12px;
  background:rgba(255,255,255,.02);border-radius:8px;
  font-size:12px;color:#665555;line-height:1.8;
  display:none
}
.card-original.show{display:block}
.btn-original{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:8px;padding:4px 10px;
  border:1px solid rgba(255,255,255,.06);border-radius:4px;
  background:transparent;color:var(--sub);font-size:11px;cursor:pointer;
  font-family:'Noto Sans SC';transition:.2s
}
.btn-original:hover{border-color:var(--red);color:var(--red)}

/* ═══ 时政卡片专用样式 ═══ */
.card-inner.timed-card{border-color:rgba(255,215,0,.2)}
.timed-card::before{background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.timed-headline{font-size:18px;font-weight:700;color:#fff;margin-bottom:12px;line-height:1.5}
.timed-gossip{font-size:14px;color:#ccaa88;line-height:2;margin-bottom:12px}
.timed-point{
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.15);
  border-radius:8px;padding:10px 14px;
  font-size:13px;color:var(--gold)
}

/* ═══ 底部导航 ═══ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-around;
  padding:10px 0;
  background:rgba(10,5,8,.92);backdrop-filter:blur(10px);
  border-top:1px solid var(--border)
}
.nav-tab{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  text-decoration:none;color:var(--sub);font-size:10px;cursor:pointer;
  transition:.2s;padding:4px 12px;border-radius:8px
}
.nav-tab:hover,.nav-tab.active{color:var(--text)}
.nav-tab.active{background:rgba(232,64,64,.08)}
.nav-tab .tab-icon{font-size:20px;line-height:1}
.nav-tab .tab-label{font-family:'Orbitron';font-size:7px;letter-spacing:1px}

/* ═══ 进度条 ═══ */
.progress-bar{
  position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:50;
  width:3px;height:120px;background:rgba(255,255,255,.04);
  border-radius:2px;overflow:hidden
}
.progress-fill{
  width:100%;background:var(--red);border-radius:2px;
  transition:height .3s ease
}

/* ═══ 刷卡指引 ═══ */
.swipe-hint{
  position:fixed;bottom:95px;right:50%;transform:translateX(50%);
  font-size:11px;color:var(--sub);z-index:50;
  animation:hintFade 3s ease 1s forwards;opacity:0
}
@keyframes hintFade{0%{opacity:0}20%{opacity:.7}80%{opacity:.7}100%{opacity:0}}

/* ═══ 加载中 ═══ */
.loading-overlay{
  position:fixed;inset:0;z-index:200;
  background:var(--dark);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px
}
.loading-icon{font-size:48px;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Orbitron';font-size:12px;color:var(--red);letter-spacing:3px}

/* ═══ 时政加载状态 ═══ */
.timeline-card{
  background:var(--card-bg);border:1px solid rgba(255,215,0,.2);
  border-radius:18px;padding:24px;max-width:600px;margin:0 auto;width:100%;
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="vignette"></div>

<!-- 加载遮罩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-icon">🔴</div>
  <div class="loading-text">POLITICS · 101</div>
  <div style="font-size:12px;color:#664455;font-family:monospace">正在加载今日政治情报...</div>
</div>

<!-- 顶部栏 -->
<div class="top-bar">
  <div class="top-logo">🔴 POLITICS · 101</div>
  <div class="top-meta" id="topMeta">今日 0/0 · 总掌握 0%</div>
  <div class="top-actions">
    <button class="btn-small" onclick="fetchTimedNews()" title="获取最新时政">📡 时政</button>
    <button class="btn-small" onclick="location.href='../index.html'">← 首页</button>
  </div>
</div>

<!-- 卡片容器 -->
<div class="feed" id="feed"></div>

<!-- 进度条 -->
<div class="progress-bar">
  <div class="progress-fill" id="progressFill" style="height:0%"></div>
</div>

<!-- 刷卡指引 -->
<div class="swipe-hint">↑ 上划看下一条</div>

<!-- 底部导航 -->
<div class="bottom-nav">
  <div class="nav-tab active" onclick="location.href='politics.html'">
    <div class="tab-icon">🔴</div>
    <div class="tab-label">政治</div>
  </div>
  <div class="nav-tab" onclick="location.href='english.html'">
    <div class="tab-icon">🔵</div>
    <div class="tab-label">英语</div>
  </div>
  <div class="nav-tab" onclick="location.href='math.html'">
    <div class="tab-icon">🟣</div>
    <div class="tab-label">数学</div>
  </div>
  <div class="nav-tab" onclick="location.href='cs.html'">
    <div class="tab-icon">🟢</div>
    <div class="tab-label">408</div>
  </div>
  <div class="nav-tab" onclick="location.href='index.html'">
    <div class="tab-icon">🏠</div>
    <div class="tab-label">主页</div>
  </div>
</div>

<!-- 数据库 -->
<script src="data/politics-mayan.js"></script>
<!-- SDK -->
<script src="../shared/pku-core-sdk.js"></script>

<script>
// ═══ 状态 ═══
let allCards = [];       // 今日卡片队列
let currentIdx = 0;      // 当前卡片
let isAnimating = false;
let timedCards = [];     // 时政卡片

// ═══ API Keys ═══
function _keys(){
  try{
    const raw = sessionStorage.getItem('pku_keys') || localStorage.getItem('pku_keys');
    if(raw) return JSON.parse(raw);
  }catch(e){}
  // 尝试SDK
  if(window.PKU_SDK) return PKU_SDK.getKeys?.() || {pplx:'',gd:'',bs:''};
  return {pplx:'',gd:'',bs:''};
}

// ═══ SRS 间隔重复引擎（简版）═══
const SRS_KEY = 'DP_Politics_SRS';
function loadSRS(){
  try{ return JSON.parse(localStorage.getItem(SRS_KEY)||'{}'); }catch(e){ return {}; }
}
function saveSRS(data){ localStorage.setItem(SRS_KEY, JSON.stringify(data)); }

function markSeen(id){
  const srs = loadSRS();
  const now = Date.now();
  const rec = srs[id] || {seen:0, next:0};
  // 间隔倍增：1天→3天→7天→14天→30天
  const intervals = [1,3,7,14,30];
  const nextInterval = intervals[Math.min(rec.seen, intervals.length-1)];
  srs[id] = { seen: rec.seen+1, last: now, next: now + nextInterval*86400000 };
  saveSRS(srs);
}

function getTodayCards(){
  const srs = loadSRS();
  const now = Date.now();
  const due = [];
  const fresh = [];

  POLITICS_MAYAN.forEach(card => {
    const rec = srs[card.id];
    if(!rec){ fresh.push(card); }
    else if(rec.next <= now){ due.push(card); }
  });

  // 优先复习到期的，然后新卡（按优先级排序）
  due.sort((a,b) => b.priority - a.priority);
  fresh.sort((a,b) => b.priority - a.priority);

  // 每日上限：5张复习 + 5张新卡
  return [...due.slice(0,5), ...fresh.slice(0,5)];
}

// ═══ 构建卡片HTML ═══
function buildKnowledgeCard(card, idx, total){
  const stars = '★'.repeat(card.priority) + '☆'.repeat(3-card.priority);
  return `
    <div class="card" id="card_${idx}" data-idx="${idx}">
      <div class="card-inner">
        <div class="card-type-row">
          <span class="ct-badge politics">政治 · ${card.module}</span>
          <span class="ct-priority">${stars}</span>
          <span class="card-num">${idx+1} / ${total}</span>
        </div>
        <div class="card-hook">"${card.hook}"</div>
        <div class="card-title">${card.title}</div>
        <div class="card-module">${card.module.toUpperCase()}</div>
        <div class="card-body">${card.card}</div>
        <div class="card-memory">${card.memory}</div>
        <div class="card-keywords">
          ${card.keywords.map(k=>`<span class="kw">${k}</span>`).join('')}
        </div>
        <button class="btn-original" onclick="toggleOriginal(${idx})">
          📜 查看原文
        </button>
        <div class="card-original" id="orig_${idx}">${card.original}</div>
      </div>
    </div>
  `;
}

function buildTimedCard(news, idx, total){
  return `
    <div class="card" id="card_${idx}" data-idx="${idx}">
      <div class="card-inner timed-card">
        <div class="card-type-row">
          <span class="ct-badge timed">📡 今日时政</span>
          <span class="card-num">${idx+1} / ${total}</span>
        </div>
        <div class="timed-headline">${news.headline || '今日时政速递'}</div>
        <div class="timed-gossip">${news.gossip || news.content || ''}</div>
        <div class="timed-point">📌 考研关联：${news.point || news.exam_link || '形势与政策'}</div>
      </div>
    </div>
  `;
}

// ═══ 渲染所有卡片 ═══
function renderCards(){
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  allCards.forEach((card, idx) => {
    let html;
    if(card._type === 'timed'){
      html = buildTimedCard(card, idx, allCards.length);
    } else {
      html = buildKnowledgeCard(card, idx, allCards.length);
    }
    feed.insertAdjacentHTML('beforeend', html);
  });
  showCard(0);
  updateMeta();
}

function showCard(idx){
  if(idx < 0 || idx >= allCards.length) return;

  // 清除所有状态
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('active','exit-up','exit-down');
  });

  const el = document.querySelector(`[data-idx="${idx}"]`);
  if(el){
    el.classList.add('active');
    currentIdx = idx;
    updateProgress();

    // 标记已看
    if(allCards[idx]?.id) markSeen(allCards[idx].id);
  }
}

// ═══ 翻卡动画 ═══
function nextCard(){
  if(isAnimating || currentIdx >= allCards.length-1) return;
  isAnimating = true;
  const curr = document.querySelector(`[data-idx="${currentIdx}"]`);
  curr?.classList.add('exit-up');
  setTimeout(()=>{
    showCard(currentIdx+1);
    isAnimating = false;
  }, 250);
}

function prevCard(){
  if(isAnimating || currentIdx <= 0) return;
  isAnimating = true;
  const curr = document.querySelector(`[data-idx="${currentIdx}"]`);
  curr?.classList.add('exit-down');
  setTimeout(()=>{
    showCard(currentIdx-1);
    isAnimating = false;
  }, 250);
}

// ═══ 手势 ═══
let touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  const dy = touchStartY - e.changedTouches[0].clientY;
  if(Math.abs(dy) < 30) return;
  if(dy > 0) nextCard(); else prevCard();
}, {passive:true});

// 键盘
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowUp' || e.key === 'ArrowLeft') prevCard();
  if(e.key === 'ArrowDown' || e.key === 'ArrowRight') nextCard();
});

// 滚轮
let wheelDebounce = false;
document.addEventListener('wheel', e => {
  if(wheelDebounce) return;
  wheelDebounce = true;
  setTimeout(()=>wheelDebounce=false, 300);
  if(e.deltaY > 0) nextCard(); else prevCard();
}, {passive:true});

// ═══ UI工具 ═══
function toggleOriginal(idx){
  const el = document.getElementById(`orig_${idx}`);
  const btn = el?.previousElementSibling;
  if(!el) return;
  el.classList.toggle('show');
  if(btn) btn.textContent = el.classList.contains('show') ? '📜 收起原文' : '📜 查看原文';
}

function updateProgress(){
  const pct = ((currentIdx+1) / allCards.length * 100).toFixed(0);
  document.getElementById('progressFill').style.height = pct + '%';
}

function updateMeta(){
  const srs = loadSRS();
  const mastered = Object.keys(srs).filter(k => srs[k].seen >= 3).length;
  const pct = (mastered / POLITICS_MAYAN.length * 100).toFixed(0);
  document.getElementById('topMeta').textContent =
    `今日 ${currentIdx+1}/${allCards.length} · 掌握 ${pct}%`;
}

// ═══ 时政接入 Perplexity ═══
async function fetchTimedNews(){
  const keys = _keys();
  if(!keys.pplx){
    // 没有API，用兜底时政
    loadFallbackTimed();
    return;
  }
  const today = new Date().toLocaleDateString('zh-CN');
  try{
    const resp = await fetch('https://api.perplexity.ai/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+keys.pplx},
      body:JSON.stringify({
        model:'sonar',
        messages:[
          {role:'system',content:'你是考研政治辅导老师。只输出JSON数组，不要其他文字。'},
          {role:'user',content:`今天是${today}。请搜索今日中国最重要的3条政治/时政新闻，按考研政治形策角度解读。
输出JSON数组格式（严格）:
[{"headline":"新闻标题(20字内)","gossip":"用八卦/段子体讲这个新闻在说什么(60字内，要有趣)","point":"这个新闻关联的考研知识点(20字内)"}]`}
        ],temperature:0.5,max_tokens:1000,search_recency_filter:'day'
      })
    });
    const data = await resp.json();
    const raw = data.choices?.[0]?.message?.content || '[]';
    const parsed = JSON.parse(raw.replace(/```json?|```/g,'').trim());
    if(Array.isArray(parsed) && parsed.length > 0){
      timedCards = parsed.map(n=>({...n,_type:'timed',id:'timed_'+Date.now()}));
      // 插入到队列头部
      allCards = [...timedCards, ...getTodayCards().map(c=>({...c,_type:'knowledge'}))];
      renderCards();
    }
  } catch(e){
    console.warn('[时政]',e);
    loadFallbackTimed();
  }
}

function loadFallbackTimed(){
  const fallback = [
    {
      headline:'"两个务必"的时代意义',
      gossip:'习近平老提"谦虚谨慎、艰苦奋斗"——这是毛主席1949年在西柏坡说的，现在翻新版，意思是：别飘，还没到庆功的时候。',
      point:'史纲·两个务必·忧患意识',
      _type:'timed',id:'timed_fallback_1'
    },
    {
      headline:'中国式现代化新进展',
      gossip:'中国式现代化跟西方现代化不一样，不走殖民掠夺老路，强调共同富裕。考研最爱考的就是"中国式现代化5大特征+9条本质要求"。',
      point:'习思想·中国式现代化',
      _type:'timed',id:'timed_fallback_2'
    }
  ];
  timedCards = fallback;
  allCards = [...fallback, ...getTodayCards().map(c=>({...c,_type:'knowledge'}))];
  renderCards();
}

// ═══ 初始化 ═══
async function init(){
  // 等SDk加载
  await new Promise(r => setTimeout(r, 300));

  const todayKnowledge = getTodayCards().map(c=>({...c,_type:'knowledge'}));
  allCards = todayKnowledge;

  // 自动拉时政（有API就拉，没有用兜底）
  renderCards();
  document.getElementById('loadingOverlay').style.display = 'none';

  // 后台拉时政
  fetchTimedNews();
}

window.addEventListener('load', init);
</script>
</body>
</html>
