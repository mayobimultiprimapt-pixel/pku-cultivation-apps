<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大明王朝 · 諸神軍機處</title>
  <meta name="description" content="AI短视频提示词创作站 — 大明王朝諸神軍機處，您的短视频军师">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ==================== 登录页面 ==================== -->
  <section id="login-page" class="page active">
    <div class="login-bg">
      <div class="particles" id="particles"></div>
      <div class="dragon-glow"></div>
    </div>
    <div class="login-container">
      <div class="login-card">
        <div class="seal-icon">
          <svg viewBox="0 0 120 120" class="seal-svg">
            <circle cx="60" cy="60" r="55" fill="none" stroke="var(--gold)" stroke-width="2" opacity="0.6"/>
            <circle cx="60" cy="60" r="48" fill="none" stroke="var(--gold)" stroke-width="1" opacity="0.3"/>
            <text x="60" y="45" text-anchor="middle" fill="var(--gold)" font-size="18" font-family="'Noto Serif SC'">諸神</text>
            <text x="60" y="70" text-anchor="middle" fill="var(--gold)" font-size="18" font-family="'Noto Serif SC'">軍機處</text>
            <text x="60" y="90" text-anchor="middle" fill="var(--gold-dim)" font-size="10" font-family="'Noto Serif SC'">大明御用</text>
          </svg>
        </div>
        <h1 class="login-title">大明王朝</h1>
        <p class="login-subtitle">諸神軍機處 · AI短视频创作站</p>
        <div class="login-form">
          <div class="input-group" id="password-group">
            <div class="input-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
            <input type="password" id="login-password" placeholder="请输入军机密钥..." autocomplete="off">
            <div class="input-line"></div>
          </div>
          <div id="login-error" class="login-error"></div>
          <button id="login-btn" class="btn-imperial" onclick="Auth.login()">
            <span class="btn-text">入朝觐见</span>
            <div class="btn-glow"></div>
          </button>
        </div>
        <div class="login-footer">
          <span>天子令牌 · 非请勿入</span>
        </div>
      </div>
    </div>
  </section>

  <!-- ==================== 主应用 ==================== -->
  <section id="app-page" class="page">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo-mini">
          <svg viewBox="0 0 40 40" width="36" height="36">
            <circle cx="20" cy="20" r="18" fill="none" stroke="var(--gold)" stroke-width="1.5"/>
            <text x="20" y="25" text-anchor="middle" fill="var(--gold)" font-size="10" font-family="'Noto Serif SC'">軍機</text>
          </svg>
        </div>
        <span class="sidebar-title">軍機處</span>
        <button class="btn-icon sidebar-toggle-btn" onclick="App.toggleSidebar()" title="收起">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/>
          </svg>
        </button>
      </div>

      <button class="btn-new-chat" onclick="Chat.newConversation()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span>新建对话</span>
      </button>

      <!-- 导航标签 -->
      <nav class="sidebar-nav">
        <button class="nav-tab active" data-tab="chat" onclick="App.switchTab('chat')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>对话</span>
        </button>
        <button class="nav-tab" data-tab="templates" onclick="App.switchTab('templates')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>模板</span>
        </button>
        <button class="nav-tab" data-tab="memory" onclick="App.switchTab('memory')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          <span>记忆</span>
        </button>
      </nav>

      <!-- 对话历史列表 -->
      <div class="sidebar-section" id="sidebar-chat-list">
        <div class="section-label">对话历史</div>
        <div id="conversation-list" class="conversation-list">
          <!-- 动态填充 -->
        </div>
      </div>

      <!-- 底部 -->
      <div class="sidebar-footer">
        <button class="btn-icon" onclick="App.showSettings()" title="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
        </button>
        <button class="btn-icon" onclick="Auth.logout()" title="退出">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- 移动端侧边栏切换按钮 -->
    <button id="mobile-menu-btn" class="btn-icon mobile-menu" onclick="App.toggleSidebar()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- 主内容区 -->
    <main id="main-content" class="main-content">
      <!-- 聊天视图 -->
      <div id="view-chat" class="view active">
        <div id="chat-messages" class="chat-messages">
          <div class="welcome-screen" id="welcome-screen">
            <div class="welcome-icon">
              <svg viewBox="0 0 120 120" width="100" height="100">
                <defs>
                  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#d4a017;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#f0d060;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#d4a017;stop-opacity:1" />
                  </linearGradient>
                </defs>
                <circle cx="60" cy="60" r="55" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
                <circle cx="60" cy="60" r="48" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>
                <text x="60" y="40" text-anchor="middle" fill="url(#goldGrad)" font-size="14" font-family="'Noto Serif SC'" font-weight="700">諸神</text>
                <text x="60" y="60" text-anchor="middle" fill="url(#goldGrad)" font-size="14" font-family="'Noto Serif SC'" font-weight="700">軍機處</text>
                <text x="60" y="80" text-anchor="middle" fill="url(#goldGrad)" font-size="10" font-family="'Noto Serif SC'" opacity="0.7">短视频AI军师</text>
              </svg>
            </div>
            <h2 class="welcome-title">恭迎圣上驾临</h2>
            <p class="welcome-desc">臣乃諸神軍機處首席军机大臣，专为圣上运筹短视频之道。<br>请选择模板或直接下达圣旨。</p>
            <div class="quick-actions">
              <button class="quick-btn" onclick="Chat.sendQuick('帮我写一个口播类短视频脚本')">
                <span class="quick-icon">📹</span>
                <span>口播脚本</span>
              </button>
              <button class="quick-btn" onclick="Chat.sendQuick('帮我策划一个剧情反转短视频')">
                <span class="quick-icon">🎭</span>
                <span>剧情策划</span>
              </button>
              <button class="quick-btn" onclick="Chat.sendQuick('帮我写一个种草带货视频脚本')">
                <span class="quick-icon">🛍️</span>
                <span>种草带货</span>
              </button>
              <button class="quick-btn" onclick="Chat.sendQuick('帮我设计一个知识科普短视频')">
                <span class="quick-icon">📖</span>
                <span>知识科普</span>
              </button>
              <button class="quick-btn" onclick="Templates.use('daoyan')">
                <span class="quick-icon">🎥</span>
                <span>导演分镜</span>
              </button>
            </div>
          </div>
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-area">
          <!-- 附件预览 -->
          <div id="attachment-preview" class="attachment-preview hidden">
            <div id="attachment-items" class="attachment-items"></div>
          </div>
          <div class="model-badge-bar">
            <button class="model-badge" id="model-badge" onclick="App.showSettings()" title="点击切换模型">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/>
              </svg>
              <span id="model-badge-text">Gemini 2.5 Flash</span>
            </button>
          </div>
          <div class="input-bar">
            <!-- 上传按钮 -->
            <div class="input-actions-left">
              <button class="btn-icon" onclick="Upload.triggerFileInput()" title="上传文件">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.49"/>
                </svg>
              </button>
              <button class="btn-icon" onclick="Upload.triggerImageInput()" title="上传图片">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                </svg>
              </button>
              <button class="btn-icon" id="voice-btn" onclick="Voice.toggle()" title="语音输入">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
              </button>
            </div>
            <!-- 文本输入 -->
            <div class="input-wrapper">
              <textarea id="chat-input" placeholder="下达圣旨... (Ctrl+Enter 发送)" rows="1" oninput="Chat.autoResize(this)"></textarea>
            </div>
            <!-- 发送按钮 -->
            <button class="btn-send" id="send-btn" onclick="Chat.send()" title="发送">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
          <input type="file" id="file-input" hidden accept=".txt,.md,.pdf,.doc,.docx" onchange="Upload.handleFile(event)">
          <input type="file" id="image-input" hidden accept="image/*" onchange="Upload.handleImage(event)">
        </div>
      </div>

      <!-- 模板视图 -->
      <div id="view-templates" class="view">
        <div class="view-header">
          <h2>📜 短视频军机模板</h2>
          <p>选择模板，一键生成专业短视频方案</p>
        </div>
        <div id="templates-grid" class="templates-grid">
          <!-- 动态填充 -->
        </div>
      </div>

      <!-- 记忆点视图 -->
      <div id="view-memory" class="view">
        <div class="view-header">
          <h2>🧠 记忆点管理</h2>
          <p>收藏的精华提示词和创作灵感</p>
          <div class="memory-actions">
            <div class="search-bar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="text" id="memory-search" placeholder="搜索记忆点..." oninput="Memory.search(this.value)">
            </div>
            <button class="btn-imperial btn-sm" onclick="Memory.exportAll()">
              <span>导出全部</span>
            </button>
          </div>
        </div>
        <div id="memory-list" class="memory-list">
          <div class="empty-state" id="memory-empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--gold-dim)" stroke-width="1.5">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
            <p>暂无记忆点</p>
            <span>在对话中星标收藏精华内容</span>
          </div>
        </div>
      </div>
    </main>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-backdrop" onclick="App.hideSettings()"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>⚙️ 军机设置</h3>
          <button class="btn-icon" onclick="App.hideSettings()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label>🔑 API密钥状态</label>
            <div id="key-status" class="key-status">正在检测...</div>
            <small>密钥自动从 D:\.env 加载，无需手动输入</small>
          </div>
          <div class="setting-group">
            <label>AI模型选择</label>
            <select id="setting-model">
              <!-- 动态填充 -->
            </select>
            <small>选择不同供应商的模型</small>
          </div>
          <div class="setting-group">
            <label>用户偏好风格</label>
            <textarea id="setting-style" rows="3" placeholder="例如：我主要做美食类短视频，风格偏幽默..."></textarea>
            <small>AI将记住你的偏好，生成更匹配的内容</small>
          </div>
          <div class="setting-group">
            <button class="btn-imperial btn-danger" onclick="App.clearAllData()">清除所有数据</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/memory.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
