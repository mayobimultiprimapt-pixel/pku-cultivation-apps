<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>论道殿 · 双轨四科推演 — 北大考研修仙应用集</title>
  <meta name="description" content="赛博法庭 × 骗子酒馆 · 双轨四科全覆盖 · 金库实时投喂最新考题">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 竖屏提示 -->
  <div id="rotateOverlay" class="rotate-overlay">
    <div class="rotate-content">
      <div class="rotate-icon">📱↻</div>
      <h2>请横屏使用</h2>
      <p>论道殿需要横屏体验</p>
    </div>
  </div>

  <div id="app" class="app-container">
    <!-- ═══ 开始界面 ═══ -->
    <section id="startScreen" class="screen start-screen">
      <div class="start-bg"></div>
      <!-- 粒子背景 -->
      <canvas id="particleCanvas" class="particle-canvas"></canvas>
      <div class="start-content">
        <div class="court-seal">⚖️</div>
        <h1 class="start-title">论道殿 · 双轨四科</h1>
        <p class="start-sub">法庭破局 × 骗子酒馆 · 金库实弹投喂</p>
        
        <!-- 四科选择 — 2x2游戏級卡片 -->
        <div class="subject-grid" id="subjectGrid">
          <!-- 101 政治 — 法庭 -->
          <button class="subject-card active s-101" data-subject="101" data-mode="court" id="sub101">
            <div class="sc-border-anim"></div>
            <div class="sc-bg-art">
              <div class="sc-bg-icon">🏛️</div>
            </div>
            <div class="sc-content">
              <div class="sc-top">
                <span class="sc-code">101</span>
                <span class="sc-mode-pill court-pill">⚖️ 法庭</span>
              </div>
              <div class="sc-main-icon">🏛️</div>
              <div class="sc-name">政治论述</div>
              <div class="sc-tagline">时政破局 · 原理庭辩 · 完形论证</div>
              <div class="sc-stats">
                <span>5案件</span><span>·</span><span>5阶段</span>
              </div>
              <div class="sc-vault-tag" id="vault101">📡 检测金库中...</div>
            </div>
          </button>

          <!-- 201 英语 — 酒馆 -->
          <button class="subject-card s-201" data-subject="201" data-mode="tavern" id="sub201">
            <div class="sc-border-anim"></div>
            <div class="sc-bg-art">
              <div class="sc-bg-icon">📜</div>
            </div>
            <div class="sc-content">
              <div class="sc-top">
                <span class="sc-code">201</span>
                <span class="sc-mode-pill tavern-pill">🍺 酒馆</span>
              </div>
              <div class="sc-main-icon">📜</div>
              <div class="sc-name">英语推断</div>
              <div class="sc-tagline">词义辨析 · 阅读陷阱 · 真假排雷</div>
              <div class="sc-stats">
                <span>10轮</span><span>·</span><span>俄罗斯轮盘</span>
              </div>
              <div class="sc-vault-tag" id="vault201">📡 检测金库中...</div>
            </div>
          </button>

          <!-- 301 数学 — 酒馆 -->
          <button class="subject-card s-301" data-subject="301" data-mode="tavern" id="sub301">
            <div class="sc-border-anim"></div>
            <div class="sc-bg-art">
              <div class="sc-bg-icon">📐</div>
            </div>
            <div class="sc-content">
              <div class="sc-top">
                <span class="sc-code">301</span>
                <span class="sc-mode-pill tavern-pill">🍺 酒馆</span>
              </div>
              <div class="sc-main-icon">📐</div>
              <div class="sc-name">数学排雷</div>
              <div class="sc-tagline">公式陷阱 · 定理辨伪 · 计算排雷</div>
              <div class="sc-stats">
                <span>10轮</span><span>·</span><span>俄罗斯轮盘</span>
              </div>
              <div class="sc-vault-tag" id="vault301">📡 检测金库中...</div>
            </div>
          </button>

          <!-- 408 计算机 — 法庭 -->
          <button class="subject-card s-408" data-subject="408" data-mode="court" id="sub408">
            <div class="sc-border-anim"></div>
            <div class="sc-bg-art">
              <div class="sc-bg-icon">💻</div>
            </div>
            <div class="sc-content">
              <div class="sc-top">
                <span class="sc-code">408</span>
                <span class="sc-mode-pill court-pill">⚖️ 法庭</span>
              </div>
              <div class="sc-main-icon">💻</div>
              <div class="sc-name">计算机法庭</div>
              <div class="sc-tagline">算法庭审 · 数据结构 · 系统辩护</div>
              <div class="sc-stats">
                <span>4案件</span><span>·</span><span>5阶段</span>
              </div>
              <div class="sc-vault-tag" id="vault408">📡 检测金库中...</div>
            </div>
          </button>
        </div>

        <button class="start-btn" id="btnStart">⚡ 升堂开审</button>
        <div class="start-vault-status" id="vaultStatus">
          <span class="vs-icon">🔄</span> 正在穿透金库读取最新考题...
        </div>
      </div>
    </section>

    <!-- ═══ 庭审界面 ═══ -->
    <section id="courtScreen" class="screen court-screen hidden">
      <!-- 顶部栏 -->
      <header class="court-header">
        <div class="ch-left">
          <a href="../index.html" class="back-link" title="返回门户">🏠</a>
          <div class="judge-mini">🐲</div>
          <div class="ch-info">
            <div class="ch-title">论道殿 · <span id="caseSubject">政治论述</span></div>
            <div class="ch-round" id="caseRound">案件 1/8 <span id="dailyBadge" class="daily-badge"></span></div>
          </div>
        </div>
        <div class="ch-center">
          <div class="phase-indicator" id="phaseIndicator">
            <span class="pi-step active" data-phase="read">📋 接案</span>
            <span class="pi-arrow">→</span>
            <span class="pi-step" data-phase="break">🔨 破</span>
            <span class="pi-arrow">→</span>
            <span class="pi-step" data-phase="build">⚔️ 立</span>
            <span class="pi-arrow">→</span>
            <span class="pi-step" data-phase="chain">🔗 论证</span>
            <span class="pi-arrow">→</span>
            <span class="pi-step" data-phase="cloze">📝 完形</span>
          </div>
        </div>
        <div class="ch-right">
          <div class="stat-gem"><span class="sg-icon">🔥</span><span class="sg-val" id="comboVal">0</span></div>
          <div class="stat-gem accent"><span class="sg-icon">✦</span><span class="sg-val" id="scoreVal">0</span></div>
          <div class="hp-mini">
            <div class="hpm-row"><span class="hpm-label">你</span><div class="hpm-track"><div class="hpm-fill player" id="playerHp" style="width:100%"></div></div><span class="hpm-num" id="playerHpN">8</span></div>
            <div class="hpm-row"><span class="hpm-label">官</span><div class="hpm-track"><div class="hpm-fill judge" id="judgeHp" style="width:100%"></div></div><span class="hpm-num" id="judgeHpN">8</span></div>
          </div>
        </div>
      </header>

      <!-- 主庭审区 -->
      <div class="court-body">
        <!-- 左：卷宗 -->
        <div class="panel-dossier" id="panelDossier">
          <div class="dossier-header">
            <span class="dh-badge" id="dossierBadge">📋 卷宗</span>
            <span class="dh-diff" id="dossierDiff">★★★</span>
          </div>
          <div class="dossier-title" id="dossierTitle">案件加载中...</div>
          <div class="dossier-text" id="dossierText"></div>
          <div class="dossier-parties" id="dossierParties"></div>
        </div>

        <!-- 中：战斗区 -->
        <div class="panel-battle" id="panelBattle">
          <!-- 动态渲染各阶段内容 -->
        </div>

        <!-- 右：判官 -->
        <div class="panel-judge">
          <div class="judge-avatar-wrap">
            <div class="judge-avatar" id="judgeAvatar">🐲</div>
            <div class="judge-title">龙武判官</div>
          </div>
          <div class="judge-speech" id="judgeSpeech">"本庭现在开审。"</div>
          <div class="judge-verdict-area" id="judgeVerdictArea"></div>
        </div>
      </div>

      <!-- 底部：手牌 + 操作 -->
      <div class="court-footer" id="courtFooter">
        <div class="hand-zone" id="handZone">
          <div class="hand-label">你的手牌 <span class="hand-phase" id="handPhase"></span></div>
          <div class="hand-cards" id="handCards"></div>
        </div>
        <div class="action-zone" id="actionZone">
          <button class="act-btn primary" id="btnAction" disabled>⚡ 出牌</button>
        </div>
      </div>
    </section>

    <!-- ═══ 结算界面 ═══ -->
    <section id="resultScreen" class="screen result-screen hidden">
      <div class="result-card">
        <div class="result-seal">⚖️</div>
        <div class="result-grade" id="rGrade">S</div>
        <h2 id="rTitle">完美庭审！</h2>
        <div class="result-subject-badge" id="rSubjectBadge">101 政治</div>
        <div class="result-grid">
          <div class="rg"><span class="rg-l">总分</span><span class="rg-v" id="rScore">0</span></div>
          <div class="rg"><span class="rg-l">破谬成功</span><span class="rg-v" id="rBreak">0</span></div>
          <div class="rg"><span class="rg-l">立论成功</span><span class="rg-v" id="rBuild">0</span></div>
          <div class="rg"><span class="rg-l">论证完美</span><span class="rg-v" id="rChain">0</span></div>
          <div class="rg"><span class="rg-l">最高连击</span><span class="rg-v" id="rCombo">0</span></div>
          <div class="rg"><span class="rg-l">灵力剩余</span><span class="rg-v" id="rHp">0</span></div>
        </div>
        <div class="result-btns">
          <button class="act-btn primary" onclick="CourtApp.restart()">🔄 再审一轮</button>
          <button class="act-btn ghost" onclick="CourtApp.backToMenu()">🏠 退庭</button>
        </div>
      </div>
    </section>
  </div>

  <script src="../shared/vault-loader.js"></script>
  <script src="debate-data.js"></script>
  <script src="daily-update.js"></script>
  <script src="debate-engine.js"></script>
  <script src="app.js"></script>
  <script src="tavern-data.js"></script>
  <script src="tavern-engine.js"></script>
  <script src="tavern-ui.js"></script>
</body>
</html>
