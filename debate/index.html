<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>论道殿 · 浸入式面试场 | PKU Debate Hall</title>
    <script src="../shared/pku-core-sdk.js"></script>
    <style>
        :root {
            --bg-dark: #020617;
            --panel-bg: rgba(40, 61, 109, 0.8);
            --primary: #38bdf8;
            --accent: #f43f5e;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.1), transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(244, 63, 94, 0.05), transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部导航 */
        header {
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 中央显示区 */
        main {
            flex: 1;
            position: relative;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 初始化表单 */
        #initPanel {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .btn-start {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #e11d48);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(244, 63, 94, 0.4);
        }

        /* 面试官展示区 */
        #interviewPanel {
            display: none;
            width: 100%;
            max-width: 800px;
            height: 100%;
            flex-direction: column;
        }

        .evaluator-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .evaluator-profile.active-strict {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.2);
        }

        .evaluator-profile.active-gentle {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .e-info h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .e-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* 聊天记录 */
        .chat-log {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 150px;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .bubble.ai {
            background: rgba(56, 189, 248, 0.1);
            border-left: 3px solid var(--primary);
            align-self: flex-start;
        }

        .bubble.user {
            background: rgba(244, 63, 94, 0.1);
            border-right: 3px solid var(--accent);
            align-self: flex-end;
        }

        .bubble.system {
            align-self: center;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
            color: var(--warning);
            text-align: center;
        }

        /* 底部控制 / 语音区 */
        .control-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(2, 6, 23, 1), rgba(2, 6, 23, 0));
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
        }

        .mic-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .mic-btn.recording {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(244, 63, 94, 0.6);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .status-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            min-height: 20px;
        }

        .debug-form {
            display: none;
            width: 100%;
            max-width: 600px;
            gap: 10px;
            margin-top: 10px;
        }

        .debug-form input {
            flex: 1;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 8px;
        }

        .debug-form button {
            padding: 10px 15px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #aiTyping {
            display: none;
            align-self: flex-start;
            color: var(--primary);
            font-size: 0.85rem;
            padding: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h1>论道殿 · 镜像对决</h1>
    </header>

    <main>
        <!-- 入场设定 -->
        <div id="initPanel">
            <div style="font-size: 40px; margin-bottom: 20px;">⚔️</div>
            <div class="form-group">
                <label>报考专业名称</label>
                <input type="text" id="majorInput" placeholder="例：计算机科学与技术 / 法律硕士" value="计算机科学与技术">
            </div>
            <div class="form-group">
                <label>首发面试官人设</label>
                <select id="personaInput"
                    style="width:100%; padding:12px; background:rgba(0,0,0,0.4); border:1px solid var(--glass-border); color:white; border-radius:8px;">
                    <option value="mixed">动态多考官局 (冷面英文+笑面专业) ★</option>
                    <option value="strict">全程死亡追问 (极限抗压)</option>
                </select>
            </div>
            <button class="btn-start" onclick="startInterview()">叩开殿门，面见宗师</button>
            <p style="margin-top:15px;font-size:0.8rem;color:var(--text-muted)">提示: 需要麦克风权限。也可使用底部键盘输入兜底。</p>
        </div>

        <!-- 面试界面 -->
        <div id="interviewPanel">
            <div class="evaluator-profile active-gentle" id="evaluatorBox">
                <div class="avatar" id="evaluatorAvatar">👨‍🏫</div>
                <div class="e-info">
                    <h3 id="evaluatorName">主考官匹配中...</h3>
                    <p id="evaluatorDesc">正在加载你的复试档案</p>
                </div>
            </div>

            <div class="chat-log" id="chatLog">
                <!-- 历史消息挂载点 -->
                <div class="bubble system">请调节设备音量，准备接受英文面试开局。</div>
                <div id="aiTyping">导师正在思考追问刁难你的角度...</div>
            </div>

        </div>
    </main>

    <div class="control-dock" id="controlDock" style="display:none">
        <div class="status-text" id="statusText">准备就绪，轮到你发言时按住麦克风</div>

        <!-- 语音按住 -->
        <button class="mic-btn" id="micBtn" onmousedown="startRecording()" onmouseup="stopRecording()"
            ontouchstart="startRecording()" ontouchend="stopRecording()">
            🎤
        </button>
        <div style="font-size: 0.75rem; color:#64748b; margin-top:-5px">按住连麦作答 / 松开提交</div>

        <!-- 调试键盘输入 -->
        <div class="debug-form" id="debugForm">
            <input type="text" id="keyboardInput" placeholder="如果语音无法识别，可在此打字...">
            <button onclick="submitKeyboard()">发送</button>
        </div>
        <div style="text-align:right;width:100%;max-width:600px;">
            <button onclick="document.getElementById('debugForm').style.display='flex'"
                style="background:none;border:none;color:var(--text-muted);font-size:0.8rem;cursor:pointer">⌨️
                呼出键盘</button>
        </div>
    </div>

    <script>
        // --- 状态控制 ---
        let targetMajor = '';
        let mode = 'mixed';
        let interviewHistory = [];
        let state = 'init'; // init, waiting_ai, user_speaking
        let currentInterviewer = 'strict_eng'; // strict_eng, gentle_cn, strict_cn
        let sessionTurn = 0;
        const MAX_TURNS = 6; // 三个考官每人两轮

        // STT & TTS 引擎
        let recognition = null;
        let finalTranscript = '';

        // 初始化语音识别
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN'; // 默认中文，遇到英文时自己兼容或前端自动猜

            recognition.onstart = () => {
                document.getElementById('micBtn').classList.add('recording');
                document.getElementById('statusText').textContent = '正在倾听 (讲英文亦可识别)...';
                finalTranscript = '';
            };

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                document.getElementById('statusText').textContent = (finalTranscript + interim) || '听...';
            };

            recognition.onerror = (e) => {
                console.error('Speech Error:', e.error);
                document.getElementById('statusText').textContent = `语音接入异常: ${e.error}`;
                document.getElementById('micBtn').classList.remove('recording');
            };

            recognition.onend = () => {
                document.getElementById('micBtn').classList.remove('recording');
                if (finalTranscript.trim().length > 0 && state === 'user_speaking') {
                    processUserSubmit(finalTranscript.trim());
                } else if (state === 'user_speaking') {
                    document.getElementById('statusText').textContent = '未能捕捉声音，按住重试或使用键盘';
                }
            };
        } else {
            alert('该浏览器不支持原生 Web Speech API录音，请使用键盘模式。');
            document.getElementById('debugForm').style.display = 'flex';
        }

        // TTS 获取浏览器音色
        let voices = [];
        window.speechSynthesis.onvoiceschanged = () => { voices = window.speechSynthesis.getVoices(); };

        function speakText(text, lang = 'zh-CN', pitch = 1, rate = 1) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = lang; u.pitch = pitch; u.rate = rate;

                // 挑选合适的音色 (尽量挑微软、谷歌的原声)
                if (voices.length > 0) {
                    const targetV = voices.find(v => v.lang.includes(lang) && (lang.includes('en') ? v.name.includes('Google') || v.name.includes('Microsoft') : v.name.includes('Xiaoxiao') || v.name.includes('Tingting') || v.name.includes('Google')));
                    if (targetV) u.voice = targetV;
                }
                window.speechSynthesis.speak(u);
            }
        }

        // --- 核心流程 ---
        async function startInterview() {
            if (!PKUSDK.Auth.isLoggedIn()) return alert('请先在大本营登录加载 AI 能力！');

            targetMajor = document.getElementById('majorInput').value.trim();
            mode = document.getElementById('personaInput').value;
            if (!targetMajor) return alert('报考专业不能为空');

            document.getElementById('initPanel').style.display = 'none';
            document.getElementById('interviewPanel').style.display = 'flex';
            document.getElementById('controlDock').style.display = 'flex';

            // 渲染第一个考官 (英文)
            switchInterviewer('strict_eng');

            addBubble('开始生成专属于你的复试档案与首发问题...', 'system');
            await aiTurn('INTRO');
        }

        function switchInterviewer(type) {
            const box = document.getElementById('evaluatorBox');
            const name = document.getElementById('evaluatorName');
            const desc = document.getElementById('evaluatorDesc');
            const avatar = document.getElementById('evaluatorAvatar');

            box.className = 'evaluator-profile ' + (type.includes('strict') ? 'active-strict' : 'active-gentle');

            if (type === 'strict_eng') {
                avatar.textContent = '👱🏼‍♂️'; name.textContent = 'Prof. Miller (外语面试官)'; desc.textContent = '冷酷严肃｜专门考查口语流利度和专业词汇';
            } else if (type === 'strict_cn') {
                avatar.textContent = '👴🏼'; name.textContent = '严教授 (核心院系主任)'; desc.textContent = '死亡追问｜喜欢打断、挑刺底层逻辑';
            } else {
                avatar.textContent = '👨🏻‍🏫'; name.textContent = '温教授 (专业导师)'; desc.textContent = '笑里藏刀｜看似和善，提问实操深度应用';
            }
            currentInterviewer = type;
        }

        // AI 生成逻辑
        async function aiTurn(phase) {
            state = 'waiting_ai';
            document.getElementById('aiTyping').style.display = 'block';
            document.getElementById('statusText').textContent = '考官正在抛出终极问题...';

            let sysPrompt = '';
            if (phase === 'INTRO') {
                sysPrompt = `你是北大考研的复试外语主考官(Prof. Miller)。学生报考的专业是：${targetMajor}。
这是你们的第一轮对话（破冰与自我介绍）。请直接用英语对学生进行 10-20 词的简短寒暄，并要求他用英语做自我介绍或描述为什么选择这个专业。
规定：输出格式必须是严格的 JSON对象！
{
 "text": "输出给学生看并由TTS朗读的英文",
 "hiddenThoughts": "作为考官内心的评判想法，简短"
}`;
            } else {
                // 接下来的连环追问
                const personaRule = currentInterviewer === 'strict_eng' ? '用纯英语严厉追问专业词汇'
                    : currentInterviewer === 'strict_cn' ? '用中文进行高压打击，挑刺刚才回答的逻辑漏洞，并抛出更底层的专业基础概念考核'
                        : '用中文温和点评，但要求结合该专业的最新技术/理论前沿进行拔高回答';

                sysPrompt = `你是北大的考研复试考官。学生专业：${targetMajor}。目前面试进行到第 ${sessionTurn} 轮。
你的人设要求：${personaRule}。

这是你们之前的对话历史记录：
${JSON.stringify(interviewHistory.slice(-4))}

作为顶尖教授，请根据学生上一轮的作答，指出他的错误/薄弱点（或表扬优点），并抛出下一个针对这门专业的核心问题。
必须输出 JSON：
{
  "feedback": "（若有）对上一轮回答的点评和打分描述",
  "text": "本轮提出的具体新问题（作为考官的直接口吻）",
  "lang": "en-US" 或 "zh-CN" 决定朗读语言
}`;
            }

            try {
                const resp = await PKUSDK.AI.chat(sysPrompt, '请给出考官的发言 JSON', { temperature: 0.6 });
                const jsonStr = resp.replace(/```json/g, '').replace(/```/g, '').trim();
                const r = JSON.parse(jsonStr);

                document.getElementById('aiTyping').style.display = 'none';

                if (r.feedback) addBubble(r.feedback, 'system');
                addBubble(r.text, 'ai');

                interviewHistory.push({ role: 'interviewer', content: r.text });

                // TTS 播报
                speakText(r.text, r.lang || (currentInterviewer.includes('eng') ? 'en-US' : 'zh-CN'), currentInterviewer.includes('strict') ? 0.9 : 1.1);

                state = 'user_speaking';
                document.getElementById('statusText').textContent = '👉 轮到你发言，请按住麦克风';

            } catch (e) {
                document.getElementById('aiTyping').style.display = 'none';
                addBubble(`(考官网断了: ${e.message})，点下方重试键盘输入进入下一轮。`, 'system');
                state = 'user_speaking';
            }
        }

        // 录音按键控制
        function startRecording() {
            if (state !== 'user_speaking') return;
            if (recognition) {
                try { recognition.start(); } catch (e) { }
            }
        }
        function stopRecording() {
            if (state !== 'user_speaking') return;
            if (recognition) {
                try { recognition.stop(); } catch (e) { }
            }
        }

        function submitKeyboard() {
            const inp = document.getElementById('keyboardInput');
            const v = inp.value.trim();
            if (v) { inp.value = ''; processUserSubmit(v); }
        }

        // 提交用户的回合
        function processUserSubmit(text) {
            if (state !== 'user_speaking') return;

            window.speechSynthesis.cancel(); // 打断导师说话
            addBubble(text, 'user');
            interviewHistory.push({ role: 'candidate', content: text });
            sessionTurn++;

            if (sessionTurn >= MAX_TURNS) {
                // 结束
                addBubble('面试时间到。', 'system');
                endInterview();
                return;
            }

            // 动态切换考官人设
            if (sessionTurn === 2) {
                addBubble('>> 教授切换：核心院系主任接手问答', 'system');
                switchInterviewer('strict_cn');
            } else if (sessionTurn === 4 && mode === 'mixed') {
                addBubble('>> 教授切换：专业课导师接手问答', 'system');
                switchInterviewer('gentle_cn');
            }

            aiTurn('QA');
        }

        async function endInterview() {
            state = 'waiting_ai';
            document.getElementById('aiTyping').style.display = 'block';
            document.getElementById('statusText').textContent = '录取委员会合议打分中...';

            const sysPrompt = `你是北大考研录取委员会。学生的专业是：${targetMajor}。
阅读完整的面试记录：
${JSON.stringify(interviewHistory)}

请给出最终录取打分与综合点评（JSON格式）：
{
  "finalScore": 85,
  "strengths": "[优势总结]",
  "weaknesses": "[致命扣分点]",
  "result": "拟录取 / 待定 / 淘汰"
}`;

            try {
                const resp = await PKUSDK.AI.chat(sysPrompt, '结束面试并结算', { temperature: 0.1 });
                const r = JSON.parse(resp.replace(/```json/g, '').replace(/```/g, '').trim());

                document.getElementById('aiTyping').style.display = 'none';
                document.getElementById('controlDock').style.display = 'none';

                let reportHtml = `<div style="background:rgba(255,255,255,0.05);border:1px solid var(--accent);border-radius:12px;padding:20px;text-align:center;margin-top:20px">
                <h2 style="color:var(--primary);margin-bottom:15px">📜 录取委员会评审令</h2>
                <div style="font-size:36px;font-weight:bold;margin-bottom:15px;color:${r.finalScore >= 80 ? 'var(--success)' : 'var(--warning)'}">${r.finalScore} 分 - ${r.result}</div>
                <p style="color:var(--text-muted);font-size:0.9rem;text-align:left;line-height:1.6">
                    <b>✅ 优势</b>: ${r.strengths}<br><br>
                    <b>⚠️ 致命死穴</b>: ${r.weaknesses}
                </p>
                <button class="btn-start" style="margin-top:20px" onclick="location.reload()">再面一次 (逆命)</button>
            </div>`;

                document.getElementById('chatLog').innerHTML += reportHtml;
                document.getElementById('chatLog').scrollTop = document.getElementById('chatLog').scrollHeight;
            } catch (e) {
                document.getElementById('aiTyping').style.display = 'none';
                addBubble('成绩单生成失败', 'system');
            }
        }

        // UI 工具
        function addBubble(text, type) {
            const c = document.getElementById('chatLog');
            const d = document.createElement('div');
            d.className = `bubble ${type}`;
            d.textContent = text;

            // 插入在 typing 之前
            const typing = document.getElementById('aiTyping');
            c.insertBefore(d, typing);
