<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>猛鬼考研宿舍 · 北大真题密卷</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════ CSS RESET & VARS ═══════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0c12;--bg2:#14161e;--card:#1a1d28;--card2:#222538;
  --blood:#8b0000;--blood2:#cc3030;--ghost:#4ade80;--gold:#fbbf24;
  --elec:#38bdf8;--honey:#f59e0b;--text:#e8e6e3;--text2:#9ca3af;
  --fury:#ff4444;--stun:#aa44ff;--stealth:rgba(255,255,255,0.15);
  --rare:#c084fc;--radius:12px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;user-select:none;-webkit-user-select:none}

/* ═══════ SCREENS ═══════ */
.scr{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1}
.scr.on{display:flex}

/* ═══════ MAIN MENU ═══════ */
.menu-bg{position:absolute;inset:0;background:linear-gradient(180deg,#0a0c14 0%,#1a0a0a 50%,#0a0c14 100%);overflow:hidden}
.menu-rain{position:absolute;inset:0;pointer-events:none}
.menu-rain i{position:absolute;width:1px;background:linear-gradient(transparent,rgba(100,140,200,.3));animation:rain-fall linear infinite}
@keyframes rain-fall{0%{transform:translateY(-100vh)}100%{transform:translateY(100vh)}}
.menu-building{position:relative;z-index:2;text-align:center;padding:20px}
.building-facade{width:280px;margin:0 auto;background:linear-gradient(180deg,#2a2d3a,#1e2030);border-radius:8px 8px 0 0;padding:16px;position:relative;box-shadow:0 0 40px rgba(139,0,0,.3)}
.windows{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.win{background:#111;border-radius:4px;padding:12px 8px;font-size:1.4em;position:relative;overflow:hidden}
.win.lit{background:linear-gradient(135deg,#2a3a1a,#1a2a0a);box-shadow:inset 0 0 12px rgba(74,222,128,.15)}
.win.lit::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(74,222,128,.08),transparent);animation:flicker 3s infinite}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.6}}
.entrance{padding:12px;background:linear-gradient(180deg,#1a1d28,#111);border-radius:0 0 8px 8px;position:relative}
.entrance-light{width:40px;height:40px;margin:0 auto 8px;background:radial-gradient(circle,rgba(255,200,50,.4),transparent);border-radius:50%;animation:pulse-light 2s infinite}
@keyframes pulse-light{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.2);opacity:1}}
.menu-char{font-size:2em;animation:float-char 2s ease-in-out infinite}
@keyframes float-char{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.menu-title{font-size:1.6em;font-weight:900;color:var(--blood2);text-shadow:0 0 20px rgba(200,0,0,.5);margin:16px 0 4px;letter-spacing:2px}
.menu-sub{font-size:.75em;color:var(--text2);margin-bottom:20px}
.menu-hud{display:flex;gap:16px;justify-content:center;margin-bottom:16px}
.hud-coin{background:var(--card);padding:6px 14px;border-radius:20px;font-size:.85em;display:flex;align-items:center;gap:4px}
.start-btn{width:220px;padding:14px;font-size:1.1em;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--blood),#a01010);border:2px solid rgba(200,0,0,.5);border-radius:var(--radius);cursor:pointer;text-shadow:0 2px 4px rgba(0,0,0,.5);transition:all .2s;position:relative;overflow:hidden}
.start-btn:hover{transform:scale(1.04);box-shadow:0 0 30px rgba(200,0,0,.4)}
.start-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(transparent,rgba(255,255,255,.05),transparent);transform:rotate(30deg);animation:btn-shine 3s infinite}
@keyframes btn-shine{0%{transform:translateX(-100%) rotate(30deg)}100%{transform:translateX(100%) rotate(30deg)}}
.menu-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.mb{padding:8px 14px;font-size:.75em;background:var(--card);border:1px solid rgba(255,255,255,.08);color:var(--text2);border-radius:8px;cursor:pointer;transition:all .2s}
.mb:hover{background:var(--card2);color:var(--text)}

/* ═══════ MODE SELECT ═══════ */
.mode-wrap{width:100%;max-width:420px;padding:20px}
.mode-title{text-align:center;font-size:1.2em;color:var(--blood2);margin-bottom:16px}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode-card{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:16px 12px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.mode-card:hover{transform:translateY(-4px);border-color:var(--blood2);box-shadow:0 8px 20px rgba(200,0,0,.2)}
.mode-card.hunter{border-color:rgba(170,68,255,.3);background:linear-gradient(135deg,#1a1028,#221538)}
.mode-card.hunter:hover{border-color:var(--stun);box-shadow:0 8px 20px rgba(170,68,255,.3)}
.mc-icon{font-size:2em;margin-bottom:6px}
.mc-name{font-weight:900;font-size:.95em;margin-bottom:4px}
.mc-desc{font-size:.65em;color:var(--text2)}
.mc-sub{font-size:.6em;color:var(--ghost);margin-top:4px}
.mc-sub.hunter-sub{color:var(--stun)}

/* ═══════ SUBJECT SELECT ═══════ */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.subj-card{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.subj-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.subj-card .si{font-size:1.6em;margin-bottom:4px}
.subj-card .sn{font-weight:700;font-size:.85em}
.subj-card .sd{font-size:.6em;color:var(--text2);margin-top:2px}

/* ═══════ DIFFICULTY ═══════ */
.diff-wrap{width:100%;max-width:380px;padding:20px}
.diff-list{display:flex;flex-direction:column;gap:8px}
.diff-btn{padding:14px 16px;background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);color:var(--text);font-size:.9em;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s;text-align:left}
.diff-btn:hover{transform:translateX(6px);border-color:var(--blood2)}
.diff-btn small{display:block;font-size:.7em;color:var(--text2);margin-top:2px}

/* ═══════ MATCH ═══════ */
.match-wrap{text-align:center;padding:20px}
.match-timer{font-size:2em;font-weight:900;color:var(--blood2);margin:12px 0}
.match-ghost{margin:8px 0}
.mg-box{font-size:3em;animation:float-char 1.5s ease-in-out infinite}
.match-vs{font-size:1.5em;font-weight:900;color:var(--blood2);margin:8px 0}
.match-players{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.mp-slot{background:var(--card);padding:8px 12px;border-radius:8px;text-align:center;min-width:60px}
.mp-slot.you{border:1px solid var(--ghost)}
.mp-avatar{font-size:1.4em}
.mp-name{font-size:.65em;color:var(--text2);margin-top:2px}
.ready-btn{margin-top:16px;padding:12px 40px;font-size:1em;font-weight:700;background:var(--ghost);color:#000;border:none;border-radius:var(--radius);cursor:pointer}

/* ═══════ GAME HUD ═══════ */
.game-hud{position:fixed;top:0;left:0;right:0;height:50px;background:linear-gradient(180deg,rgba(10,12,18,.95),rgba(10,12,18,.7));display:flex;align-items:center;padding:0 10px;gap:8px;z-index:10;backdrop-filter:blur(8px)}
.back-arrow{background:none;border:none;color:var(--text);font-size:1.2em;cursor:pointer;padding:4px 8px}
.res{display:flex;align-items:center;gap:3px;font-size:.8em;font-weight:700;padding:3px 8px;border-radius:12px;background:rgba(255,255,255,.06)}
.res.gold{color:var(--gold)}.res.elec{color:var(--elec)}
.wave-badge{margin-left:auto;font-size:.7em;color:var(--blood2);font-weight:700}
.player-row{display:flex;gap:2px;margin-left:auto}
.pr-icon{font-size:.9em;width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);border-radius:50%}

/* ═══════ GAME CANVAS ═══════ */
#gameCanvas{position:fixed;inset:0;z-index:1}
.game-task{position:fixed;top:52px;left:10px;right:10px;background:rgba(26,29,40,.9);padding:6px 12px;border-radius:8px;font-size:.7em;display:flex;justify-content:space-between;align-items:center;z-index:10;border:1px solid rgba(255,255,255,.06)}

/* ═══════ BUILD MENU ═══════ */
.build-menu{position:fixed;bottom:-400px;left:0;right:0;max-height:55vh;background:var(--bg2);border-radius:16px 16px 0 0;z-index:20;transition:bottom .3s;overflow-y:auto;padding:12px;border-top:1px solid rgba(255,255,255,.08)}
.build-menu.open{bottom:0}
.bm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bm-title{font-weight:700;font-size:.9em}
.bm-close{background:none;border:none;color:var(--text2);font-size:1.2em;cursor:pointer}
.bm-tabs{display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;padding-bottom:4px}
.bm-tab{padding:5px 10px;font-size:.7em;background:var(--card);border:1px solid transparent;border-radius:8px;color:var(--text2);cursor:pointer;white-space:nowrap}
.bm-tab.active{border-color:var(--ghost);color:var(--ghost)}
.bm-list{display:flex;flex-direction:column;gap:6px}
.bm-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border-radius:8px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.bm-item:hover{border-color:var(--ghost)}
.bm-item.locked{opacity:.4;pointer-events:none}
.bi-icon{font-size:1.5em;width:36px;text-align:center}
.bi-info{flex:1}
.bi-name{font-weight:700;font-size:.8em}
.bi-desc{font-size:.65em;color:var(--text2)}
.bi-limit{font-size:.6em;color:var(--rare);margin-top:2px}
.bi-req{font-size:.6em;color:var(--fury);margin-top:2px}
.bi-cost{font-size:.75em;font-weight:700;white-space:nowrap}
.gold-cost{color:var(--gold)}.elec-cost{color:var(--elec)}

/* ═══════ UPGRADE MENU ═══════ */
.upgrade-menu{position:fixed;bottom:-300px;left:0;right:0;background:var(--bg2);border-radius:16px 16px 0 0;z-index:20;transition:bottom .3s;padding:16px;border-top:1px solid rgba(255,255,255,.08)}
.upgrade-menu.open{bottom:0}
.um-title{font-weight:700;margin-bottom:8px;font-size:.9em}
.um-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text2);font-size:1.2em;cursor:pointer}
.um-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .2s}
.um-row:hover{border-color:var(--ghost)}
.um-row.locked{opacity:.4;pointer-events:none}
.um-icon{font-size:1.5em}
.um-info{flex:1}
.um-name{font-weight:700;font-size:.8em}
.um-stat{font-size:.65em;color:var(--text2)}

/* ═══════ QUIZ OVERLAY ═══════ */
.quiz-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.quiz-overlay.open{display:flex}
.quiz-box{background:var(--bg2);border-radius:16px;padding:20px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto;border:1px solid rgba(200,0,0,.2);box-shadow:0 0 60px rgba(200,0,0,.15)}
.qz-header{text-align:center;margin-bottom:12px}
.qz-header h3{color:var(--blood2);font-size:1.1em}
.qz-header p{font-size:.7em;color:var(--text2)}
.qz-meta{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.qz-tag{padding:2px 8px;border-radius:10px;font-size:.65em;font-weight:700}
.t-single{background:rgba(74,222,128,.15);color:var(--ghost)}
.t-multi{background:rgba(56,189,248,.15);color:var(--elec)}
.t-judge{background:rgba(251,191,36,.15);color:var(--gold)}
.t-essay{background:rgba(192,132,252,.15);color:var(--rare)}
.t-kp{background:rgba(255,255,255,.06);color:var(--text2)}
.qz-q{font-size:.85em;line-height:1.6;margin-bottom:12px;padding:10px;background:rgba(255,255,255,.03);border-radius:8px}
.qz-opts{display:flex;flex-direction:column;gap:6px}
.qz-opt{padding:10px 12px;background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--text);font-size:.8em;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:all .15s}
.qz-opt:hover{border-color:var(--ghost);background:rgba(74,222,128,.05)}
.qz-opt.selected{border-color:var(--elec);background:rgba(56,189,248,.1)}
.qz-opt.correct{border-color:var(--ghost)!important;background:rgba(74,222,128,.15)!important}
.qz-opt.wrong{border-color:var(--fury)!important;background:rgba(255,68,68,.15)!important}
.qz-opt.disabled{pointer-events:none;opacity:.7}
.om{width:22px;height:22px;background:rgba(255,255,255,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7em;font-weight:700;flex-shrink:0}
.judge-row{display:flex;gap:10px}
.judge-btn{flex:1;padding:14px;font-size:1em;font-weight:700;background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--text);cursor:pointer;transition:all .15s}
.judge-btn:hover{border-color:var(--ghost)}
.judge-btn.correct{border-color:var(--ghost)!important;background:rgba(74,222,128,.15)!important}
.judge-btn.wrong{border-color:var(--fury)!important;background:rgba(255,68,68,.15)!important}
.essay-ta{width:100%;min-height:100px;background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--text);padding:10px;font-size:.8em;resize:vertical;font-family:inherit}
.essay-sub{width:100%;margin-top:8px;padding:12px;font-size:.9em;font-weight:700;background:linear-gradient(135deg,var(--blood),#a01010);border:none;border-radius:8px;color:#fff;cursor:pointer}
.qz-result{margin-top:10px;padding:10px;border-radius:8px;font-size:.8em;font-weight:700;text-align:center}
.qz-result.ok{background:rgba(74,222,128,.1);color:var(--ghost)}
.qz-result.fail{background:rgba(255,68,68,.1);color:var(--fury)}
.qz-knowledge{margin-top:8px;padding:8px;background:rgba(255,255,255,.03);border-radius:8px;font-size:.7em;color:var(--text2);line-height:1.5}

/* ═══════ ESSAY MODE PANEL ═══════ */
.essay-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:55;display:none;flex-direction:column;align-items:center;padding:16px;overflow-y:auto;backdrop-filter:blur(10px)}
.essay-overlay.open{display:flex}
.essay-panel{max-width:500px;width:100%;background:var(--bg2);border-radius:16px;padding:20px;border:1px solid rgba(192,132,252,.2);box-shadow:0 0 60px rgba(192,132,252,.15)}
.ep-badge{display:inline-block;padding:3px 10px;background:rgba(192,132,252,.15);color:var(--rare);border-radius:10px;font-size:.7em;font-weight:700;margin-bottom:8px}
.ep-title{font-size:1em;font-weight:900;color:var(--rare);margin-bottom:12px}
.ep-abstract{background:rgba(255,255,255,.03);padding:12px;border-radius:8px;font-size:.78em;line-height:1.8;margin-bottom:12px;border-left:3px solid var(--rare);max-height:200px;overflow-y:auto}
.ep-prompt{font-size:.75em;color:var(--text2);margin-bottom:8px}
.ep-textarea{width:100%;min-height:120px;background:var(--card);border:1px solid rgba(192,132,252,.2);border-radius:8px;color:var(--text);padding:10px;font-size:.8em;resize:vertical;font-family:inherit}
.ep-submit{width:100%;margin-top:10px;padding:12px;font-size:.9em;font-weight:700;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:8px;color:#fff;cursor:pointer}
.ep-result{margin-top:10px;padding:10px;border-radius:8px;font-size:.8em;text-align:center}
.ep-reward{margin-top:8px;padding:10px;background:rgba(192,132,252,.1);border:1px solid rgba(192,132,252,.2);border-radius:8px;text-align:center;font-size:.85em}

/* ═══════ WAVE NUM ═══════ */
.wave-num{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:2em;font-weight:900;color:var(--blood2);text-shadow:0 0 20px rgba(200,0,0,.6);z-index:15;pointer-events:none;transition:transform .3s,opacity .3s;opacity:0}
.wave-num.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.boss-warn{position:fixed;inset:0;z-index:16;display:none;align-items:center;justify-content:center;background:rgba(200,0,0,.15);animation:boss-flash .3s 3}
@keyframes boss-flash{0%,100%{opacity:1}50%{opacity:0}}

/* ═══════ RESULT ═══════ */
.result-wrap{text-align:center;padding:24px;max-width:380px}
.result-wrap h2{font-size:1.4em;margin-bottom:8px}
.result-ghost{font-size:3em;margin:8px 0;animation:float-char 1.5s infinite}
.r-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.r-cell{background:var(--card);padding:10px;border-radius:8px}
.rv{font-size:1.2em;font-weight:900}.rl{font-size:.65em;color:var(--text2);margin-top:2px}
.r-rewards{margin:12px 0;padding:12px;background:var(--card);border-radius:var(--radius)}
.result-btns{display:flex;gap:8px;justify-content:center;margin-top:16px}
.ob{padding:10px 20px;font-size:.85em;background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--text);cursor:pointer;transition:all .2s}
.ob:hover{background:var(--card2)}
.ob.danger{border-color:var(--blood2);color:var(--blood2)}

/* ═══════ OVERLAY ═══════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:40;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.on{display:flex}
.ovl-box{background:var(--bg2);padding:24px;border-radius:16px;text-align:center;max-width:320px}
.ovl-btns{display:flex;gap:8px;justify-content:center;margin-top:16px}

/* ═══════ SHOP/NOTICE/PROGRESS ═══════ */
.shop-wrap,.notice-wrap,.progress-wrap{width:100%;max-width:420px;padding:20px;max-height:90vh;overflow-y:auto}
.back-btn{background:none;border:none;color:var(--text2);font-size:.85em;cursor:pointer;margin-bottom:12px}
.shop-header{text-align:center;margin-bottom:12px}
.shop-mascot{font-size:2em}
.shop-bal{font-size:1em;color:var(--honey);font-weight:700;margin-top:4px}
.s-tab{padding:5px 10px;font-size:.7em;background:var(--card);border:1px solid transparent;border-radius:8px;color:var(--text2);cursor:pointer;margin:0 2px}
.s-tab.active{border-color:var(--honey);color:var(--honey)}
.si{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border-radius:8px;margin-top:6px}
.si-icon{font-size:1.4em}.si-info{flex:1}.si-name{font-weight:700;font-size:.8em}
.si-desc{font-size:.65em;color:var(--text2)}.si-own{font-size:.6em;color:var(--ghost);margin-top:2px}
.si-buy{padding:6px 12px;font-size:.75em;font-weight:700;background:linear-gradient(135deg,#b45309,#d97706);border:none;border-radius:8px;color:#fff;cursor:pointer}
.notice-paper{background:var(--card);padding:16px;border-radius:var(--radius);font-size:.8em;line-height:1.8}
.notice-paper h3{color:var(--blood2);margin-bottom:8px}
.notice-paper ol{padding-left:20px}
.notice-paper li{margin-bottom:6px}
.prog-card{background:var(--card);padding:10px 14px;border-radius:8px;font-size:.8em;margin-bottom:6px}

/* ═══════ HUNTER MODE HUD ═══════ */
.hunter-controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:12;display:none;gap:8px;align-items:center}
.hunter-controls.on{display:flex}
.hc-btn{width:50px;height:50px;border-radius:50%;border:2px solid rgba(170,68,255,.4);background:rgba(26,16,40,.9);color:var(--stun);font-size:1.2em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative}
.hc-btn:hover{border-color:var(--stun);transform:scale(1.1)}
.hc-btn.cd{opacity:.4;pointer-events:none}
.hc-btn .cd-fill{position:absolute;inset:2px;border-radius:50%;background:conic-gradient(transparent var(--cd),rgba(170,68,255,.3) var(--cd));pointer-events:none}
.hc-move{display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:50px 50px 50px;gap:4px}

/* ── 题库工具函数 ── */
function getRandomQuestion(subjectId,starRange){
  const bank=QBANK[subjectId];if(!bank)return null;
  const types=['single','multi','judge','essay'];
  const weights=[50,20,20,10]; // percentage weights
  let roll=Math.random()*100,typeIdx=0,cum=0;
  for(let i=0;i<weights.length;i++){cum+=weights[i];if(roll<cum){typeIdx=i;break}}
  const type=types[typeIdx];
  let pool=bank[type]||[];
  if(starRange&&pool[0]?.star){
    const filtered=pool.filter(q=>q.star>=starRange[0]&&q.star<=starRange[1]);
    if(filtered.length>0)pool=filtered;
  }
  if(pool.length===0)pool=bank.single;
  const q={...pool[Math.floor(Math.random()*pool.length)],type};
  return q;
}
function getEssayPaper(subjectId){
  const papers=ESSAY_PAPERS.filter(p=>p.subj===subjectId);
  if(papers.length===0)return ESSAY_PAPERS[Math.floor(Math.random()*ESSAY_PAPERS.length)];
  return papers[Math.floor(Math.random()*papers.length)];
}

/* ── 游戏循环 ── */
function gameLoop(ts){
  if(!G||G.gameOver)return;
  const dt=Math.min(ts-G.lastFrame,100);G.lastFrame=ts;G.frameCount++;
  if(G.quizActive){requestAnimationFrame(gameLoop);render();return}

  // ═══ PREP PHASE ═══
  if(G.prep&&G.prep.active){updatePrep(ts,dt);render();updateHUD();requestAnimationFrame(gameLoop);return}

  if(G.mode==='hunter')updateHunter(ts,dt);
  else updateSleeper(ts,dt);

  // Bullets
  G.bullets=G.bullets.filter(b=>{
    const dx=b.tx-b.x,dy=b.ty-b.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<8){
      if(b.target&&!b.target.dead){b.target.hp-=b.dmg;G.totalDmg+=b.dmg;addFloat(b.target.x,b.target.y-10,`-${b.dmg}`,'#ef4444');
        if(G.specials.guillotine&&b.target.hp<b.target.maxHp*.3)b.target.hp-=b.target.maxHp*.1;
        if(b.target.hp<=0){b.target.dead=true;if(G.specials.atm)G.gold+=Math.floor(b.target.maxHp/5);checkWin()}}
      return false;
    }
    const s=300*(dt/1000)*3;b.x+=dx/d*s;b.y+=dy/d*s;return true;
  });
  G.floats=G.floats.filter(f=>ts-f.t<900);
  render();updateHUD();requestAnimationFrame(gameLoop);
}

/* ── 准备阶段更新 ── */
function updatePrep(ts,dt){
  const p=G.prep;
  p.timer-=dt;
  // Update prep timer display
  const sec=Math.max(0,Math.ceil(p.timer/1000));
  document.getElementById('waveBadge').textContent=`准备 ${sec}s`;
  // Tip rotation
  const tips=['⏰ 快选房间！点击空房入住','💡 已有人睡的房间不能选','📝 点床/门答题升级','👻 小心！鬼在砸门！','🏃 15秒后开始驱鬼！'];
  p.tipTimer+=dt;if(p.tipTimer>2500){p.tipTimer=0;p.tipIdx=(p.tipIdx+1)%tips.length;
    if(!p.playerChosen)document.getElementById('gameTask').innerHTML=`<span>${tips[p.tipIdx]}</span>`}

  // Move all sprites along corridor
  p.sprites.forEach(sp=>{
    sp.bob+=.06;
    if(sp.state==='running'){
      sp.x+=sp.speed*sp.dir*(dt/1000);
      // Bounce at corridor edges
      if(sp.x>G.startX+G.totalW+30)sp.dir=-1;
      if(sp.x<G.startX-30)sp.dir=1;
      // AI: pick a room after delay
      if(!sp.isPlayer){
        sp.pickTimer+=dt;
        if(sp.pickTimer>=sp.pickDelay&&!sp.targetRoom){
          const free=G.rooms.filter(r=>!r.occupant&&!r.isPlayer);
          if(free.length>0){
            const pick=free[Math.floor(Math.random()*free.length)];
            sp.targetRoom=pick;sp.state='entering';
          }
        }
      }
    }
    if(sp.state==='entering'&&sp.targetRoom){
      const rm=sp.targetRoom;
      const tx=rm.x+RC*TILE/2,ty=rm.side===0?rm.y+RR*TILE+4:rm.y-4;
      const dx=tx-sp.x,dy=ty-sp.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>5){sp.x+=dx/d*sp.speed*1.5*(dt/1000);sp.y+=dy/d*sp.speed*1.5*(dt/1000)}
      else{
        sp.state='sleeping';rm.occupant={name:sp.name,icon:sp.icon};
        rm.light=true;rm.sleeping=true;
        // AI auto-upgrade: maybe upgrade door
        if(!sp.isPlayer&&Math.random()<sp.acc&&rm.door.level<2){
          rm.door.level++;const dl=BUILDINGS.door.levels[rm.door.level];
          rm.door.hp=dl.hp;rm.door.maxHp=dl.hp;
          addFloat(rm.x+RC*TILE/2,rm.y-10,'🚪⬆','#4ade80');
        }
      }
    }
  });

  // Prep ghost: roam and smash random doors
  const pg=p.prepGhost;
  if(pg){
    pg.bob+=.08;
    p.ghostSmashTimer-=dt;
    if(pg.state==='roaming'){
      // Move toward a random door
      if(!pg.targetRoom||p.ghostSmashTimer<=0){
        const targets=G.rooms.filter(r=>r.door.hp>0);
        if(targets.length>0)pg.targetRoom=targets[Math.floor(Math.random()*targets.length)];
        p.ghostSmashTimer=3000+Math.random()*3000;
      }
      if(pg.targetRoom){
        const rm=pg.targetRoom;
        const tx=rm.x+RC*TILE/2,ty=G.corrY+CORR_H/2;
        const dx=tx-pg.x,dy=ty-pg.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d>15){pg.x+=dx/d*pg.speed*(dt/1000);pg.y+=dy/d*pg.speed*(dt/1000);pg.scratchFrame=0}
        else{
          // Smash the door!
          pg.scratchFrame=(pg.scratchFrame+dt*.005)%3;
          if(pg.smashCount<8){
            const dmg=5+Math.floor(Math.random()*10);
            rm.door.hp=Math.max(0,rm.door.hp-dmg*(dt/1000));
            rm.atkFlash=Math.max(rm.atkFlash,3);
            if(rm.door.hp<=0){pg.targetRoom=null;pg.smashCount++;screenShake=4;
              addFloat(rm.x+RC*TILE/2,rm.y,'💥门被砸烂!','#ff4444')}
          }
        }
      }
    }
  }

  // Timer up: force end prep
  if(p.timer<=0)endPrep();
}

/* ── 准备阶段点击处理 ── */
function handlePrepClick(x,y){
  const p=G.prep;if(!p||!p.active)return false;
  // Click on a room to select it
  for(const rm of G.rooms){
    const rw=RC*TILE,rh=RR*TILE;
    if(x>=rm.x-5&&x<=rm.x+rw+5&&y>=rm.y-5&&y<=rm.y+rh+5){
      if(rm.occupant&&!rm.isPlayer){
        addFloat(rm.x+rw/2,rm.y+rh/2,'❌ 已有人住!','#ff4444');
        return true;
      }
      if(rm.door.hp<=0){
        addFloat(rm.x+rw/2,rm.y+rh/2,'❌ 门被砸烂!','#ff4444');
        return true;
      }
      if(!p.playerChosen){
        // Player picks this room!
        p.playerChosen=true;rm.isPlayer=true;rm.light=true;
        rm.occupant={name:'你',icon:G.mode==='hunter'?'👻':'🧑‍🎓'};
        G.playerRoom=rm;
        // Move player sprite into room
        const ps=p.sprites.find(s=>s.isPlayer);
        if(ps){ps.targetRoom=rm;ps.state='entering'}
        addFloat(rm.x+RC*TILE/2,rm.y-15,'🏠 入住成功!','#4ade80');
        document.getElementById('gameTask').innerHTML='<span>📝 点击床🛏️或门🚪答题升级！准备迎战！</span>';
        return true;
      }
      if(p.playerChosen&&rm.isPlayer){
        // Already chosen, click bed or door to quiz-upgrade
        // Check if clicking bed area
        const bx=rm.x+(RC-1)*TILE;
        if(x>=bx&&x<=bx+TILE&&y>=rm.y&&y<=rm.y+TILE&&p.quizUsed<p.maxQuiz){
          triggerPrepQuiz('bed');return true}
        // Check if clicking door area
        const dw=RC*TILE*.5,dh=6;
        const ddx=rm.x+RC*TILE/2-dw/2,ddy=rm.side===0?rm.y+RR*TILE:rm.y-dh;
        if(x>=ddx-5&&x<=ddx+dw+5&&y>=ddy-10&&y<=ddy+dh+10&&p.quizUsed<p.maxQuiz){
          triggerPrepQuiz('door');return true}
      }
      return true;
    }
  }
  return false;
}

/* ── 准备阶段答题 ── */
function triggerPrepQuiz(target){
  if(G.quizActive||!G.playerRoom)return;
  G.quizActive=true;G.prep.quizUsed++;
  const q=getRandomQuestion(G.subj.id,[1,2]);
  if(!q){G.quizActive=false;return}
  G.currentQuiz={question:q,actionType:'prep_'+target,startTime:Date.now()};
  renderQuiz(q);
}
function executePrepUpgrade(target){
  if(!G.playerRoom)return;
  const rm=G.playerRoom;
  if(target==='bed'){
    if(rm.bed.level<BUILDINGS.bed.levels.length-1){
      rm.bed.level++;addFloat(rm.x+RC*TILE-20,rm.y+10,'🛏️⬆Lv'+(rm.bed.level+1),'#fbbf24');
    }
  }else if(target==='door'){
    if(rm.door.level<BUILDINGS.door.levels.length-1){
      rm.door.level++;const dl=BUILDINGS.door.levels[rm.door.level];
      rm.door.hp=dl.hp;rm.door.maxHp=dl.hp;
      addFloat(rm.x+RC*TILE/2,rm.y-10,'🚪⬆Lv'+(rm.door.level+1),'#4ade80');
    }
  }
}

/* ── 结束准备阶段 ── */
function endPrep(){
  const p=G.prep;p.active=false;
  // If player didn't choose, auto-assign a free room
  if(!p.playerChosen){
    const free=G.rooms.filter(r=>!r.occupant&&r.door.hp>0);
    const pick=free.length>0?free[Math.floor(Math.random()*free.length)]:G.rooms[1];
    pick.isPlayer=true;pick.light=true;
    pick.occupant={name:'你',icon:G.mode==='hunter'?'👻':'🧑‍🎓'};
    G.playerRoom=pick;
    addFloat(pick.x+RC*TILE/2,pick.y-15,'🏠 自动分配!','#fbbf24');
  }
  // Set up AI rooms = all non-player rooms
  G.aiRooms=G.rooms.filter(r=>!r.isPlayer);
  // Give AI rooms some buildings
  G.aiRooms.forEach(r=>{
    if(!r.occupant)r.light=false;
    if(r.occupant&&Math.random()>.3){
      const c={type:'turret',level:Math.floor(Math.random()*3),lastShot:0};
      const lv=BUILDINGS.turret.levels[c.level];c.dmg=lv.dmg;c.range=lv.range;c.speed=lv.speed;
      c.px=r.x+TILE/2;c.py=r.y+TILE/2;r.grid[0][0]=c;
    }
    if(r.door.level===0&&r.door.hp>=50){
      r.door.level=Math.floor(Math.random()*2);
      const dl=BUILDINGS.door.levels[r.door.level];r.door.hp=dl.hp;r.door.maxHp=dl.hp;
    }
  });
  // Transition to main game
  const isHunter=G.mode==='hunter';
  if(isHunter){document.getElementById('hunterCtrl').classList.add('on');document.getElementById('gameTask').innerHTML='<span>👻 你是猎梦者！攻破所有宿舍！</span>';}
  else{document.getElementById('gameTask').innerHTML='<span>📋 鬼来了！升级建筑驱鬼！</span>';}
  showWaveNum('准备完毕！');
  G.startTime=Date.now();
}

/* ── 睡梦者更新 ── */
function updateSleeper(ts,dt){
  // Bed gold production
  const bedLv=Math.min(G.playerRoom.bed.level,BUILDINGS.bed.levels.length-1);
  const bedCfg=BUILDINGS.bed.levels[bedLv];
  if(ts-G.playerRoom.bed.lastProd>=bedCfg.interval){
    G.gold+=bedCfg.prod;addFloat(G.playerRoom.x+RC*TILE-20,G.playerRoom.y+RR*TILE-20,`+${bedCfg.prod}`,'#fbbf24');
    G.playerRoom.bed.lastProd=ts;
  }
  // Grid buildings produce
  G.playerRoom.grid.flat().forEach(cell=>{
    if(!cell)return;
    if(cell.type==='console'&&ts-cell.lastProd>=(cell.interval||2000)){G.elec+=(cell.prod||1);cell.lastProd=ts;}
    if(['toad','mirror'].includes(cell.type)&&cell.prod&&ts-cell.lastProd>=(cell.interval||1000)){G.gold+=cell.prod;cell.lastProd=ts;addFloat(cell.px,cell.py,`+${cell.prod}`,'#fbbf24');}
  });
  // Repair
  const repC=G.playerRoom.grid.flat().filter(c=>c&&c.type==='repair').length;
  if(repC>0&&G.playerRoom.door.hp<G.playerRoom.door.maxHp)G.playerRoom.door.hp=Math.min(G.playerRoom.door.maxHp,G.playerRoom.door.hp+G.playerRoom.door.maxHp*.02*repC*(dt/1000));
  // Shield
  if(G.specials.shield&&G.playerRoom.door.hp<G.playerRoom.door.maxHp*.3&&!G.shieldActive){G.shieldActive=true;G.shieldTimer=ts+3000;}
  if(G.shieldActive&&ts>G.shieldTimer)G.shieldActive=false;
  // Danger
  if(G.playerRoom.door.hp<G.playerRoom.door.maxHp*.3)G.dangerPulse=(G.dangerPulse+.05)%6.28;
  // Spawn ghosts
  G.ghostTimer+=dt;
  if(G.ghostTimer>=G.ghostInterval&&G.wave<G.maxWaves){
    G.wave++;spawnGhost();G.ghostTimer=0;showWaveNum(G.wave);
    G.ghostInterval=Math.max(2000,G.ghostInterval-150);
    // Essay mode every 3 waves
    if(G.wave%3===0&&G.wave>0)G.essayWaves++;
    if(G.essayWaves>0&&G.wave%3===0)triggerEssayMode();
  }
  // Ghost movement & attack
  const pr=G.playerRoom,doorX=pr.x+RC*TILE/2,doorY=G.corrY+CORR_H/2;
  G.ghosts.forEach(ghost=>{
    if(ghost.dead)return;
    if(ghost.stunned){if(ts>ghost.stunEnd)ghost.stunned=false;return}
    // Skill usage
    updateGhostSkills(ghost,ts);
    const dx=doorX-ghost.x,dy=doorY-ghost.y,dist=Math.sqrt(dx*dx+dy*dy);
    const spdMul=G.specials.fridge?.8:1;
    const boostMul=1+G.ghostSpeedBoost;
    if(dist>20){
      const spd=ghost.speed*spdMul*boostMul*(dt/1000);
      ghost.x+=dx/dist*spd;ghost.y+=dy/dist*spd;
    }else{
      ghost.scratching=true;ghost.scratchFrame=(ghost.scratchFrame||0)+dt*.005;
      if(ts-ghost.lastAtk>=ghost.atkInterval*(G.specials.fridge?1.2:1)){
        ghost.lastAtk=ts;pr.atkFlash=8;screenShake=6;
        if(!G.shieldActive)triggerQuiz(ghost);
      }
    }
  });
  // Turret shooting
  const allTurrets=[];
  G.playerRoom.grid.flat().forEach(cell=>{if(cell&&(cell.type==='turret'||cell.type==='dgun'||cell.type==='mirror'))allTurrets.push(cell)});
  allTurrets.forEach(cell=>{
    if(ts-cell.lastShot<(cell.speed||2000))return;
    if(!cell.dmg)return;
    const range=(cell.range||3)*TILE;let target=null,minD=Infinity;
    G.ghosts.forEach(ghost=>{
      if(ghost.dead||(ghost.stealthActive))return;
      const dx=ghost.x-cell.px,dy=ghost.y-cell.py,d=Math.sqrt(dx*dx+dy*dy);
      if(d<range&&d<minD){minD=d;target=ghost}
    });
    if(target){cell.lastShot=ts;G.bullets.push({x:cell.px,y:cell.py,tx:target.x,ty:target.y,dmg:cell.dmg,target,speed:300})}
  });
  // Ghost speed boost decay
  if(G.ghostSpeedBoost>0)G.ghostSpeedBoost=Math.max(0,G.ghostSpeedBoost-.001*dt);
}

/* ── 鬼物生成 ── */
function spawnGhost(){
  const hp=Math.floor((30+G.wave*18)*G.cfg.ghostHpMul);
  const isBoss=G.wave%5===0;
  const ghost={x:G.W+20,y:G.corrY+CORR_H/2+(Math.random()*10-5),
    hp:isBoss?hp*2:hp,maxHp:isBoss?hp*2:hp,
    atk:3+G.wave*2,speed:35+Math.random()*15,atkInterval:2000,
    lastAtk:0,dead:false,stunned:false,stunEnd:0,scratching:false,scratchFrame:0,
    type:isBoss?'boss':'normal',level:Math.min(15,G.wave),isBoss,
    bob:Math.random()*Math.PI*2,glow:0,
    // Ghost skills
    skills:{fury:{cd:0,active:false,end:0},stun:{cd:0},stealth:{cd:0,active:false,end:0}},
    furyActive:false,stealthActive:false,exp:0,expNext:20+G.wave*10
  };
  G.ghosts.push(ghost);
}

/* ── 鬼物技能AI ── */
function updateGhostSkills(ghost,ts){
  const lv=ghost.level;
  // Auto-upgrade from scratching
  if(ghost.scratching){
    ghost.exp+=(G.playerRoom.door.level+1)*.02;
    if(ghost.exp>=ghost.expNext&&ghost.level<15){ghost.level++;ghost.maxHp*=1.15;ghost.hp=Math.min(ghost.hp+ghost.maxHp*.1,ghost.maxHp);ghost.atk*=1.1;ghost.exp=0;ghost.expNext*=1.3;addFloat(ghost.x,ghost.y-20,'⬆Level UP','#c084fc')}
  }
  // Fury
  if(lv>=4&&!ghost.furyActive&&ghost.skills.fury.cd<=ts&&ghost.hp<ghost.maxHp*.6){
    ghost.furyActive=true;ghost.skills.fury.active=true;ghost.skills.fury.end=ts+5000;
    ghost.atkInterval=1000;ghost.atk*=1.5;ghost.skills.fury.cd=ts+20000;
    addFloat(ghost.x,ghost.y-25,'🔥狂暴!','#ff4444');
  }
  if(ghost.furyActive&&ts>ghost.skills.fury.end){ghost.furyActive=false;ghost.skills.fury.active=false;ghost.atkInterval=2000;ghost.atk/=1.5;}
  // Stun (震撼)
  if(lv>=7&&ghost.skills.stun.cd<=ts&&ghost.scratching&&Math.random()<.01){
    const dmg=Math.floor(G.playerRoom.door.maxHp*.3);
    if(!G.shieldActive){G.playerRoom.door.hp-=dmg;screenShake=12;addFloat(ghost.x,ghost.y-25,'💥震撼!','#aa44ff');
      if(G.playerRoom.door.hp<=0){G.playerRoom.door.hp=0;gameOver(false)}}
    ghost.skills.stun.cd=ts+25000;
    // Charm counter
    if(G.specials.charm&&Math.random()<.3){ghost.stunned=true;ghost.stunEnd=ts+3000;addFloat(ghost.x,ghost.y-30,'📿封印!','#38bdf8')}
  }
  // Stealth
  if(lv>=10&&!ghost.stealthActive&&ghost.skills.stealth.cd<=ts&&ghost.hp<ghost.maxHp*.4){
    ghost.stealthActive=true;ghost.skills.stealth.active=true;ghost.skills.stealth.end=ts+3000;ghost.skills.stealth.cd=ts+30000;
    addFloat(ghost.x,ghost.y-25,'👁️隐身!','rgba(255,255,255,.5)');
  }
  if(ghost.stealthActive&&ts>ghost.skills.stealth.end){ghost.stealthActive=false;ghost.skills.stealth.active=false}
}

/* ── 猎梦者模式更新 ── */
function updateHunter(ts,dt){
  const h=G.hunter;if(!h)return;
  // Find weakest room to target
  if(!h.targetRoom||h.targetRoom.door.hp<=0){
    const alive=G.aiRooms.filter(r=>r.door.hp>0);
    if(alive.length===0){gameOver(true);return}
    h.targetRoom=alive.reduce((a,b)=>a.door.hp<b.door.hp?a:b);
  }
  // Auto-move toward target door
  const tr=h.targetRoom;
  const targetX=tr.x+RC*TILE/2,targetY=G.corrY+CORR_H/2;
  const dx=targetX-h.x,dy=targetY-h.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>25){
    const spd=h.speed*(h.furyActive?1.5:1)*(dt/1000);
    h.x+=dx/dist*spd;h.y+=dy/dist*spd;h.scratchFrame=0;
  }else{
    // Scratching door!
    h.scratchTimer+=dt;h.scratchFrame=(h.scratchFrame+dt*.005)%3;
    if(ts-h.lastAtk>=h.atkInterval){
      h.lastAtk=ts;
      // Must answer question to attack
      triggerHunterQuiz();
    }
  }
  // AI turrets shoot at hunter
  if(!h.stealthActive){
    G.aiRooms.forEach(r=>{
      r.grid.flat().forEach(cell=>{
        if(!cell||cell.type!=='turret')return;
        if(ts-(cell.lastShot||0)<cell.speed)return;
        const cdx=h.x-cell.px,cdy=h.y-cell.py,cd=Math.sqrt(cdx*cdx+cdy*cdy);
        if(cd<(cell.range||3)*TILE){
          cell.lastShot=ts;h.hp-=cell.dmg;addFloat(h.x,h.y-10,`-${cell.dmg}`,'#ef4444');
          if(h.hp<=0)gameOver(false);
        }
      });
    });
  }
  // Skill cooldown UI
  updateHunterSkillUI(ts);
}

function moveHunter(dx,dy){if(!G||!G.hunter)return;G.hunter.x+=dx*30;G.hunter.y+=dy*30}
function hunterAttack(){if(!G||!G.hunter)return;triggerHunterQuiz()}

function useHunterSkill(skill){
  if(!G||!G.hunter)return;const h=G.hunter,ts=performance.now();
  if(skill==='fury'&&h.level>=4&&h.skills.fury.cd<=ts){
    h.furyActive=true;h.skills.fury.end=ts+5000;h.skills.fury.cd=ts+20000;h.atkInterval=750;h.atk*=1.5;
    addFloat(h.x,h.y-25,'🔥狂暴!','#ff4444');
    setTimeout(()=>{h.furyActive=false;h.atkInterval=1500;h.atk/=1.5},5000);
  }
  if(skill==='stun'&&h.level>=7&&h.skills.stun.cd<=ts){
    if(h.targetRoom){const dmg=Math.floor(h.targetRoom.door.maxHp*.3);h.targetRoom.door.hp-=dmg;screenShake=12;
      addFloat(h.x,h.y-25,'💥震撼!','#aa44ff');h.skills.stun.cd=ts+25000;
      if(h.targetRoom.door.hp<=0){h.targetRoom.door.hp=0;h.targetRoom=null}}
  }
  if(skill==='stealth'&&h.level>=10&&h.skills.stealth.cd<=ts){
    h.stealthActive=true;h.skills.stealth.end=ts+3000;h.skills.stealth.cd=ts+30000;
    addFloat(h.x,h.y-25,'👁️隐身!','rgba(255,255,255,.5)');
    setTimeout(()=>{h.stealthActive=false},3000);
  }
  if(skill==='heal'&&h.skills.summon&&h.skills.summon.cd<=ts){
    h.hp=Math.min(h.maxHp,h.hp+h.maxHp*.5);h.skills.summon.cd=ts+30000;
    addFloat(h.x,h.y-25,'💚回复!','#4ade80');
  }
}
function updateHunterSkillUI(ts){
  const h=G.hunter;
  ['fury','stun','stealth'].forEach(s=>{
    const el=document.getElementById('skill'+s.charAt(0).toUpperCase()+s.slice(1));
    if(!el)return;
    const cdLeft=Math.max(0,h.skills[s].cd-ts);
    const cdMax=GHOST_SKILLS[s]?.cd||20000;
    el.style.setProperty('--cd',(cdLeft/cdMax*100)+'%');
    el.classList.toggle('cd',cdLeft>0||h.level<(GHOST_SKILLS[s]?.lvReq||99));
  });
}

function showWaveNum(n){const el=document.getElementById('waveNum');el.textContent=`第${n}波`;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500)}

/* ── 胜负 ── */
function checkWin(){
  if(G.mode==='hunter'){const alive=G.aiRooms.filter(r=>r.door.hp>0);if(alive.length===0)gameOver(true)}
  else{const alive=G.ghosts.filter(g=>!g.dead);if(alive.length===0&&G.wave>=G.maxWaves)gameOver(true)}
}
function gameOver(won){
  G.gameOver=true;G.won=won;
  const elapsed=Math.floor((Date.now()-G.startTime)/1000);
  const honeyEarned=won?G.cfg.honeyReward+Math.floor(G.totalCorrect*2):Math.floor(G.cfg.honeyReward*.2);
  SAVE.honey+=honeyEarned;SAVE.totalGhosts+=G.ghosts.filter(g=>g.dead).length;
  SAVE.totalCorrect+=G.totalCorrect;SAVE.totalAnswered+=G.totalAnswered;
  if(won)SAVE.clears[G.diff]=(SAVE.clears[G.diff]||0)+1;saveSave(SAVE);
  const wrap=document.getElementById('resultWrap');
  wrap.innerHTML=`<h2>${won?(G.mode==='hunter'?'👻 宿舍全灭!':'🎉 驱鬼成功!'):'💀 '+(G.mode==='hunter'?'被炮台击杀...':'宿舍沦陷...')}</h2>
    <div class="result-ghost">${won?'✨':'💀'}</div>
    <div class="r-grid">
      <div class="r-cell"><div class="rv" style="color:var(--blood2)">${G.wave}/${G.maxWaves}</div><div class="rl">波次</div></div>
      <div class="r-cell"><div class="rv" style="color:var(--gold)">${G.totalCorrect}/${G.totalAnswered}</div><div class="rl">答题正确率</div></div>
    </div>
    <div class="r-rewards"><div style="color:var(--honey);font-size:1.2rem;font-weight:900">🍯 +${honeyEarned} 蜜罐币</div>
    <div style="font-size:.7rem;color:var(--text2);margin-top:4px">用时${Math.floor(elapsed/60)}分${elapsed%60}秒 · ${G.subj.name}</div></div>
    <div class="result-btns"><button class="ob" onclick="goMenu()">返回大厅</button><button class="ob" style="border-color:rgba(74,222,128,.3);color:var(--ghost)" onclick="initGame('${G.diff}',G.ais)">再来一局</button></div>`;
  switchScreen('resultScr');document.getElementById('hunterCtrl').classList.remove('on');
}

function closeQuit(){document.getElementById('quitOvl').classList.remove('on')}
function doQuit(){closeQuit();G.gameOver=true;document.getElementById('hunterCtrl').classList.remove('on');goMenu()}

/* ═══ 渲染 + 答题 + 建筑 + 商店 ═══ */

/* ── 渲染 ── */
const FL_A='#5a8a8a',FL_B='#4d7a7a',CO_C='#c8c3b4',CO_D='#b0ab9c';
function render(){
  const c=G.ctx,W=G.W,H=G.H;G.frameCount++;c.clearRect(0,0,W,H);
  c.save();
  if(screenShake>0){c.translate(Math.random()*screenShake-screenShake/2,Math.random()*screenShake-screenShake/2);screenShake*=.85;if(screenShake<.5)screenShake=0}
  c.fillStyle='#0e1018';c.fillRect(0,0,W,H);
  // Rain
  c.strokeStyle='rgba(100,140,180,.1)';c.lineWidth=1;
  rainDrops.forEach(d=>{d.y+=d.v*.016;if(d.y>H){d.y=-10;d.x=Math.random()*W}c.beginPath();c.moveTo(d.x,d.y);c.lineTo(d.x,d.y+d.s);c.stroke()});
  // Corridor
  const cy=G.corrY;
  for(let tx=0;tx<W;tx+=TILE/2){c.fillStyle=Math.floor(tx/(TILE/2))%2?CO_C:CO_D;c.fillRect(tx,cy,TILE/2,CORR_H)}
  c.fillStyle='#3a3d4a';c.fillRect(0,cy-2,W,2);c.fillRect(0,cy+CORR_H,W,2);
  if(G.wave>0){c.fillStyle='rgba(180,0,0,.1)';c.font='bold 18px sans-serif';c.textAlign='center';c.fillText(`Wave ${G.wave}/${G.maxWaves}`,W/2,cy+CORR_H/2+5)}
  // Danger overlay
  if(G.mode!=='hunter'&&G.playerRoom&&G.playerRoom.door.hp<G.playerRoom.door.maxHp*.3){const a=.06+Math.sin(G.dangerPulse)*.04;c.fillStyle=`rgba(200,0,0,${a})`;c.fillRect(0,0,W,H)}
  // Rooms
  G.rooms.forEach(rm=>drawRoom(c,rm));
  // ═══ PREP PHASE RENDERING ═══
  if(G.prep&&G.prep.active){
    // Draw running sprites in corridor
    G.prep.sprites.forEach(sp=>{
      if(sp.state==='sleeping')return;
      const by=Math.sin(sp.bob)*3;
      c.save();
      // Shadow
      c.fillStyle='rgba(0,0,0,.3)';c.beginPath();c.ellipse(sp.x,sp.y+12,8,3,0,0,Math.PI*2);c.fill();
      // Body
      c.font='18px sans-serif';c.textAlign='center';c.textBaseline='middle';
      c.fillText(sp.icon,sp.x,sp.y+by);
      // Name tag
      c.fillStyle=sp.isPlayer?'#4ade80':'#aaa';c.font='bold 8px sans-serif';
      c.fillText(sp.name,sp.x,sp.y-14+by);
      // Running legs animation
      if(sp.state==='running'){const lf=Math.floor(performance.now()/150)%2;
        c.strokeStyle=sp.isPlayer?'#4ade80':'#888';c.lineWidth=1.5;
        c.beginPath();c.moveTo(sp.x-3,sp.y+10);c.lineTo(sp.x-3+(lf?-3:3),sp.y+17);c.stroke();
        c.beginPath();c.moveTo(sp.x+3,sp.y+10);c.lineTo(sp.x+3+(lf?3:-3),sp.y+17);c.stroke()}
      c.restore();
    });
    // Draw prep ghost
    const pg=G.prep.prepGhost;
    if(pg){
      const by=Math.sin(pg.bob)*3,gx=pg.x,gy=pg.y+by;
      c.save();c.shadowColor='rgba(255,50,50,.6)';c.shadowBlur=14;
      c.fillStyle='#ff4444';
      c.beginPath();c.arc(gx,gy-8,12,Math.PI,0);c.rect(gx-12,gy-8,24,12);c.fill();
      c.fillStyle='#ff0';c.fillRect(gx-5,gy-10,3,4);c.fillRect(gx+2,gy-10,3,4);
      for(let i=0;i<3;i++){c.fillStyle='#ff4444';c.fillRect(gx-12+i*8,gy+4,7,4+Math.sin(pg.bob+i)*2)}
      // Scratch effect
      if(pg.scratchFrame>0){const sf=Math.floor(pg.scratchFrame)%3;
        c.strokeStyle='#ff6666';c.lineWidth=2;
        for(let i=0;i<3;i++){c.beginPath();c.moveTo(gx-8+i*5+(sf-1)*3,gy-14);c.lineTo(gx-8+i*5+(sf-1)*3+2,gy-4);c.stroke()}}
      c.fillStyle='#ff4444';c.font='bold 8px sans-serif';c.textAlign='center';c.fillText('👹猛鬼',gx,gy-22);
      c.restore();
    }
    // Prep countdown big circle
    const sec=Math.max(0,Math.ceil(G.prep.timer/1000));
    c.save();c.globalAlpha=.15;c.fillStyle='#c8c3b4';c.font='bold 120px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(sec,W/2,H*.2);c.globalAlpha=1;c.restore();
    // "Click room" hint arrows on empty rooms
    if(!G.prep.playerChosen){
      G.rooms.forEach(rm=>{
        if(rm.occupant||rm.door.hp<=0)return;
        const px=rm.x+RC*TILE/2,py=rm.y+RR*TILE/2;
        const pulse=Math.sin(performance.now()*.004)*4;
        c.strokeStyle='rgba(74,222,128,.5)';c.lineWidth=2;c.setLineDash([4,3]);
        c.strokeRect(rm.x-3,rm.y-3,RC*TILE+6,RR*TILE+6);c.setLineDash([]);
        c.fillStyle='#4ade80';c.font='bold 9px sans-serif';c.textAlign='center';
        c.fillText('👆点击入住',px,py+pulse);
      });
    }
    // Quiz remaining indicator
    if(G.prep.playerChosen){const left=G.prep.maxQuiz-G.prep.quizUsed;
      c.fillStyle='#fbbf24';c.font='bold 10px sans-serif';c.textAlign='left';
      c.fillText(`📝 剩余答题机会: ${left}/${G.prep.maxQuiz}`,10,H-12)}
  }
  // Ghosts (sleeper mode)
  if(G.mode!=='hunter'&&(!G.prep||!G.prep.active)){
    G.ghosts.forEach(ghost=>{if(ghost.dead)return;drawGhost(c,ghost)});
  }
  // Hunter player ghost
  if(G.mode==='hunter'&&G.hunter&&(!G.prep||!G.prep.active)){drawHunterGhost(c,G.hunter)}
  // Bullets
  G.bullets.forEach(b=>{c.save();c.shadowColor='#fbbf24';c.shadowBlur=6;c.fillStyle='#fbbf24';c.beginPath();c.arc(b.x,b.y,3,0,Math.PI*2);c.fill();c.restore()});
  // Floats
  const now=performance.now();
  G.floats.forEach(f=>{const a=(now-f.t)/900;c.globalAlpha=1-a;c.fillStyle=f.color;c.font='bold 12px sans-serif';c.textAlign='center';c.fillText(f.text,f.x,f.y-a*28);c.globalAlpha=1});
  c.restore();
}

function drawRoom(c,rm){
  const rw=RC*TILE,rh=RR*TILE,rx=rm.x,ry=rm.y,isP=rm.isPlayer;
  if(rm.atkFlash>0){rm.atkFlash--;c.fillStyle=`rgba(200,0,0,${rm.atkFlash*.04})`;c.fillRect(rx-6,ry-6,rw+12,rh+12)}
  c.fillStyle='#2a2d3a';c.fillRect(rx-3,ry-3,rw+6,rh+6);
  if(!rm.light||rm.door.hp<=0){c.fillStyle='rgba(0,0,0,.7)';c.fillRect(rx,ry,rw,rh);
    if(rm.door.hp<=0){c.fillStyle='rgba(200,0,0,.15)';c.font='bold 14px sans-serif';c.textAlign='center';c.fillText('💀 已陷落',rx+rw/2,ry+rh/2)}
    else if(G.prep&&G.prep.active&&!rm.occupant){c.fillStyle='rgba(255,255,255,.08)';c.font='bold 11px sans-serif';c.textAlign='center';c.fillText('🏚️ 空房',rx+rw/2,ry+rh/2)}
    return}
  // Floor tiles
  for(let r=0;r<RR;r++){for(let col=0;col<RC;col++){
    const tx=rx+col*TILE,ty=ry+r*TILE;const cell=rm.grid[r][col];
    c.fillStyle=cell?(isP?'#2a4a5e':'#2a3a4e'):((r+col)%2?FL_A:FL_B);
    c.fillRect(tx,ty,TILE-1,TILE-1);
    c.strokeStyle='rgba(0,0,0,.1)';c.lineWidth=1;c.strokeRect(tx,ty,TILE-1,TILE-1);
    if(cell){const bd=BUILDINGS[cell.type];c.font='1.1em sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(bd?bd.icon:'?',tx+TILE/2,ty+TILE/2);
      if(cell.level>0){c.fillStyle='#fbbf24';c.font='bold 7px sans-serif';c.fillText('Lv'+(cell.level+1),tx+TILE/2,ty+TILE-3)}}
    else if(isP&&G.mode!=='hunter'&&(!G.prep||!G.prep.active)){c.fillStyle='rgba(255,255,255,.06)';c.font='12px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText('+',tx+TILE/2,ty+TILE/2)}
  }}
  // Bed
  c.font='1.1em sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText('🛏️',rx+(RC-1)*TILE+TILE/2,ry+TILE/2);
  if(isP){c.fillStyle='#fbbf24';c.font='bold 7px sans-serif';c.fillText('Lv'+(rm.bed.level+1),rx+(RC-1)*TILE+TILE/2,ry+TILE-3)}
  // Sleeping occupant during prep
  if(rm.sleeping&&rm.occupant){c.save();const bx=rx+(RC-1)*TILE+TILE/2,by=ry+TILE/2;
    c.font='12px sans-serif';c.textAlign='center';c.fillText(rm.occupant.icon,bx,by-8);
    // Zzz animation
    const zt=performance.now()*.002;c.globalAlpha=.6+Math.sin(zt)*.3;
    c.fillStyle='#8b9dc3';c.font='bold 8px sans-serif';c.fillText('💤',bx+12,by-14+Math.sin(zt)*3);
    c.globalAlpha=1;c.restore();
    // Name under bed
    c.fillStyle=rm.isPlayer?'#4ade80':'#9ca3af';c.font='bold 7px sans-serif';c.textAlign='center';
    c.fillText(rm.occupant.name,bx,by+14);
  }
  // Door
  const dw=rw*.5,dh=6;let dx=rx+rw/2-dw/2,dy=rm.side===0?ry+rh:ry-dh;
  const pct=rm.door.hp/rm.door.maxHp;
  c.fillStyle=pct>.5?'#5a6a7e':pct>.2?'#8b6830':'#cc3030';c.fillRect(dx,dy,dw,dh);
  c.fillStyle='#222';c.fillRect(dx,dy+(rm.side===0?dh:-4),dw,3);
  c.fillStyle=pct>.5?'#4ade80':pct>.2?'#fbbf24':'#ef4444';c.fillRect(dx,dy+(rm.side===0?dh:-4),dw*Math.max(0,pct),3);
  if(isP&&G.shieldActive){c.strokeStyle='#38bdf8';c.lineWidth=2;c.strokeRect(dx-2,dy-2,dw+4,dh+4)}
  // Door level label
  if(rm.door.level>0){c.fillStyle='#aaa';c.font='bold 6px sans-serif';c.textAlign='center';c.fillText('🚪Lv'+(rm.door.level+1),rx+rw/2,dy+(rm.side===0?dh+9:-8))}
  // Label
  if(isP&&G.mode!=='hunter'){c.strokeStyle='rgba(74,222,128,.3)';c.lineWidth=2;c.strokeRect(rx-5,ry-5,rw+10,rh+10);
    c.fillStyle='#4ade80';c.font='bold 8px sans-serif';c.textAlign='center';c.fillText('👤 你',rx+rw/2,rm.side===0?ry-7:ry+rh+11)}
  else if(!G.prep||!G.prep.active){const ai=G.ais[(rm.side*3+rm.idx)%G.ais.length];if(ai){c.fillStyle='#777';c.font='7px sans-serif';c.textAlign='center';c.fillText(`${ai.icon}${ai.name}`,rx+rw/2,rm.side===0?ry-5:ry+rh+9)}}
}

function drawGhost(c,ghost){
  ghost.bob+=.08;ghost.glow=(ghost.glow+.05)%6.28;
  const bY=Math.sin(ghost.bob)*2,gx=ghost.x,gy=ghost.y+bY;
  const sz=ghost.isBoss?24:16;
  c.save();
  if(ghost.stealthActive)c.globalAlpha=.2;
  c.shadowColor=ghost.furyActive?'rgba(255,0,0,.8)':ghost.isBoss?'rgba(200,0,0,.5)':'rgba(100,255,100,.3)';
  c.shadowBlur=ghost.furyActive?16:8+Math.sin(ghost.glow)*3;
  c.fillStyle=ghost.furyActive?'#ff2222':ghost.isBoss?'#cc3333':'#e0e0e0';
  c.beginPath();c.arc(gx,gy-sz/3,sz/2,Math.PI,0);c.rect(gx-sz/2,gy-sz/3,sz,sz/2);c.fill();
  c.fillStyle='#111';c.fillRect(gx-5,gy-sz/3-1,3,4);c.fillRect(gx+2,gy-sz/3-1,3,4);
  // Scratch animation
  if(ghost.scratching){
    const sf=Math.floor(ghost.scratchFrame)%3;
    const offsets=[[-8,-4],[0,-8],[8,-4]];
    c.strokeStyle=ghost.furyActive?'#ff4444':'#aaa';c.lineWidth=2;
    for(let i=0;i<3;i++){c.beginPath();c.moveTo(gx+offsets[sf][0]+i*3,gy-sz/2);c.lineTo(gx+offsets[sf][0]+i*3+2,gy-sz/2+8);c.stroke()}
  }
  // Wiggly bottom
  for(let i=0;i<3;i++){c.fillStyle=ghost.furyActive?'#ff2222':ghost.isBoss?'#cc3333':'#e0e0e0';c.fillRect(gx-sz/2+i*(sz/3),gy+sz/6,sz/3-1,4+Math.sin(ghost.bob+i)*2)}
  c.restore();
  // HP bar
  const bw=ghost.isBoss?36:26;
  c.fillStyle='#222';c.fillRect(gx-bw/2,gy-sz-6,bw,4);
  const hp=ghost.hp/ghost.maxHp;c.fillStyle=hp>.5?'#4ade80':hp>.2?'#fbbf24':'#ef4444';
  c.fillRect(gx-bw/2+1,gy-sz-5,(bw-2)*Math.max(0,hp),2);
  c.fillStyle='#aaa';c.font='bold 7px sans-serif';c.textAlign='center';c.fillText(`Lv${ghost.level}`,gx,gy-sz-9);
  // Skill icons
  if(ghost.furyActive){c.fillStyle='#ff4444';c.font='8px sans-serif';c.fillText('🔥',gx+bw/2+5,gy-sz-4)}
  if(ghost.stealthActive){c.fillStyle='#fff';c.font='8px sans-serif';c.fillText('👁️',gx-bw/2-8,gy-sz-4)}
}

function drawHunterGhost(c,h){
  const sz=28,gx=h.x,gy=h.y;
  c.save();
  if(h.stealthActive)c.globalAlpha=.3;
  c.shadowColor=h.furyActive?'rgba(255,0,0,.9)':'rgba(170,68,255,.6)';c.shadowBlur=h.furyActive?20:12;
  c.fillStyle=h.furyActive?'#ff2222':'#9966ff';
  c.beginPath();c.arc(gx,gy-sz/3,sz/2,Math.PI,0);c.rect(gx-sz/2,gy-sz/3,sz,sz/2);c.fill();
  c.fillStyle='#ff0';c.fillRect(gx-6,gy-sz/3-2,4,5);c.fillRect(gx+2,gy-sz/3-2,4,5);
  for(let i=0;i<3;i++){c.fillStyle=h.furyActive?'#ff2222':'#9966ff';c.fillRect(gx-sz/2+i*(sz/3),gy+sz/6,sz/3-1,5+Math.sin(performance.now()*.003+i)*2)}
  // Scratch animation
  if(h.scratchFrame>0){const sf=Math.floor(h.scratchFrame)%3;c.strokeStyle='#ff4444';c.lineWidth=3;
    for(let i=0;i<3;i++){c.beginPath();c.moveTo(gx-10+i*6+(sf-1)*3,gy-sz/2);c.lineTo(gx-10+i*6+(sf-1)*3+3,gy-sz/2+12);c.stroke()}}
  c.restore();
  // HP & Level
  c.fillStyle='#222';c.fillRect(gx-20,gy-sz-8,40,5);
  c.fillStyle='#c084fc';c.fillRect(gx-19,gy-sz-7,38*(h.hp/h.maxHp),3);
  c.fillStyle='#c084fc';c.font='bold 8px sans-serif';c.textAlign='center';c.fillText(`👻 Lv${h.level}`,gx,gy-sz-12);
  c.fillStyle='#999';c.font='6px sans-serif';c.fillText(`HP:${Math.floor(h.hp)}/${h.maxHp}`,gx,gy+sz/2+10);
}

/* ── 点击处理 ── */
function handleCanvasClick(e){
  if(!G||G.gameOver||G.quizActive)return;
  const rect=G.canvas.getBoundingClientRect();const x=e.clientX-rect.left,y=e.clientY-rect.top;
  // PREP PHASE: delegate to prep click handler
  if(G.prep&&G.prep.active){handlePrepClick(x,y);return}
  if(G.mode==='hunter')return; // Hunter uses buttons
  if(!G.playerRoom)return;
  const rm=G.playerRoom,rw=RC*TILE,rh=RR*TILE;
  // Bed
  const bx=rm.x+(RC-1)*TILE;
  if(x>=bx&&x<=bx+TILE&&y>=rm.y&&y<=rm.y+TILE){showBedUpgrade();return}
  // Door
  const dw=rw*.5,dh=6;let ddx=rm.x+rw/2-dw/2,ddy=rm.side===0?rm.y+rh:rm.y-dh;
  if(x>=ddx-5&&x<=ddx+dw+5&&y>=ddy-10&&y<=ddy+dh+10){showDoorUpgrade();return}
  // Ghost click
  for(const ghost of G.ghosts){if(ghost.dead)continue;if(Math.abs(x-ghost.x)<20&&Math.abs(y-ghost.y)<20){triggerQuiz(ghost);return}}
  // Grid
  for(let r=0;r<RR;r++){for(let col=0;col<RC;col++){
    const gx=rm.x+col*TILE,gy=rm.y+r*TILE;
    if(x>=gx&&x<=gx+TILE&&y>=gy&&y<=gy+TILE){
      if(col===RC-1&&r===0)return; // bed slot
      G.selectedTile={r,col};
      if(rm.grid[r][col])showBuildingUpgrade(r,col);else openBuildMenu();
      return;
    }
  }}
}

/* ── 建筑菜单 ── */
const BUILD_CATS=['基础','赚钱','防御','高科技','黑科技'];
function openBuildMenu(){
  G.buildMenuOpen=true;document.getElementById('buildMenu').classList.add('open');renderBuildTabs(0);
}
function closeBuildMenu(){G.buildMenuOpen=false;document.getElementById('buildMenu').classList.remove('open')}
function renderBuildTabs(idx){
  document.getElementById('bmTabs').innerHTML=BUILD_CATS.map((c,i)=>`<button class="bm-tab${i===idx?' active':''}" onclick="renderBuildList(${i})">${c}</button>`).join('');
  renderBuildList(idx);
}
function renderBuildList(catIdx){
  document.querySelectorAll('.bm-tab').forEach((t,i)=>t.classList.toggle('active',i===catIdx));
  const cat=BUILD_CATS[catIdx];const list=document.getElementById('bmList');
  const items=Object.entries(BUILDINGS).filter(([k,v])=>(v.cat||'')==cat&&k!=='bed'&&k!=='door');
  const doorLv=G.playerRoom.door.level+1;
  list.innerHTML=items.map(([key,b])=>{
    const ct=b.costType||'gold';const cost=b.cost||0;
    const count=G.playerRoom.grid.flat().filter(c=>c&&c.type===key).length;
    const maxB=b.maxBuild||99;const full=count>=maxB;
    const canAfford=ct==='gold'?G.gold>=cost:G.elec>=cost;
    const needsItem=['repair','charm','shield','atm','fridge','trap','spike','guillotine'].includes(key);
    const hasItem=needsItem?(G.itemUses[key]||0)>0:true;
    const locked=full||!canAfford||(!hasItem&&needsItem);
    return `<div class="bm-item${locked?' locked':''}" onclick="buildWithQuiz('${key}')">
      <div class="bi-icon">${b.icon}</div><div class="bi-info">
        <div class="bi-name">${b.name}${b.maxBuild?` (${count}/${maxB})`:''}</div>
        <div class="bi-desc">${b.desc||b.levels?.[0]?.desc||''}</div>
        ${needsItem?`<div class="bi-limit">拥有${G.itemUses[key]||0}次</div>`:''}
      </div><div class="bi-cost ${ct}-cost">${ct==='gold'?'G':'⚡'} ${cost}</div></div>`;
  }).join('');
}

/* ── 答题建造 ── */
function buildWithQuiz(key){
  const b=BUILDINGS[key];if(!b)return;
  const ct=b.costType||'gold';const cost=b.cost||0;
  if(ct==='gold'&&G.gold<cost)return;if(ct==='elec'&&G.elec<cost)return;
  closeBuildMenu();
  // Trigger quiz, on correct -> build
  G.pendingBuild={key,cost,costType:ct};
  const q=getRandomQuestion(G.subj.id,G.cfg.starRange);
  if(!q){executeBuild();return}
  showQuizForAction(q,'build');
}

function executeBuild(){
  const pb=G.pendingBuild;if(!pb)return;
  const key=pb.key,b=BUILDINGS[key];
  if(pb.costType==='gold')G.gold-=pb.cost;else G.elec-=pb.cost;
  const needsItem=['repair','charm','shield','atm','fridge','trap','spike','guillotine'].includes(key);
  if(needsItem&&G.itemUses[key])G.itemUses[key]--;
  const{r,col}=G.selectedTile;
  const rm=G.playerRoom;
  const cell={type:key,level:0,lastProd:performance.now(),lastShot:0,
    px:rm.x+col*TILE+TILE/2,py:rm.y+r*TILE+TILE/2};
  if(b.levels){const lv=b.levels[0];if(lv.dmg)cell.dmg=lv.dmg;if(lv.range)cell.range=lv.range;if(lv.speed)cell.speed=lv.speed;if(lv.prod)cell.prod=lv.prod;if(lv.interval)cell.interval=lv.interval}
  if(b.prod){cell.prod=b.prod;cell.interval=b.interval||1000}
  rm.grid[r][col]=cell;
  if(['charm','shield','atm','fridge','trap','spike','guillotine'].includes(key))G.specials[key]=true;
  G.pendingBuild=null;
}

/* ── 升级界面 ── */
function showBedUpgrade(){
  const m=document.getElementById('upgradeMenu'),c=document.getElementById('umContent');
  const nextLv=G.playerRoom.bed.level+1;
  if(nextLv>=BUILDINGS.bed.levels.length){c.innerHTML='<button class="um-close" onclick="closeUpgrade()">✕</button><p style="color:#999">已达最高级!</p>';m.classList.add('open');return}
  const next=BUILDINGS.bed.levels[nextLv];
  const req=next.req;let blocked=false;
  if(req){const[t,lv]=req.split(':');if(t==='door'&&G.playerRoom.door.level<parseInt(lv)-1)blocked=true}
  c.innerHTML=`<button class="um-close" onclick="closeUpgrade()">✕</button>
    <div class="um-row${blocked?' locked':''}" onclick="${blocked?'':'upgradeWithQuiz(\"bed\")'}"">
      <div class="um-icon">🛏️</div><div class="um-info">
        <div class="um-name">床 Lv.${nextLv+1} → ${next.desc}</div>
        <div class="um-stat">${blocked?'🔒 需要门Lv'+req.split(':')[1]:'答题升级'}</div>
      </div><div class="bi-cost gold-cost">G ${next.cost}</div></div>`;
  m.classList.add('open');
}
function showDoorUpgrade(){
  const m=document.getElementById('upgradeMenu'),c=document.getElementById('umContent');
  const nextLv=G.playerRoom.door.level+1;
  if(nextLv>=BUILDINGS.door.levels.length){c.innerHTML='<button class="um-close" onclick="closeUpgrade()">✕</button><p style="color:#999">已达最高级!</p>';m.classList.add('open');return}
  const next=BUILDINGS.door.levels[nextLv];
  c.innerHTML=`<button class="um-close" onclick="closeUpgrade()">✕</button>
    <div class="um-row" onclick="upgradeWithQuiz('door')">
      <div class="um-icon">🚪</div><div class="um-info">
        <div class="um-name">门 → ${next.desc}</div><div class="um-stat">答题升级 · 升级后满血</div>
      </div><div class="bi-cost gold-cost">G ${next.cost}</div></div>`;
  m.classList.add('open');
}
function showBuildingUpgrade(r,col){
  const cell=G.playerRoom.grid[r][col];if(!cell)return;
  const b=BUILDINGS[cell.type];if(!b||!b.levels)return;
  const m=document.getElementById('upgradeMenu'),c=document.getElementById('umContent');
  const nextLv=cell.level+1;
  if(nextLv>=b.levels.length){c.innerHTML=`<button class="um-close" onclick="closeUpgrade()">✕</button><p style="color:#999">${b.name} 已满级!</p>`;m.classList.add('open');return}
  const cost=b.upgradeCosts?b.upgradeCosts[nextLv]:50;
  c.innerHTML=`<button class="um-close" onclick="closeUpgrade()">✕</button>
    <div class="um-row" onclick="upgradeWithQuiz('building',${r},${col})">
      <div class="um-icon">${b.icon}</div><div class="um-info">
        <div class="um-name">${b.name} Lv.${nextLv+1}</div>
      </div><div class="bi-cost gold-cost">G ${cost}</div></div>`;
  m.classList.add('open');
}
function closeUpgrade(){document.getElementById('upgradeMenu').classList.remove('open')}

function upgradeWithQuiz(type,r,col){
  closeUpgrade();G.pendingUpgrade={type,r,col};
  const q=getRandomQuestion(G.subj.id,G.cfg.starRange);
  if(!q){executeUpgrade();return}
  showQuizForAction(q,'upgrade');
}
function executeUpgrade(){
  const pu=G.pendingUpgrade;if(!pu)return;
  if(pu.type==='bed'){
    const nextLv=G.playerRoom.bed.level+1;if(nextLv>=BUILDINGS.bed.levels.length)return;
    const cost=BUILDINGS.bed.levels[nextLv].cost;if(G.gold<cost)return;
    G.gold-=cost;G.playerRoom.bed.level=nextLv;
  }else if(pu.type==='door'){
    const nextLv=G.playerRoom.door.level+1;if(nextLv>=BUILDINGS.door.levels.length)return;
    const cost=BUILDINGS.door.levels[nextLv].cost;if(G.gold<cost)return;
    const next=BUILDINGS.door.levels[nextLv];G.gold-=cost;G.playerRoom.door.level=nextLv;G.playerRoom.door.maxHp=next.hp;G.playerRoom.door.hp=next.hp;
  }else if(pu.type==='building'){
    const cell=G.playerRoom.grid[pu.r][pu.col];if(!cell)return;
    const b=BUILDINGS[cell.type];if(!b||!b.levels)return;
    const nextLv=cell.level+1;if(nextLv>=b.levels.length)return;
    const cost=b.upgradeCosts?b.upgradeCosts[nextLv]:50;if(G.gold<cost)return;
    G.gold-=cost;cell.level=nextLv;const lv=b.levels[nextLv];
    if(lv.dmg)cell.dmg=lv.dmg;if(lv.range)cell.range=lv.range;if(lv.speed)cell.speed=lv.speed;if(lv.prod)cell.prod=lv.prod;if(lv.interval)cell.interval=lv.interval;
  }
  G.pendingUpgrade=null;
}

/* ── 答题系统（统一） ── */
let multiSel=[];
function showQuizForAction(q,actionType){
  G.quizActive=true;G.currentQuiz={question:q,actionType,startTime:Date.now()};
  renderQuiz(q);
}
function triggerQuiz(ghost){
  if(G.quizActive)return;G.quizActive=true;
  const q=getRandomQuestion(G.subj.id,G.cfg.starRange);
  if(!q){G.quizActive=false;return}
  G.currentQuiz={question:q,ghost,actionType:'combat',startTime:Date.now()};
  renderQuiz(q);
}
function triggerHunterQuiz(){
  if(G.quizActive)return;G.quizActive=true;
  const q=getRandomQuestion(G.subj.id,G.cfg.starRange);
  if(!q){G.quizActive=false;return}
  G.currentQuiz={question:q,actionType:'hunterAttack',startTime:Date.now()};
  renderQuiz(q);
}

function renderQuiz(q){
  const box=document.getElementById('quizBox');const ov=document.getElementById('quizOverlay');
  const tn={single:'单选题',multi:'多选题',judge:'判断题',essay:'分析题'};
  const tc={single:'t-single',multi:'t-multi',judge:'t-judge',essay:'t-essay'};
  let h=`<div class="qz-header"><h3>⚔️ 答题${G.mode==='hunter'?'升级':'驱鬼'}</h3><p>${G.currentQuiz.actionType==='combat'?'答对=伤害鬼 · 答错=鬼加速':'答对=执行操作 · 答错=失败'}</p></div>`;
  h+=`<div class="qz-meta"><span class="qz-tag ${tc[q.type]}">${tn[q.type]}</span><span class="qz-tag t-kp">${q.kp}</span></div>`;
  h+=`<div class="qz-q">${q.q}</div>`;
  if(q.type==='single')h+=`<div class="qz-opts">${q.opts.map((o,i)=>`<button class="qz-opt" onclick="ansSingle(${i})"><span class="om">${'ABCD'[i]}</span>${o}</button>`).join('')}</div>`;
  else if(q.type==='multi'){h+=`<div class="qz-opts" id="multiOpts">${q.opts.map((o,i)=>`<button class="qz-opt" onclick="togMulti(${i},this)"><span class="om">${'ABCDE'[i]}</span>${o}</button>`).join('')}</div>`;h+=`<button class="essay-sub" onclick="subMulti()">确认提交</button>`}
  else if(q.type==='judge')h+=`<div class="judge-row"><button class="judge-btn" onclick="ansJudge(true)">✓ 正确</button><button class="judge-btn" onclick="ansJudge(false)">✗ 错误</button></div>`;
  else if(q.type==='essay'){h+=`<textarea class="essay-ta" id="essayInput" placeholder="请输入你的分析(100字以上)..."></textarea>`;h+=`<button class="essay-sub" onclick="subEssay()">提交分析</button>`}
  box.innerHTML=h;ov.classList.add('open');multiSel=[];
}
function ansSingle(i){const q=G.currentQuiz.question;resolveQuiz(i===q.ans,i===q.ans?2:0,q);
  document.querySelectorAll('.qz-opt').forEach((el,idx)=>{el.classList.add('disabled');if(idx===q.ans)el.classList.add('correct');if(idx===i&&i!==q.ans)el.classList.add('wrong')})}
function togMulti(i,el){if(multiSel.includes(i)){multiSel=multiSel.filter(x=>x!==i);el.classList.remove('selected')}else{multiSel.push(i);el.classList.add('selected')}}
function subMulti(){if(!multiSel.length)return;const q=G.currentQuiz.question;
  const correct=JSON.stringify(multiSel.sort())===JSON.stringify(q.ans.sort());
  const partial=!correct&&multiSel.every(i=>q.ans.includes(i))&&multiSel.length>0;
  resolveQuiz(correct||partial,correct?3:partial?1:0,q);multiSel=[]}
function ansJudge(v){const q=G.currentQuiz.question;resolveQuiz(v===q.ans,v===q.ans?2:0,q);
  document.querySelectorAll('.judge-btn').forEach((el,idx)=>{const bv=idx===0;if(bv===q.ans)el.classList.add('correct');if(bv===v&&v!==q.ans)el.classList.add('wrong')})}
function subEssay(){const input=document.getElementById('essayInput').value.trim();if(!input)return;
  const q=G.currentQuiz.question;const hits=q.keywords.filter(k=>input.toLowerCase().includes(k.toLowerCase()));
  const logicWords=['因此','所以','然而','综上','therefore','however','thus','hence'];
  const logicCount=logicWords.filter(w=>input.includes(w)).length;
  let score=Math.min(5,Math.floor(hits.length/q.keywords.length*5));
  if(input.length>200)score=Math.min(5,score+1);score=Math.min(5,score+Math.min(2,logicCount));
  resolveQuiz(score>=3,score,q)}

function resolveQuiz(correct,score,q){
  G.totalAnswered++;if(correct)G.totalCorrect++;
  const box=document.getElementById('quizBox');const at=G.currentQuiz.actionType;
  const sid=G.subj.id;SAVE.subjectStats[sid].t++;if(correct)SAVE.subjectStats[sid].c++;

  if(at==='combat'){
    const ghost=G.currentQuiz.ghost;
    if(correct){const dmg=Math.floor(ghost.maxHp*.3)+score*5;ghost.hp-=dmg;G.gold+=Math.floor(10*G.cfg.goldMul);
      addFloat(ghost.x,ghost.y-10,`-${dmg}`,'#4ade80');if(ghost.hp<=0){ghost.dead=true;checkWin()}
      box.innerHTML+=`<div class="qz-result ok">✅ 正确! 伤害${dmg} +${Math.floor(10*G.cfg.goldMul)}G</div>`}
    else{G.ghostSpeedBoost+=.1;box.innerHTML+=`<div class="qz-result fail">❌ 错误! 鬼加速10%</div>`}
  }else if(at==='build'){
    if(correct){executeBuild();box.innerHTML+=`<div class="qz-result ok">✅ 建造成功!</div>`}
    else{G.pendingBuild=null;G.ghostSpeedBoost+=.1;box.innerHTML+=`<div class="qz-result fail">❌ 建造失败! 鬼加速10%</div>`}
  }else if(at==='upgrade'){
    if(correct){executeUpgrade();box.innerHTML+=`<div class="qz-result ok">✅ 升级成功!</div>`}
    else{G.pendingUpgrade=null;G.ghostSpeedBoost+=.1;box.innerHTML+=`<div class="qz-result fail">❌ 升级失败! 鬼加速10%</div>`}
  }else if(at==='hunterAttack'){
    if(correct){const h=G.hunter,tr=h.targetRoom;if(tr){const dmg=Math.floor(h.atk*(h.furyActive?1.5:1));tr.door.hp-=dmg;tr.atkFlash=8;screenShake=6;
      addFloat(h.x,h.y-15,`-${dmg}`,'#c084fc');h.exp+=5;if(h.exp>=h.expNext){h.level++;h.maxHp+=30;h.hp=h.maxHp;h.atk+=3;h.exp=0;h.expNext*=1.4;addFloat(h.x,h.y-30,'⬆LvUP!','#c084fc')}
      if(tr.door.hp<=0){tr.door.hp=0;checkWin()}}
      box.innerHTML+=`<div class="qz-result ok">✅ 攻击成功!</div>`}
    else{box.innerHTML+=`<div class="qz-result fail">❌ 攻击失败!</div>`}
  }else if(at==='prep_bed'){
    if(correct){executePrepUpgrade('bed');box.innerHTML+=`<div class="qz-result ok">✅ 床升级成功!</div>`}
    else{box.innerHTML+=`<div class="qz-result fail">❌ 升级失败!</div>`}
  }else if(at==='prep_door'){
    if(correct){executePrepUpgrade('door');box.innerHTML+=`<div class="qz-result ok">✅ 门升级成功!</div>`}
    else{box.innerHTML+=`<div class="qz-result fail">❌ 升级失败!</div>`}
  }
  box.innerHTML+=`<div class="qz-knowledge">📖 ${q.kp}<br>💡 ${q.tip||''}</div>`;
  setTimeout(()=>{document.getElementById('quizOverlay').classList.remove('open');G.quizActive=false},1600);
}

/* ── 申论模式 ── */
function triggerEssayMode(){
  const paper=getEssayPaper(G.subj.id);
  const panel=document.getElementById('essayPanel');
  const ov=document.getElementById('essayOverlay');
  G.quizActive=true;
  panel.innerHTML=`<span class="ep-badge">🏆 命题组密卷</span>
    <div class="ep-title">${paper.title}</div>
    <div class="ep-abstract">${paper.abstract}</div>
    <div class="ep-prompt">${paper.prompt}</div>
    <textarea class="ep-textarea" id="essayModeInput" placeholder="请写出你的分析(100字以上)..."></textarea>
    <button class="ep-submit" onclick="submitEssayMode()">提交分析</button>`;
  ov.classList.add('open');G.currentEssayPaper=paper;
}
function submitEssayMode(){
  const input=document.getElementById('essayModeInput').value.trim();
  if(input.length<20)return;
  const paper=G.currentEssayPaper;
  const hits=paper.keywords.filter(k=>input.toLowerCase().includes(k.toLowerCase()));
  const logicWords=['因此','所以','然而','综上','therefore','however','thus'];
  const logicCount=logicWords.filter(w=>input.includes(w)).length;
  let score=Math.floor(hits.length/paper.keywords.length*100);
  if(input.length>200)score+=10;score+=logicCount*5;score=Math.min(100,score);
  const pass=score>=60;
  const panel=document.getElementById('essayPanel');
  const rewards=['🏆 圣水炸弹 — 全体鬼-50%HP','🏆 时间冻结 — 冻鬼10s','🏆 门修复水晶 — 满血','🏆 双倍产出30s','🏆 猎杀令 — 秒杀下只鬼'];
  const reward=rewards[Math.floor(Math.random()*rewards.length)];
  if(pass){
    panel.innerHTML+=`<div class="ep-result" style="color:var(--ghost)">✅ 得分: ${score}/100 — 通过!</div><div class="ep-reward">${reward}</div>`;
    // Apply reward
    if(reward.includes('圣水'))G.ghosts.forEach(g=>{if(!g.dead)g.hp*=.5});
    if(reward.includes('冻结'))G.ghosts.forEach(g=>{if(!g.dead){g.stunned=true;g.stunEnd=performance.now()+10000}});
    if(reward.includes('修复')){const d=G.playerRoom.door;d.hp=d.maxHp}
    if(reward.includes('双倍'))G.gold+=500;
    if(reward.includes('猎杀')){const alive=G.ghosts.find(g=>!g.dead);if(alive){alive.dead=true;checkWin()}}
  }else{
    panel.innerHTML+=`<div class="ep-result" style="color:var(--fury)">❌ 得分: ${score}/100 — 未通过</div>`;
    G.ghostSpeedBoost+=.15;
  }
  G.totalAnswered++;if(pass)G.totalCorrect++;
  setTimeout(()=>{document.getElementById('essayOverlay').classList.remove('open');G.quizActive=false},2500);
}

/* ── 蜜罐商店 ── */
function showShop(){switchScreen('shopScr');document.getElementById('shopBal').textContent=SAVE.honey;renderShopTabs(0)}
const SHOP_CATS=['高科技','黑科技'];
function renderShopTabs(idx){
  document.getElementById('shopTabs').innerHTML=SHOP_CATS.map((c,i)=>`<button class="s-tab${i===idx?' active':''}" onclick="renderShopList(${i})">${c}</button>`).join('');
  renderShopList(idx);
}
function renderShopList(idx){
  document.querySelectorAll('.s-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  const cat=SHOP_CATS[idx];const list=document.getElementById('shopList');
  list.innerHTML=SHOP_ITEMS.filter(i=>i.cat===cat).map(item=>`<div class="si">
    <div class="si-icon">${item.icon}</div><div class="si-info"><div class="si-name">${item.name}</div><div class="si-desc">${item.desc}</div><div class="si-own">拥有: ${SAVE.items[item.id]||0}</div></div>
    <button class="si-buy" onclick="buyItem('${item.id}',${item.price})">🍯 ${item.price}</button></div>`).join('');
}
function buyItem(id,price){if(SAVE.honey<price)return;SAVE.honey-=price;SAVE.items[id]=(SAVE.items[id]||0)+1;saveSave(SAVE);
  document.getElementById('shopBal').textContent=SAVE.honey;renderShopList([...document.querySelectorAll('.s-tab')].findIndex(t=>t.classList.contains('active')))}
