<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>猛鬼考研宿舍 · 北大真题密卷</title>
  <meta name="description" content="恐怖宿舍探索 x 考研四科综合模拟 — 答题保命，存活到天亮">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Noto+Sans+SC:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ghost-style.css">
</head>
<body>
  <div id="app">
    <!-- Start -->
    <section id="startScreen" class="screen">
      <div class="start-bg"></div>
      <div class="start-content">
        <div class="start-icon">👻</div>
        <h1 class="start-title">猛鬼考研宿舍</h1>
        <p class="start-sub">在闹鬼宿舍搜集真题密卷<br>答对考研题才能活到天亮</p>
        <div class="start-info">
          <span>🏚 3层12间房</span>
          <span>👻 25-30题</span>
          <span>📜 5张密卷</span>
        </div>
        <button class="btn-start" onclick="GhostApp.startGame()">🕯 进入宿舍</button>
        <a href="../index.html" class="btn-home">🏠 返回门户</a>
      </div>
    </section>

    <!-- Hallway -->
    <section id="hallScreen" class="screen hidden">
      <div class="hall-bg" id="hallBg"></div>
      <div class="hall-scanline"></div>
      <div class="hall-hud">
        <div class="hud-sanity">
          <span>🕯</span>
          <div class="sanity-bar"><div class="sanity-fill" id="sanityFill"></div></div>
          <span class="sanity-val" id="sanityVal">100</span>
        </div>
        <div class="hud-floor" id="hudFloor">1F</div>
        <div class="hud-scrolls">📜 <span id="hudScrolls">0</span>/5</div>
      </div>
      <!-- Flashlight overlay -->
      <div class="flashlight" id="flashlight"></div>
      <!-- Ghost flash -->
      <div class="hall-ghost hidden" id="hallGhost">👻</div>
      <!-- Doors -->
      <div class="hall-doors" id="hallDoors"></div>
      <!-- Floor nav -->
      <div class="hall-nav">
        <button class="nav-btn" id="navDown" onclick="GhostApp.changeFloor(-1)">⬇ 下楼</button>
        <span class="nav-floor" id="navFloorLabel">1F 走廊</span>
        <button class="nav-btn" id="navUp" onclick="GhostApp.changeFloor(1)">⬆ 上楼</button>
      </div>
      <!-- Hall warning -->
      <div class="hall-warn hidden" id="hallWarn">有什么东西在靠近...</div>
    </section>

    <!-- Room -->
    <section id="roomScreen" class="screen hidden">
      <div class="room-bg"></div>
      <div class="room-scanline"></div>
      <div class="room-hud">
        <button class="hud-back" onclick="GhostApp.exitRoom()">← 离开</button>
        <span class="room-label" id="roomLabel">Room 101</span>
        <div class="hud-sanity-mini">🕯 <span id="roomSanity">100</span></div>
      </div>
      <!-- Hotspots -->
      <div class="room-scene" id="roomScene">
        <div class="hotspot hs-desk" onclick="GhostApp.searchSpot('desk')">
          <span class="hs-icon">📜</span>
          <span class="hs-label">桌面</span>
        </div>
        <div class="hotspot hs-closet" onclick="GhostApp.searchSpot('closet')">
          <span class="hs-icon">🚪</span>
          <span class="hs-label">衣柜</span>
        </div>
        <div class="hotspot hs-bed" onclick="GhostApp.searchSpot('bed')">
          <span class="hs-icon">🔦</span>
          <span class="hs-label">床底</span>
        </div>
      </div>
      <!-- Search result popup -->
      <div class="room-found hidden" id="roomFound">
        <div class="found-icon" id="foundIcon">📜</div>
        <div class="found-text" id="foundText">发现了什么...</div>
      </div>
    </section>

    <!-- Ghost Encounter -->
    <section id="ghostScreen" class="screen hidden">
      <div class="ghost-bg"></div>
      <div class="ghost-vignette"></div>
      <div class="ghost-static"></div>
      <div class="ghost-figure" id="ghostFigure">👻</div>
      <div class="ghost-speech" id="ghostSpeech">答对...就放你走...</div>
      <div class="ghost-question" id="ghostQuestion">
        <div class="gq-subject" id="gqSubject">政治</div>
        <div class="gq-timer"><span id="gqTimer">10</span>s</div>
        <div class="gq-text" id="gqText">Loading...</div>
        <div class="gq-options" id="gqOptions"></div>
      </div>
      <!-- Answer result -->
      <div class="ghost-result hidden" id="ghostResult">
        <div class="gr-icon" id="grIcon">✅</div>
        <div class="gr-text" id="grText">正确!</div>
        <div class="gr-explain" id="grExplain"></div>
        <button class="btn-ghost-continue" onclick="GhostApp.afterGhost()">继续</button>
      </div>
    </section>

    <!-- Jump Scare -->
    <div class="jumpscare hidden" id="jumpScare">
      <div class="js-face">👹</div>
    </div>

    <!-- Game Over -->
    <section id="overScreen" class="screen hidden">
      <div class="over-bg"></div>
      <div class="over-card">
        <div class="over-icon" id="overIcon">💀</div>
        <h2 class="over-title" id="overTitle">理智崩溃...</h2>
        <div class="over-sub" id="overSub">你被厉鬼抓走了</div>
        <div class="over-grid">
          <div class="og"><span class="og-l">存活</span><span class="og-v" id="ogTime">0:00</span></div>
          <div class="og"><span class="og-l">密卷</span><span class="og-v" id="ogScrolls">0/5</span></div>
          <div class="og"><span class="og-l">答题</span><span class="og-v" id="ogTotal">0</span></div>
          <div class="og"><span class="og-l">正确率</span><span class="og-v" id="ogAcc">0%</span></div>
          <div class="og"><span class="og-l">击退鬼</span><span class="og-v" id="ogGhosts">0</span></div>
          <div class="og"><span class="og-l">灵气</span><span class="og-v" id="ogQi">+0</span></div>
        </div>
        <div class="over-learn" id="overLearn"></div>
        <div class="over-btns">
          <button class="btn-start" onclick="GhostApp.startGame()">🏚 再闯一次</button>
          <button class="btn-home" onclick="location.href='../index.html'">🏠 返回</button>
        </div>
      </div>
    </section>
  </div>

  <script src="ghost-data.js"></script>
  <script src="ghost-engine.js"></script>
  <script src="ghost-app.js"></script>
</body>
</html>
