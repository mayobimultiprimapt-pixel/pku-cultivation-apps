<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>顾枢 · 记忆法宝 | PKU Memory Engine</title>
    <!-- 引入统一 Core SDK -->
    <script src="../shared/pku-core-sdk.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --accent: #818cf8;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.05), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 顶部导航 */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 2px; color: var(--primary); }
        .stats { font-size: 0.9rem; color: var(--text-muted); }

        /* 主体内容 */
        main { flex: 1; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; }

        /* 卡片库选择 */
        .hub-panel {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .btn-sync {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
            transition: transform 0.2s;
            margin: 10px;
        }
        .btn-sync:active { transform: scale(0.95); }

        /* 学习卡片区 */
        .card-container {
            flex: 1;
            display: none; /* 初始隐藏 */
            flex-direction: column;
            gap: 20px;
        }
        .flashcard {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            transition: all 0.3s ease;
        }
        .card-meta {
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }
        
        .question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #fff;
        }

        .answer-area textarea {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            font-size: 1rem;
            resize: none;
            outline: none;
            margin-bottom: 15px;
            font-family: inherit;
        }
        .answer-area textarea:focus { border-color: var(--primary); }

        /* 操作按钮 */
        .action-row {
            display: flex;
            gap: 15px;
        }
        .btn-submit {
            flex: 1;
            background: var(--primary);
            border: none;
            color: #111;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; }

        /* 批改结果区 */
        .feedback-area {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed var(--glass-border);
        }
        .ai-score {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--success);
            text-align: center;
            margin-bottom: 15px;
        }
        .ai-comment {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #ccc;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
        }

        .sm2-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: space-between;
        }
        .btn-rating {
            flex: 1;
            padding: 10px 5px;
            border: none;
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-rating:hover { background: rgba(255,255,255,0.2); border-bottom: 2px solid var(--primary); }

        /* 加载动画 */
        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--primary);
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

<header>
    <h1>顾枢 · 记忆法宝</h1>
    <div class="stats" id="statsDisplay">待复习: 0</div>
</header>

<main>
    <!-- 拉取界面 -->
    <div class="hub-panel" id="hubPanel">
        <p style="margin-bottom: 15px; color: var(--text-muted);">从金库同步最新主观题，注入记忆网</p>
        <button class="btn-sync" onclick="fetchSubjective('101')">同步 101 政治大题</button>
        <button class="btn-sync" onclick="fetchSubjective('408')">同步 408 计算机简答</button>
        <div style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.1);padding-top:20px;">
            <button class="btn-sync" style="background:transparent;border:1px solid var(--primary);color:var(--primary)" onclick="startReviewSession()">开始今日复习</button>
        </div>
    </div>

    <!-- 学习卡片 -->
    <div class="card-container" id="cardContainer">
        <div class="flashcard">
            <div class="card-meta">
                <span id="cardSubject">科目: 101</span>
                <span id="cardLevel">难度: 中等</span>
            </div>
            <div class="question-text" id="qText">这里是题目内容...</div>
            
            <div class="answer-area" id="answerArea">
                <textarea id="userAnswer" placeholder="写下你的思路或背诵内容..."></textarea>
                <div class="action-row">
                    <button class="btn-submit" onclick="submitToAI()">顾枢批改 (AI)</button>
                    <button class="btn-submit" style="background:transparent;border:1px solid var(--text-muted);color:var(--text-muted)" onclick="showAnswer()">直接看答案</button>
                </div>
            </div>

            <div class="loader" id="aiLoader">顾枢正在审阅你的答卷...</div>

            <div class="feedback-area" id="feedbackArea">
                <div class="ai-score" id="aiScore">得分: -- / 5</div>
                <div class="ai-comment" id="aiComment"></div>
                <div class="ai-comment" style="margin-top:10px; color:var(--primary); font-size:0.85rem;" id="stdAnswer"></div>
                
                <p style="text-align:center; margin-top:20px; font-size:0.9rem; color:var(--text-muted)">根据掌握程度安排下次复习</p>
                <div class="sm2-controls">
                    <button class="btn-rating" style="border-color:var(--danger)" onclick="rateMemory(1)">完全忘记 (1)</button>
                    <button class="btn-rating" onclick="rateMemory(3)">勉强回忆 (3)</button>
                    <button class="btn-rating" style="border-color:var(--success)" onclick="rateMemory(5)">倒背如流 (5)</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
// --- 核心状态 ---
let memoryBank = JSON.parse(localStorage.getItem('gushu_memory_bank')) || {};
let reviewQueue = [];
let currentIndex = -1;
let currentItem = null;

// 初始化统计
function updateStats() {
    const now = new Date().toISOString();
    const count = Object.values(memoryBank).filter(item => !item.sm2 || item.sm2.nextReview <= now).length;
    document.getElementById('statsDisplay').textContent = `待复习: ${count} 题`;
}
updateStats();

// --- 1. 从中转阁拉取主观题 ---
async function fetchSubjective(subject) {
    if (!PKUSDK.Auth.isLoggedIn()) return alert('请先在应用集大厅登录！');
    
    document.getElementById('hubPanel').innerHTML += '<p style="color:var(--primary);margin-top:10px;">正在沟通中转阁...</p>';
    try {
        const res = await PKUSDK.Questions.fetch(subject, { count: 50 });
        if(res.fromRelay) {
            let addCount = 0;
            res.questions.forEach(q => {
                // 筛选主观题 (analysis/essay/short-answer 等，或者干脆过滤没有选项的)
                if (q.type && q.type.includes('分析') || q.type.includes('简答') || q.type.includes('essay') || (!q.options || q.options.length===0)) {
                    const id = q.id || btoa(q.stem).substring(0,10);
                    if (!memoryBank[id]) {
                        memoryBank[id] = { ...q, sm2: null, internalId: id, subj: subject };
                        addCount++;
                    }
                }
            });
            localStorage.setItem('gushu_memory_bank', JSON.stringify(memoryBank));
            alert(`✅ 成功从中转阁同步 ${addCount} 道新主观大题入库！`);
            updateStats();
            location.reload();
        } else {
            alert('中转阁暂无数据，请先前往题库搜集站采集密卷！');
        }
    } catch(e) {
        alert('拉取失败: ' + e.message);
    }
}

// --- 2. 启动复习会话 ---
function startReviewSession() {
    const now = new Date().toISOString();
    // 选出没有 sm2 记录（新题），或 nextReview 已到的旧题
    reviewQueue = Object.values(memoryBank).filter(item => !item.sm2 || item.sm2.nextReview <= now);
    
    if (reviewQueue.length === 0) {
        return alert('🎉 今日所有主观题均已复习完毕！去玩会游戏放松下吧！');
    }

    // 打乱队列
    reviewQueue.sort(() => Math.random() - 0.5);
    
    document.getElementById('hubPanel').style.display = 'none';
    document.getElementById('cardContainer').style.display = 'flex';
    currentIndex = 0;
    showNextCard();
}

// --- 3. 卡片渲染逻辑 ---
function showNextCard() {
    if (currentIndex >= reviewQueue.length) {
        alert('🎉 今日复习会话完成！');
        location.reload();
        return;
    }
    
    currentItem = reviewQueue[currentIndex];
    
    // UI Reset
    document.getElementById('qText').innerHTML = (currentItem.stem || currentItem.q).replace(/\n/g, '<br>');
    document.getElementById('cardSubject').textContent = `科目: ${currentItem.subj || '综合'}`;
    document.getElementById('cardLevel').textContent = `掌握度: ${currentItem.sm2 ? currentItem.sm2.lastQuality : '新'}`;
    
    document.getElementById('userAnswer').value = '';
    document.getElementById('answerArea').style.display = 'block';
    document.getElementById('feedbackArea').style.display = 'none';
    document.getElementById('aiLoader').style.display = 'none';
}

function showAnswer() {
    document.getElementById('answerArea').style.display = 'none';
    document.getElementById('feedbackArea').style.display = 'block';
    document.getElementById('aiScore').textContent = `看破天机`;
    document.getElementById('aiComment').innerHTML = '<i>直接查看了答案，未能自我推演。</i>';
    document.getElementById('stdAnswer').innerHTML = `<b>【标准解析】</b><br>${(currentItem.analysis||currentItem.answer||'暂无').replace(/\n/g, '<br>')}`;
}

// --- 4. AI 批阅逻辑 ---
async function submitToAI() {
    const ans = document.getElementById('userAnswer').value.trim();
    if (!ans) return alert('请写下你的回忆内容，只言片语也好。');

    document.getElementById('answerArea').style.display = 'none';
    document.getElementById('aiLoader').style.display = 'block';

    const sysPrompt = `你是北大考研名师，专批主观大题。
题目：${currentItem.stem || currentItem.q}
标准考点要求：${currentItem.analysis || currentItem.answer || '按常规考研思路'}
学生作答：${ans}

请以JSON格式输出：
{
  "score": (0到5的整数，3为及格，5为完美切中关键考点),
  "feedback": "简短的中文评语，指出学生漏掉了哪些关键词，或者答得好的地方（100字内）"
}`;

    try {
        const aiResponse = await PKUSDK.AI.chat(sysPrompt, '开始批改', { temperature: 0.2 });
        // 解析 JSON
        const rawJson = aiResponse.replace(/```json/g,'').replace(/```/g,'').trim();
        const result = JSON.parse(rawJson);
        
        document.getElementById('aiLoader').style.display = 'none';
        document.getElementById('feedbackArea').style.display = 'block';
        
        // 渲染结果
        document.getElementById('aiScore').textContent = `AI 评分: ${result.score} / 5`;
        document.getElementById('aiComment').textContent = result.feedback;
        document.getElementById('stdAnswer').innerHTML = `<b>【标准解析】</b><br>${(currentItem.analysis||currentItem.answer||'暂无').replace(/\n/g, '<br>')}`;

    } catch (e) {
        document.getElementById('aiLoader').style.display = 'none';
        alert('批阅网络受波动: ' + e.message + '\n你可以直接选择下方记忆程度跳过。');
        showAnswer();
    }
}

// --- 5. SM-2 算法入库并进入下一题 ---
function rateMemory(quality) {
    if (!currentItem) return;
    
    // 调用 SDK 的 Memory 发动机计算
    const sm2Result = PKUSDK.Memory.calculate(currentItem.sm2 || {}, quality);
    
    // 更新库
    currentItem.sm2 = sm2Result;
    memoryBank[currentItem.internalId] = currentItem;
    localStorage.setItem('gushu_memory_bank', JSON.stringify(memoryBank));
    
    // 进度动画
    const container = document.querySelector('.flashcard');
    container.style.transform = 'translateX(-100%)';
    container.style.opacity = '0';
    
    setTimeout(() => {
        currentIndex++;
        showNextCard();
        container.style.transform = 'translateX(0)';
        container.style.opacity = '1';
    }, 300);
}
</script>

</body>
</html>
