<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>识海天碑 · 炼木成器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#050a0e;--gc:rgba(10,25,35,.85);--gg:rgba(15,35,50,.6);--gn:#00ff88;--cy:#00ccff;--gd:#ffd700;--rd:#ff3355;--tp:#e0f0e8;--ts:#88aaaa;--td:#556666;--bgl:rgba(0,255,136,.2);--ff:'Orbitron',sans-serif;--fb:'Noto Serif SC',serif;--r:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--bg);color:var(--tp);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,204,255,.06) 0%,transparent 60%),radial-gradient(ellipse at 30% 100%,rgba(0,255,136,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:rgba(5,10,14,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bgl)}
.top-bar .title{font-family:var(--ff);font-size:.85rem;font-weight:600;letter-spacing:2px;color:var(--gn);text-shadow:0 0 20px rgba(0,255,136,.4)}
.top-bar .qi{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--ts)}
.top-bar .qi b{color:var(--cy);font-family:var(--ff)}
.app{position:relative;z-index:1;padding:64px 16px 90px;min-height:100vh}
.tree-wrap{position:relative;width:100%;max-width:420px;height:360px;margin:0 auto 16px}
#treeCanvas{width:100%;height:100%;border-radius:var(--r);background:radial-gradient(ellipse at 50% 80%,rgba(0,255,136,.03) 0%,transparent 70%)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:500px;margin:0 auto 20px}
.st{background:var(--gg);border:1px solid var(--bgl);border-radius:10px;padding:12px 8px;text-align:center;backdrop-filter:blur(10px);transition:all .3s}
.st:hover{border-color:var(--gn);box-shadow:0 0 20px rgba(0,255,136,.15);transform:translateY(-2px)}
.st .v{font-family:var(--ff);font-size:1.4rem;font-weight:800;color:var(--gn);text-shadow:0 0 12px rgba(0,255,136,.4)}
.st .v.w{color:var(--rd);text-shadow:0 0 12px rgba(255,51,85,.4)}
.st .v.d{color:var(--cy);text-shadow:0 0 12px rgba(0,204,255,.4)}
.st .v.m{color:var(--gd);text-shadow:0 0 12px rgba(255,215,0,.4)}
.st .l{font-size:.65rem;color:var(--td);margin-top:4px;letter-spacing:1px}
.ring-wrap{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:20px}
.ring{width:100px;height:100px;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(0,255,136,.1);stroke-width:6}
.ring-fill{fill:none;stroke:var(--gn);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s;filter:drop-shadow(0 0 6px rgba(0,255,136,.5))}
.ring-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-txt .p{font-family:var(--ff);font-size:1.3rem;font-weight:800;color:var(--gn)}
.ring-txt .lb{font-size:.6rem;color:var(--td);letter-spacing:1px}
.rinfo .il{font-size:.8rem;color:var(--ts);margin-bottom:4px}
.rinfo .il b{color:var(--tp)}
.filters{display:flex;gap:8px;justify-content:center;margin:16px auto;flex-wrap:wrap;max-width:500px}
.chip{padding:6px 16px;font-size:.72rem;border-radius:20px;border:1px solid var(--bgl);background:0;color:var(--ts);cursor:pointer;transition:all .3s;font-family:var(--fb)}
.chip.on{background:rgba(0,255,136,.15);border-color:var(--gn);color:var(--gn)}
.btns{display:flex;gap:12px;justify-content:center;max-width:500px;margin:0 auto}
.btn{flex:1;padding:14px 24px;font-family:var(--ff);font-size:.8rem;font-weight:700;letter-spacing:2px;border:none;border-radius:var(--r);cursor:pointer;transition:all .3s;overflow:hidden}
.btn.go{background:linear-gradient(135deg,#00c853,#00bfa5);color:#000;box-shadow:0 4px 20px rgba(0,200,83,.3)}
.btn.go:hover{box-shadow:0 6px 30px rgba(0,200,83,.5);transform:translateY(-2px)}
.btn.add{background:var(--gg);color:var(--cy);border:1px solid rgba(0,204,255,.3)}
.btn:active{transform:scale(.97)}
/* Review overlay */
.rov{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column}
.rov.on{display:flex}
.rprog{height:4px;background:rgba(0,255,136,.1);position:relative}
.rprog .f{height:100%;background:linear-gradient(90deg,var(--gn),var(--cy));transition:width .5s;box-shadow:0 0 10px rgba(0,255,136,.5)}
.rhdr{display:flex;justify-content:space-between;align-items:center;padding:12px 20px}
.rhdr .cnt{font-family:var(--ff);font-size:.8rem;color:var(--cy)}
.rhdr .x{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:0;color:var(--ts);font-size:1.2rem;cursor:pointer;transition:all .3s}
.rhdr .x:hover{border-color:var(--rd);color:var(--rd)}
.fcc{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;perspective:1200px}
.fc{width:100%;max-width:420px;min-height:320px;position:relative;transition:transform .6s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;cursor:pointer}
.fc.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);padding:32px 24px;display:flex;flex-direction:column;border:1px solid var(--bgl);backdrop-filter:blur(15px);overflow-y:auto}
.ff{background:linear-gradient(160deg,rgba(10,30,45,.9),rgba(5,15,25,.95));justify-content:center;align-items:center;text-align:center}
.ff .sb{position:absolute;top:16px;left:16px;padding:4px 12px;border-radius:12px;font-size:.65rem;font-family:var(--ff);letter-spacing:1px}
.sb.s101{background:rgba(255,82,82,.2);color:#ff5252}.sb.s201{background:rgba(0,204,255,.2);color:#00ccff}
.sb.s301{background:rgba(255,215,0,.2);color:#ffd700}.sb.s408{background:rgba(187,134,252,.2);color:#bb86fc}
.ff .li{font-size:2.5rem;margin-bottom:20px;filter:drop-shadow(0 0 12px rgba(0,255,136,.4))}
.ff .qt{font-size:1.05rem;line-height:1.7}
.ff .th{position:absolute;bottom:20px;font-size:.7rem;color:var(--td);letter-spacing:2px;animation:po 2s ease-in-out infinite}
.fb{background:linear-gradient(160deg,rgba(5,25,20,.95),rgba(0,15,15,.98));border-color:rgba(0,255,136,.3);transform:rotateY(180deg)}
.fb .al{font-family:var(--ff);font-size:.65rem;color:var(--gn);letter-spacing:3px;margin-bottom:16px}
.fb .at{font-size:.95rem;line-height:1.8;white-space:pre-line;flex:1}
.gbs{padding:16px 20px 32px;display:none;gap:8px;max-width:420px;margin:0 auto;width:100%}
.gbs.on{display:flex}
.gb{flex:1;padding:14px 8px;border:none;border-radius:10px;font-family:var(--fb);font-size:.75rem;font-weight:700;cursor:pointer;transition:all .3s}
.gb.g0{background:linear-gradient(135deg,rgba(255,23,68,.2),rgba(255,23,68,.1));color:var(--rd);border:1px solid rgba(255,23,68,.3)}
.gb.g3{background:linear-gradient(135deg,rgba(255,152,0,.2),rgba(255,152,0,.1));color:#ff9800;border:1px solid rgba(255,152,0,.3)}
.gb.g4{background:linear-gradient(135deg,rgba(0,200,83,.2),rgba(0,200,83,.1));color:var(--gn);border:1px solid rgba(0,200,83,.3)}
.gb.g5{background:linear-gradient(135deg,rgba(0,204,255,.2),rgba(0,204,255,.1));color:var(--cy);border:1px solid rgba(0,204,255,.3)}
.gb:hover{transform:translateY(-2px)}.gb:active{transform:scale(.95)}
.gb span{display:block}.gb .gi{font-size:.6rem;opacity:.7;margin-top:4px;font-family:var(--ff)}
.aib{display:none;gap:8px;max-width:420px;margin:0 auto 8px;padding:0 20px}
.aib.on{display:flex}
.aib button{flex:1;padding:8px 12px;font-size:.7rem;border-radius:8px;border:1px solid var(--bgl);background:0;color:var(--ts);cursor:pointer;transition:all .3s;font-family:var(--fb)}
.aib button:hover{border-color:var(--cy);color:var(--cy)}
.ahb{background:var(--gg);border:1px solid rgba(0,204,255,.2);border-radius:10px;padding:16px;margin:0 auto 12px;max-width:420px;display:none}
.ahb.on{display:block}
.ahb .hl{font-size:.65rem;font-family:var(--ff);color:var(--cy);letter-spacing:2px;margin-bottom:8px}
.ahb .hc{font-size:.85rem;line-height:1.7;white-space:pre-line}
.ahb .hc.ld{color:var(--td);animation:po 1.5s ease infinite}
/* Complete */
.rcmp{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;flex:1;padding:40px 20px}
.rcmp.on{display:flex}
.rcmp .ci{font-size:4rem;margin-bottom:20px;animation:fl 3s ease-in-out infinite}
.rcmp .ct{font-family:var(--ff);font-size:1.2rem;color:var(--gn);letter-spacing:3px;margin-bottom:12px}
.rcmp .cs{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0;width:100%;max-width:360px}
.rcmp .cv{font-family:var(--ff);font-size:1.5rem;font-weight:800;color:var(--cy)}
.rcmp .cl{font-size:.65rem;color:var(--td);margin-top:4px}
.bh{margin-top:32px;padding:14px 40px;background:linear-gradient(135deg,#00c853,#00bfa5);color:#000;border:none;border-radius:var(--r);font-family:var(--ff);font-size:.8rem;font-weight:700;letter-spacing:2px;cursor:pointer}
/* Modal */
.mo{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.mo.on{display:flex}
.ms{width:100%;max-width:500px;max-height:85vh;background:linear-gradient(180deg,rgba(15,30,40,.98),rgba(5,15,20,.99));border-radius:var(--r) var(--r) 0 0;border:1px solid var(--bgl);border-bottom:none;padding:24px;overflow-y:auto;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.ms .mt{font-family:var(--ff);font-size:.85rem;color:var(--gn);letter-spacing:2px;margin-bottom:20px}
.ms .fg{margin-bottom:16px}
.ms label{display:block;font-size:.72rem;color:var(--ts);margin-bottom:6px}
.ms input,.ms select,.ms textarea{width:100%;padding:12px 14px;background:rgba(0,0,0,.3);border:1px solid var(--bgl);border-radius:10px;color:var(--tp);font-family:var(--fb);font-size:.9rem;outline:none;transition:border-color .3s}
.ms input:focus,.ms select:focus,.ms textarea:focus{border-color:var(--gn)}
.ms textarea{min-height:100px;resize:vertical;line-height:1.6}
.ms select{cursor:pointer;-webkit-appearance:none}
.ma{display:flex;gap:12px;margin-top:20px}
.ma button{flex:1;padding:12px;border-radius:10px;font-family:var(--ff);font-size:.75rem;font-weight:600;letter-spacing:1px;cursor:pointer;border:none;transition:all .3s}
.ma .mc{background:0;color:var(--ts);border:1px solid rgba(255,255,255,.1)}
.ma .sv{background:linear-gradient(135deg,#00c853,#00bfa5);color:#000}
/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;background:rgba(5,10,14,.95);backdrop-filter:blur(20px);border-top:1px solid var(--bgl);padding:8px 0 env(safe-area-inset-bottom,8px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;color:var(--td);font-size:.6rem;cursor:pointer;border:none;background:0;font-family:var(--fb);transition:all .3s}
.ni.on{color:var(--gn)}
.ni .ic{font-size:1.3rem}
@keyframes po{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes sk{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:sk .5s}
@keyframes gp{0%,100%{filter:drop-shadow(0 0 8px rgba(0,255,136,.3))}50%{filter:drop-shadow(0 0 20px rgba(0,255,136,.7))}}
.bloom{animation:gp 2s ease-in-out}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:0}::-webkit-scrollbar-thumb{background:rgba(0,255,136,.2);border-radius:4px}
@media(max-width:380px){.stats{grid-template-columns:repeat(2,1fr)}.st .v{font-size:1.1rem}.gb{padding:12px 4px;font-size:.7rem}}
</style>
</head>
<body>
<header class="top-bar"><div class="title">识海天碑</div><div class="qi"><span>灵力</span><b id="qiLv">Lv.1</b><span>·</span><span id="rank">炼气期</span></div></header>

  <div class="rinfo"><div class="il">待复习: <b id="dC">0</b></div><div class="il">新卡片: <b id="nC">0</b></div><div class="il">已掌握: <b id="mC">0</b></div></div>
</div>
<div class="stats"><div class="st"><div class="v" id="tC">0</div><div class="l">总卡片</div></div><div class="st"><div class="v d" id="duC">0</div><div class="l">待渡劫</div></div><div class="st"><div class="v w" id="wC">0</div><div class="l">煞气侵</div></div><div class="st"><div class="v m" id="maC">0</div><div class="l">已通灵</div></div></div>

</div></div>

<script>
// ═══ SM-2 Engine ═══
const SM2=(()=>{
function calc(c,g){let{easeFactor:ef,interval:iv,repetitions:rp}=c.sm2;if(g>=3){iv=rp===0?1:rp===1?6:Math.round(iv*ef);rp++}else{rp=0;iv=1}ef=ef+(0.1-(5-g)*(0.08+(5-g)*0.02));if(ef<1.3)ef=1.3;const nd=new Date(Date.now()+iv*864e5);return{easeFactor:Math.round(ef*100)/100,interval:iv,repetitions:rp,nextReviewDate:nd.toISOString(),lastReviewDate:new Date().toISOString(),grade:g}}
function mk({question:q,answer:a,subject:s,chapter:ch,topic:to,difficulty:d=3,tags:tg=[]}){const id='c_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);return{id,content:{question:q,answer:a,hint:'',explanation:''},meta:{subject:s,chapter:ch,topic:to,difficulty:d,tags:tg},sm2:{easeFactor:2.5,interval:0,repetitions:0,nextReviewDate:new Date().toISOString(),lastReviewDate:null,grade:null},tree:{leafType:'sprout',glow:.5,wither:false,stage:'炼气'},stats:{total:0,ok:0,fail:0,lapses:0},active:true,created:new Date().toISOString()}}
function review(c,g,t=0){const b={...c.sm2};const a=calc(c,g);c.sm2=a;c.stats.total++;if(g>=3)c.stats.ok++;else{c.stats.fail++;c.stats.lapses++}upTree(c);return{card:c,log:{id:'l_'+Date.now(),cardId:c.id,grade:g,recallMs:t,before:b,after:{...c.sm2},at:new Date().toISOString()}}}
function upTree(c){const{repetitions:r}=c.sm2;const rt=c.stats.total>0?c.stats.ok/c.stats.total:.5;c.tree.glow=Math.min(1,Math.max(0,rt));c.tree.wither=new Date()>new Date(c.sm2.nextReviewDate);if(r>=10){c.tree.leafType='flower';c.tree.stage='元婴'}else if(r>=6){c.tree.leafType='branch';c.tree.stage='金丹'}else if(r>=3){c.tree.leafType='leaf';c.tree.stage='筑基'}else{c.tree.leafType='sprout';c.tree.stage='炼气'}if(c.sm2.grade!==null&&c.sm2.grade<3){c.tree.leafType='sprout';c.tree.stage='炼气';c.tree.glow=Math.max(0,c.tree.glow-.3)}}
function due(cards,lim=50){const now=Date.now();return cards.filter(c=>c.active&&new Date(c.sm2.nextReviewDate)<=new Date()).sort((a,b)=>{if(a.tree.wither!==b.tree.wither)return a.tree.wither?-1:1;return a.sm2.easeFactor-b.sm2.easeFactor}).slice(0,lim)}
function fresh(cards,lim=10){return cards.filter(c=>c.active&&c.sm2.repetitions===0&&!c.sm2.lastReviewDate).slice(0,lim)}
function gStats(cards){const ac=cards.filter(c=>c.active),t=ac.length;if(!t)return{total:0,mastered:0,learning:0,fresh:0,wither:0,due:0,ret:0};const m=ac.filter(c=>c.sm2.repetitions>=6).length;const l=ac.filter(c=>c.sm2.repetitions>0&&c.sm2.repetitions<6).length;const n=ac.filter(c=>c.sm2.repetitions===0).length;const w=ac.filter(c=>c.tree.wither).length;const d=due(ac,9999).length;const tr=ac.reduce((s,c)=>s+c.stats.total,0);const tc=ac.reduce((s,c)=>s+c.stats.ok,0);return{total:t,mastered:m,learning:l,fresh:n,wither:w,due:d,ret:tr>0?Math.round(tc/tr*100):0}}
const SK='pku_mem_cards',LK='pku_mem_logs';
function save(c){localStorage.setItem(SK,JSON.stringify(c))}
function load(){try{return JSON.parse(localStorage.getItem(SK))||[]}catch{return[]}}

// ═══ Spirit Tree Canvas ═══
const Tree=(()=>{let cv,cx,w,h,pts=[],lvs=[],ps=[];
function init(c){cv=c;cx=c.getContext('2d');rsz();window.addEventListener('resize',rsz);anim()}
function rsz(){const r=cv.parentElement.getBoundingClientRect(),d=devicePixelRatio||1;w=r.width;h=r.height;cv.width=w*d;cv.height=h*d;cv.style.width=w+'px';cv.style.height=h+'px';cx.setTransform(d,0,0,d,0,0);genTrunk()}
function genTrunk(){pts=[];const bx=w/2,by=h-20,ty=60,n=12;for(let i=0;i<=n;i++){const t=i/n,y=by+(ty-by)*t,sw=Math.sin(t*Math.PI*1.5)*15*t;pts.push({x:bx+sw,y,t})}}
function upd(cards){lvs=[];if(!cards||!cards.length)return;const cx2=w/2,cy=h*.35,mr=Math.min(w,h)*.35;
cards.forEach((c,i)=>{const a=(i/cards.length)*Math.PI*2+i*.618*Math.PI*2,lt=Math.sqrt(i/cards.length),r=mr*lt*.85+20;
const x=cx2+Math.cos(a)*r,y=cy+Math.sin(a)*r*.6-lt*30,g=c.tree.glow,wt=c.tree.wither;
let col,sz;switch(c.tree.leafType){case'flower':col=`rgba(255,128,171,${.5+g*.5})`;sz=10;break;case'branch':col=`rgba(255,213,79,${.5+g*.5})`;sz=8;break;case'leaf':col=`rgba(0,230,118,${.5+g*.5})`;sz=7;break;default:col=`rgba(102,187,106,${.3+g*.4})`;sz=5}
if(wt)col=`rgba(255,23,68,${.3+Math.sin(Date.now()/500+i)*.2})`;
lvs.push({x,y,sz,col,g,wt,ph:Math.random()*Math.PI*2})})}
function anim(t=0){cx.clearRect(0,0,w,h);
// base
const gr=cx.createLinearGradient(w*.2,h-15,w*.8,h-15);gr.addColorStop(0,'rgba(0,255,136,0)');gr.addColorStop(.5,`rgba(0,255,136,${.1+Math.sin(t*.002)*.03})`);gr.addColorStop(1,'rgba(0,255,136,0)');cx.fillStyle=gr;cx.fillRect(0,h-19,w,8);
// particles
if(ps.length<25)ps.push({x:Math.random()*w,y:h+10,vx:(Math.random()-.5)*.3,vy:-.3-Math.random()*.5,s:1+Math.random()*2,life:1,d:.003+Math.random()*.003});
ps.forEach((p,i)=>{p.x+=p.vx+Math.sin(t*.001+i)*.1;p.y+=p.vy;p.life-=p.d;if(p.life<=0||p.y<-10){ps.splice(i,1);return}cx.beginPath();cx.fillStyle=`rgba(0,255,136,${p.life*.3})`;cx.arc(p.x,p.y,p.s*p.life,0,Math.PI*2);cx.fill()});
// trunk
cx.beginPath();cx.strokeStyle='rgba(0,255,136,.15)';cx.lineWidth=2;pts.forEach((p,i)=>{const sx=p.x+Math.sin(t*.001+p.t*3)*2;i===0?cx.moveTo(sx,p.y):cx.lineTo(sx,p.y)});cx.stroke();
cx.strokeStyle='rgba(0,255,136,.06)';cx.lineWidth=12;cx.beginPath();pts.forEach((p,i)=>{const sx=p.x+Math.sin(t*.001+p.t*3)*2;i===0?cx.moveTo(sx,p.y):cx.lineTo(sx,p.y)});cx.stroke();
// branches
for(let b=0;b<6;b++){const tt=.3+b/6*.5,idx=Math.floor(tt*(pts.length-1)),tp=pts[idx];if(!tp)continue;const dr=b%2===0?-1:1,ln=30+Math.random()*30,bs=Math.sin(t*.0015+b)*3;cx.beginPath();cx.strokeStyle='rgba(0,255,136,.1)';cx.lineWidth=1.5;cx.moveTo(tp.x,tp.y);cx.quadraticCurveTo(tp.x+dr*ln*.5+bs,tp.y-15,tp.x+dr*ln+bs,tp.y-25);cx.stroke()}
// leaves
lvs.forEach(lf=>{const wb=Math.sin(t*.002+lf.ph)*3,px=lf.x+wb,py=lf.y+Math.cos(t*.0015+lf.ph)*2,gr2=lf.sz+(lf.wt?2:lf.g*6),gd=cx.createRadialGradient(px,py,0,px,py,gr2);
if(lf.wt){gd.addColorStop(0,'rgba(255,23,68,.4)');gd.addColorStop(1,'rgba(255,23,68,0)')}else{gd.addColorStop(0,`rgba(0,255,136,${lf.g*.5})`);gd.addColorStop(1,'rgba(0,255,136,0)')}
cx.beginPath();cx.fillStyle=gd;cx.arc(px,py,gr2,0,Math.PI*2);cx.fill();cx.beginPath();cx.fillStyle=lf.col;cx.arc(px,py,lf.sz*.5,0,Math.PI*2);cx.fill()});
requestAnimationFrame(anim)}
return{init,upd}})();

// ═══ AI Service (Gemini native) ═══
const AI=(()=>{
const GK='AIzaSyBDQPwlixn8zedvE7hJYB9600I1nolutU4';
const GB='https://generativelanguage.googleapis.com/v1beta/models';
async function gem(p,m='gemini-3.1-flash-lite-preview',mt=512){const r=await fetch(`${GB}/${m}:generateContent?key=${GK}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:p}]}],generationConfig:{temperature:.7,maxOutputTokens:mt}})});if(!r.ok)throw new Error(`Gemini ${r.status}`);const d=await r.json();if(d.error)throw new Error(d.error.message);return d.candidates?.[0]?.content?.parts?.[0]?.text||''}
async function hint(q,a){return gem(`你是考研导师顾枢。用一句话给出巧妙记忆提示（口诀/类比/谐音），帮记住:\n问：${q}\n答：${a}\n只输出提示。`)}
async function explain(q,a,s){const sn={'101':'政治','201':'英语','301':'数学','408':'计算机'}[s]||s;return gem(`你是考研导师顾枢。用3-5句深入解释${sn}知识点，指出关联高频考点:\n问：${q}\n答：${a}\n用修仙比喻但知识准确。`,'gemini-3.1-pro-preview',800)}
async function master(q,a){return gem(`你是顾枢上仙。学生反复答错此题，请进行"开窍讲解"：\n1.指出思维误区\n2.用生动比喻建立正确认知\n3.给3个关联高频考题方向\n4.一句"顾枢金句"总结\n\n问：${q}\n答：${a}`,'gemini-3.1-pro-preview',1200)}
return{hint,explain,master}})();

// ═══ App Controller ═══
const A=(()=>{let cards=[],logs=[],queue=[],ci=0,flipped=false,filter='all',ss={t:0,ok:0},t0=0;
function init(){cards=SM2.load();logs=SM2.lLog();if(!cards.length){cards=SM2.seeds();SM2.save(cards)}cards.forEach(c=>SM2.upTree(c));SM2.save(cards);Tree.init(document.getElementById('treeCanvas'));
document.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));ch.classList.add('on');filter=ch.dataset.s;ui()}));ui()}
function flt(){return filter==='all'?cards:cards.filter(c=>c.meta.subject===filter)}
function ui(){const f=flt(),s=SM2.gStats(f);document.getElementById('tC').textContent=s.total;document.getElementById('duC').textContent=s.due;document.getElementById('wC').textContent=s.wither;document.getElementById('maC').textContent=s.mastered;document.getElementById('dC').textContent=s.due;document.getElementById('nC').textContent=s.fresh;document.getElementById('mC').textContent=s.mastered;
const ring=document.getElementById('rRing');ring.style.strokeDashoffset=263.9-(263.9*s.ret/100);document.getElementById('rPct').textContent=s.ret+'%';
const tr=cards.reduce((s,c)=>s+c.stats.total,0),ql=Math.floor(tr/10)+1;document.getElementById('qiLv').textContent='Lv.'+ql;
const rks=['炼气期','筑基期','金丹期','元婴期','化神期','渡劫期'];document.getElementById('rank').textContent=rks[Math.min(Math.floor(ql/10),rks.length-1)];
const b=document.getElementById('btnGo');b.innerHTML=s.due>0?`⚡ 开始渡劫 (${s.due})`:s.fresh>0?`✨ 学习新卡 (${s.fresh})`:'🧘 今日修炼圆满';Tree.upd(f)}
function start(){const f=flt();queue=SM2.due(f,30);if(queue.length<10){const nw=SM2.fresh(f,10-queue.length);queue=[...queue,...nw]}if(!queue.length){alert('🧘 今日修炼已圆满');return}ci=0;flipped=false;ss={t:0,ok:0};$('rov').classList.add('on');$('fcc').style.display='flex';$('rcmp').classList.remove('on');show()}
function show(){if(ci>=queue.length){done();return}const c=queue[ci];flipped=false;t0=Date.now();$('fc').classList.remove('flip');$('gbs').classList.remove('on');$('aiB').classList.remove('on');$('ahb').classList.remove('on');
const sn={'101':'政治','201':'英语','301':'数学','408':'408'};const bd=$('cBadge');bd.textContent=sn[c.meta.subject]||c.meta.subject;bd.className='sb s'+c.meta.subject;
const icons={sprout:'🌱',leaf:'🍃',branch:'✨',flower:'🌸'};$('cIcon').textContent=c.tree.wither?'💀':(icons[c.tree.leafType]||'🌱');
$('cQ').textContent=c.content.question;$('cA').textContent=c.content.answer;
$('rpf').style.width=(ci/queue.length*100)+'%';$('rcnt').textContent=`${ci+1}/${queue.length}`;
[3,4,5].forEach(g=>{const sim=SM2.calc({sm2:{...c.sm2}},g);$('gi'+g).textContent=fmtI(sim.interval)})}
function flip(){if(flipped)return;flipped=true;$('fc').classList.add('flip');setTimeout(()=>{$('gbs').classList.add('on');$('aiB').classList.add('on')},300)}
function grade(g){const c=queue[ci],rt=Date.now()-t0;const{card:up,log}=SM2.review(c,g,rt);const idx=cards.findIndex(x=>x.id===up.id);if(idx>=0)cards[idx]=up;logs.push(log);SM2.save(cards);SM2.sLog(logs);ss.t++;if(g>=3)ss.ok++;
if(g<3){$('fc').classList.add('shake');setTimeout(()=>$('fc').classList.remove('shake'),500)}else{$('fc').classList.add('bloom');setTimeout(()=>$('fc').classList.remove('bloom'),2000)}ci++;setTimeout(show,g<3?800:400)}
function done(){$('fcc').style.display='none';$('gbs').classList.remove('on');$('aiB').classList.remove('on');$('ahb').classList.remove('on');$('rcmp').classList.add('on');$('cpT').textContent=ss.t;$('cpC').textContent=ss.ok;$('cpA').textContent=(ss.t>0?Math.round(ss.ok/ss.t*100):0)+'%';$('rpf').style.width='100%'}
function exit(){$('rov').classList.remove('on');ui()}
function showAdd(){$('addM').classList.add('on')}
function hideAdd(){$('addM').classList.remove('on');['nCh','nTo','nQ','nAn'].forEach(id=>$(id).value='')}
function saveCard(){const q=$('nQ').value.trim(),a=$('nAn').value.trim();if(!q||!a){alert('问题和答案不能为空');return}const c=SM2.mk({question:q,answer:a,subject:$('nS').value,chapter:$('nCh').value.trim(),topic:$('nTo').value.trim(),tags:$('nTo').value.split(/[,，、\s]+/)});cards.push(c);SM2.save(cards);hideAdd();ui()}
async function hint(){const c=queue[ci];showAI('💡 SPIRIT HINT','顾枢灵光一闪中...');try{const r=await AI.hint(c.content.question,c.content.answer);showAI('💡 SPIRIT HINT',r)}catch(e){showAI('⚠️',e.message)}}
async function explain(){const c=queue[ci];showAI('📖 DEEP INSIGHT','顾枢推演中...');try{const r=await AI.explain(c.content.question,c.content.answer,c.meta.subject);showAI('📖 DEEP INSIGHT',r)}catch(e){showAI('⚠️',e.message)}}
async function master(){const c=queue[ci];showAI('👑 MASTER CLASS','顾枢开坛讲法...');try{const r=await AI.master(c.content.question,c.content.answer);showAI('👑 MASTER CLASS',r)}catch(e){showAI('⚠️',e.message)}}
function showAI(l,c){$('ahb').classList.add('on');$('ahL').textContent=l;const el=$('ahC');el.textContent=c;el.classList.toggle('ld',c.includes('中...'))}
function fmtI(d){return d<1?'<1天':d===1?'1天':d<30?d+'天':d<365?Math.round(d/30)+'月':(Math.round(d/365*10)/10)+'年'}
function $(id){return document.getElementById(id)}
document.addEventListener('DOMContentLoaded',init);
return{start,flip,grade,exit,showAdd,hideAdd,saveCard,hint,explain,master}})();
