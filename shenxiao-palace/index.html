<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>神霄宫 · 万界仙盟 — 北大考研修仙应用集</title>
  <style>
    :root {
      --bg-top: #e0f2fe;    /* Light sky blue */
      --bg-bot: #f8fafc;    /* Cloud white */
      --gold: #d4af37;      /* Imperial gold */
      --gold-light: #fef08a; 
      --jade: #10b981;      /* Jade green */
      --jade-light: #6ee7b7;
      --text-main: #334155;
      --text-muted: #64748b;
      --panel-bg: rgba(255, 255, 255, 0.4);
      --panel-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
      --boss-hp: #ef4444;
      --font-title: 'STKaiti', 'KaiTi', 'Noto Serif SC', serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-body);
      color: var(--text-main);
      background: linear-gradient(135deg, var(--bg-top), var(--bg-bot));
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Celestial Cloud Background */
    .sky-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.6;
      animation: floatCloud linear infinite;
    }
    @keyframes floatCloud {
      0% { transform: translateX(100vw) scale(1); }
      100% { transform: translateX(-50vw) scale(1.5); }
    }
    .sun-glow {
      position: absolute;
      top: -100px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(254,240,138,0.4) 0%, transparent 60%);
      border-radius: 50%;
      z-index: 0;
    }

    /* Top Bar */
    .header {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: linear-gradient(180deg, rgba(255,255,255,0.7), transparent);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--panel-border);
    }
    .h-left { display: flex; align-items: center; gap: 15px; }
    .back-btn {
      text-decoration: none; font-size: 20px; color: var(--text-muted); transition: 0.3s;
    }
    .back-btn:hover { color: var(--gold); transform: scale(1.1); }
    .title { font-family: var(--font-title); font-size: 28px; font-weight: 900; color: var(--gold); 
      text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3); letter-spacing: 2px;}
    .h-right { display: flex; align-items: center; gap: 20px; }
    .currency-pill {
      display: flex; align-items: center; gap: 8px; background: var(--panel-bg);
      padding: 6px 16px; border-radius: 20px; border: 1px solid var(--panel-border);
      box-shadow: var(--glass-shadow); font-weight: 700;
      backdrop-filter: blur(8px);
    }
    
    /* Main Layout */
    .main-grid {
      position: relative;
      z-index: 5;
      flex: 1;
      display: grid;
      grid-template-columns: 320px 1fr 320px;
      gap: 20px;
      padding: 20px;
      height: calc(100vh - 70px);
    }
    
    /* Panel Shared Styles */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--glass-shadow);
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .panel-title {
      font-family: var(--font-title); font-size: 20px; font-weight: 700; color: var(--text-main);
      margin-bottom: 15px; display: flex; align-items: center; gap: 8px;
    }
    .panel-title::after {
      content:''; flex:1; height:1px; background: linear-gradient(90deg, var(--gold-light), transparent);
    }

    /* Left Panel: Realm */
    .realm-avatar {
      text-align: center; margin-bottom: 20px;
    }
    .avatar-circle {
      width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%;
      background: radial-gradient(circle, var(--jade-light), #fff);
      border: 4px solid var(--gold); display: flex; align-items: center; justify-content: center;
      font-size: 40px; box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
      position: relative;
    }
    .avatar-circle::after {
      content:''; position:absolute; inset: -10px; border: 1px dashed var(--jade);
      border-radius: 50%; animation: spin 10s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .realm-name { font-family: var(--font-title); font-size: 24px; font-weight: 900; color: var(--jade); }
    .realm-desc { font-size: 13px; color: var(--text-muted); margin-top: 5px;}
    
    .qi-bar-wrap { margin-top: 10px; }
    .qi-bar-bg { width: 100%; height: 12px; background: rgba(0,0,0,0.05); border-radius: 6px; overflow: hidden; border: 1px solid rgba(16,185,129,0.2);}
    .qi-bar-fill { height: 100%; width: 45%; background: linear-gradient(90deg, var(--jade-light), var(--jade)); 
      box-shadow: 0 0 10px var(--jade-light); transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    .qi-text { display: flex; justify-content: space-between; font-size: 12px; margin-top: 6px; color: var(--text-muted); font-weight: 600;}

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
    .stat-box { background: rgba(255,255,255,0.6); border-radius: 12px; padding: 12px; text-align: center; border: 1px solid var(--panel-border); }
    .stat-v { font-size: 20px; font-weight: 800; color: var(--gold); }
    .stat-l { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase;}

    /* Center Panel: Boss */
    .boss-panel { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.2) 100%);
      border: 1px solid var(--panel-border); border-radius: 24px; overflow: hidden;
      box-shadow: inset 0 0 50px rgba(254, 240, 138, 0.3); }
    
    .boss-title { position: absolute; top: 30px; text-align: center; }
    .bt-name { font-family: var(--font-title); font-size: 32px; font-weight: 900; color: var(--text-main); letter-spacing: 4px; }
    .bt-desc { font-size: 14px; color: var(--boss-hp); margin-top: 5px; font-weight: 600; }
    
    .boss-avatar { font-size: 150px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.15));
      animation: floatBoss 4s ease-in-out infinite; margin-top: 40px; position: relative;}
    @keyframes floatBoss { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-20px);} }
    .boss-avatar::after { content:''; position:absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 20px; background: radial-gradient(ellipse, rgba(0,0,0,0.1) 0%, transparent 70%); border-radius: 50%;}

    .boss-hp-area { width: 80%; max-width: 500px; margin-top: 40px; text-align: center; }
    .boss-hp-bg { width: 100%; height: 20px; background: rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; border: 2px solid rgba(255,255,255,0.8);
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
    .boss-hp-fill { height: 100%; width: 85.5%; background: linear-gradient(90deg, #ef4444, #f87171); 
      transition: width 0.5s ease-out; }
    .boss-hp-nums { font-family: 'Inter'; font-weight: 800; font-size: 16px; color: var(--text-main); margin-top: 8px;}

    .btn-raid { margin-top: 40px; padding: 15px 40px; font-family: var(--font-title); font-size: 22px; font-weight: 900;
      color: #fff; background: linear-gradient(135deg, var(--gold), #b45309); border: none; border-radius: 30px;
      cursor: pointer; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4); transition: 0.3s; letter-spacing: 2px;}
    .btn-raid:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.6); }

    /* Floating Damage Text */
    .dmg-text { position: absolute; font-family: var(--font-title); font-size: 28px; font-weight: 900; color: var(--boss-hp);
      text-shadow: 0 2px 10px rgba(239, 68, 68, 0.4), 0 0 2px #fff; pointer-events: none; opacity: 0; z-index: 20;}
    @keyframes dmgFloat { 
      0% { opacity: 1; transform: translateY(0) scale(1); } 
      20% { transform: translateY(-20px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
    }

    /* Right Panel: Alliance & Shop */
    .lb-item { display: flex; align-items: center; justify-content: space-between; padding: 12px;
      background: rgba(255,255,255,0.6); border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--panel-border);}
    .lb-rank { font-weight: 900; color: var(--gold); width: 30px;}
    .lb-name { flex: 1; font-weight: 600; font-size: 14px;}
    .lb-score { font-family: 'Inter'; font-weight: 700; color: var(--jade); font-size: 13px;}

    .shop-area { margin-top: auto; padding-top: 20px; border-top: 1px dashed rgba(0,0,0,0.1); }
    .shop-item { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.7);
      padding: 15px; border-radius: 16px; border: 1px solid var(--panel-border); box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
    .shop-icon { font-size: 30px; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));}
    .shop-info { flex: 1; }
    .si-name { font-family: var(--font-title); font-weight: 700; color: var(--text-main); font-size: 16px;}
    .si-desc { font-size: 11px; color: var(--text-muted); margin-top: 4px; line-height: 1.4;}
    .btn-buy { padding: 8px 16px; background: var(--bg-top); border: 2px solid var(--gold); border-radius: 12px;
      color: var(--gold); font-weight: 800; cursor: pointer; transition: 0.2s;}
    .btn-buy:hover { background: var(--gold); color: #fff; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }
  </style>
</head>
<body>
  
  <div class="sky-bg" id="skyBg">
    <div class="sun-glow"></div>
  </div>

  <header class="header">
    <div class="h-left">
      <a href="../index.html" class="back-btn" title="返回门户">↩</a>
      <div class="title">神霄宫</div>
    </div>
    <div class="h-right">
      <div class="currency-pill">
        <span>💎</span> <span id="navCrystal">0</span> 结晶
      </div>
      <div class="currency-pill" style="color:var(--jade)">
        <span>✨</span> <span id="navQi">0</span> 真气
      </div>
    </div>
  </header>

  <main class="main-grid">
    <!-- LEFT: Realm -->
    <aside class="glass-panel">
      <div class="panel-title"><span>🌟</span> 元神境界</div>
      
      <div class="realm-avatar">
        <div class="avatar-circle">🧘‍♂️</div>
        <div class="realm-name" id="realmName">筑基初期</div>
        <div class="realm-desc">大道至简 · 聚气凝神</div>
      </div>

      <div class="qi-bar-wrap">
        <div class="qi-text">
          <span>真气充盈度</span>
          <span id="qiProgressText">450 / 1000</span>
        </div>
        <div class="qi-bar-bg">
          <div class="qi-bar-fill" id="qiBarFill" style="width: 45%;"></div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-v" id="statDays">12</div>
          <div class="stat-l">闭关天数</div>
        </div>
        <div class="stat-box">
          <div class="stat-v" id="statKills">85</div>
          <div class="stat-l">斩妖总数</div>
        </div>
        <div class="stat-box">
          <div class="stat-v" id="statAcc">92%</div>
          <div class="stat-l">论断命中</div>
        </div>
        <div class="stat-box">
          <div class="stat-v" id="statCombo">32</div>
          <div class="stat-l">最高破阵</div>
        </div>
      </div>
    </aside>

    <!-- CENTER: Boss Raid -->
    <section class="boss-panel">
      <div class="boss-title">
        <div class="bt-name">龙武判官 · 劫灭形态</div>
        <div class="bt-desc">世界级天道试炼 · 每日辰时重置</div>
      </div>

      <div class="boss-avatar" id="bossAv">🐲</div>

      <div class="boss-hp-area">
        <div class="boss-hp-bg">
          <div class="boss-hp-fill" id="bossHpFill"></div>
        </div>
        <div class="boss-hp-nums" id="bossHpNums">855,021 / 1,000,000</div>
      </div>

      <button class="btn-raid" onclick="Shenxiao.startRaid()">⚔️ 结阵讨伐</button>
    </section>

    <!-- RIGHT: Alliance & Furnace -->
    <aside class="glass-panel">
      <div class="panel-title"><span>📜</span> 元神稳固榜</div>
      
      <div class="lb-list" id="lbList">
        <!-- Generated by JS -->
      </div>

      <div class="shop-area">
        <div class="panel-title"><span>🏺</span> 仙盟炼丹炉</div>
        
        <div class="shop-item">
          <div class="shop-icon">💊</div>
          <div class="shop-info">
            <div class="si-name">双倍玉露</div>
            <div class="si-desc">服下后，30分钟内各殿修行的真气收益翻倍。</div>
          </div>
          <button class="btn-buy" onclick="Shenxiao.buyPill()">50 💎</button>
        </div>
      </div>
    </aside>
  </main>

  <script src="../shared/vault-loader.js"></script>
  <script>
    // ── Celestial Cloud Generator ──
    const skyBg = document.getElementById('skyBg');
    for(let i=0; i<8; i++){
      const c = document.createElement('div');
      c.className = 'cloud';
      const size = Math.random() * 200 + 100;
      c.style.width = size + 'px';
      c.style.height = size * 0.6 + 'px';
      c.style.top = Math.random() * 80 + '%';
      c.style.animationDuration = (Math.random() * 40 + 30) + 's';
      c.style.animationDelay = '-' + (Math.random() * 30) + 's';
      skyBg.appendChild(c);
    }

    // ── Shenxiao Logic ──
    const Shenxiao = {
      crystals: 0,
      qi: 0,
      maxQi: 1000,
      bossHp: 855021,
      bossMax: 1000000,
      
      init() {
        // 1. Gather stats from other modules
        this.crystals = parseInt(localStorage.getItem('ce_crystals') || '0');
        
        // Let's pretend we calculate Qi from stats
        const kills = parseInt(localStorage.getItem('ce_kills') || '85'); // mock
        const days = 12; // mock
        this.qi = kills * 5 + days * 10;
        
        this.updateUI();
        this.renderLeaderboard();
      },

      updateUI() {
        document.getElementById('navCrystal').textContent = this.crystals;
        document.getElementById('navQi').textContent = this.qi;
        
        const qiFill = Math.min((this.qi / this.maxQi) * 100, 100);
        document.getElementById('qiBarFill').style.width = qiFill + '%';
        document.getElementById('qiProgressText').textContent = `${this.qi} / ${this.maxQi}`;
        
        // Realm Logic
        let realm = "炼气一层";
        if(this.qi > 300) realm = "筑基初期";
        if(this.qi > 1000) realm = "金丹无暇";
        document.getElementById('realmName').textContent = realm;

        // Boss
        const bhpFill = (this.bossHp / this.bossMax) * 100;
        document.getElementById('bossHpFill').style.width = bhpFill + '%';
        document.getElementById('bossHpNums').textContent = `${this.bossHp.toLocaleString()} / ${this.bossMax.toLocaleString()}`;
      },

      renderLeaderboard() {
        const lbData = [
          {name: '清华剑仙', score: 99.8},
          {name: '道法自然 (Me)', score: 92.0},
          {name: '红尘历劫客', score: 88.5},
          {name: '408断天狂魔', score: 81.2},
          {name: '微积分散人', score: 79.9}
        ];
        const list = document.getElementById('lbList');
        list.innerHTML = lbData.map((v, i) => `
          <div class="lb-item">
            <div class="lb-rank">#${i+1}</div>
            <div class="lb-name">${v.name}</div>
            <div class="lb-score">${v.score}%</div>
          </div>
        `).join('');
      },

      startRaid() {
        // Simulated Raid Damage Feedback
        const dmg = Math.floor(Math.random() * 5000 + 2000);
        this.bossHp = Math.max(0, this.bossHp - dmg);
        
        // Visuals
        const bossAv = document.getElementById('bossAv');
        // Screen shake
        bossAv.style.transform = `translateX(${Math.random()*20-10}px) translateY(${Math.random()*20-10}px)`;
        setTimeout(() => bossAv.style.transform = '', 100);

        // Floating Text
        const text = document.createElement('div');
        text.className = 'dmg-text';
        text.textContent = `-${dmg} 破绽！`;
        text.style.left = `calc(50% + ${Math.random()*100-50}px)`;
        text.style.top = `calc(40% + ${Math.random()*50-25}px)`;
        text.style.animation = 'dmgFloat 1.2s forwards';
        document.querySelector('.boss-panel').appendChild(text);
        setTimeout(() => text.remove(), 1200);

        this.qi += Math.floor(dmg / 100);
        this.updateUI();
      },

      buyPill() {
        if(this.crystals >= 50) {
          this.crystals -= 50;
          this.updateUI();
          alert('【双倍玉露】服用成功！限时内收益增倍。');
        } else {
          alert('灵石结晶不足！');
        }
      }
    };

    window.addEventListener('DOMContentLoaded', () => Shenxiao.init());
  </script>
</body>
</html>
