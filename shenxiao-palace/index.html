<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>神霄宫 · 万界仙盟 — 北大考研修仙应用集</title>
  <meta name="description" content="神霄宫 · 万界仙盟 — 赛博修真终极枢纽">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@300;400;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #050510;
      --bg-panel: rgba(8, 10, 28, 0.85);
      --bg-panel-hover: rgba(12, 15, 38, 0.92);
      --border-rune: rgba(212, 175, 55, 0.12);
      --border-energy: rgba(0, 200, 255, 0.08);
      --gold: #d4a017;
      --gold-bright: #ffd700;
      --gold-dim: #8b6914;
      --cyan: #00d4ff;
      --cyan-dim: #0088aa;
      --cyan-glow: rgba(0, 212, 255, 0.3);
      --crimson: #ff2244;
      --crimson-dim: #991122;
      --crimson-glow: rgba(255, 34, 68, 0.3);
      --jade: #00ff88;
      --jade-dim: #008844;
      --purple: #8844ff;
      --purple-glow: rgba(136, 68, 255, 0.2);
      --text-bright: #e8e4d4;
      --text-main: #b8b4a4;
      --text-dim: #585448;
      --text-rune: #d4a017;
      --font-title: 'Noto Serif SC', serif;
      --font-data: 'Orbitron', 'Inter', monospace;
      --font-body: 'Inter', system-ui, sans-serif;
      --metal-bg: linear-gradient(145deg, #1a1a2e 0%, #0d0d1a 50%, #151528 100%);
      --bronze-border: linear-gradient(135deg, #8b6914, #d4a017, #8b6914, #d4a017, #8b6914);
      --energy-border: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      color: var(--text-main);
      background: url('assets/bg-palace.png') center/cover no-repeat, var(--bg-deep);
      display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: rgba(3,3,10,0.4);
    }

    /* ══════════════════════════════════════════════════
       COSMIC BACKGROUND — Overlay effects
       ══════════════════════════════════════════════════ */
    .cosmos-bg {
      position: absolute; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    /* Energy grid overlay */
    .energy-grid {
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(0, 212, 255, 0.015) 80px, rgba(0, 212, 255, 0.015) 81px),
        repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(212, 175, 55, 0.012) 80px, rgba(212, 175, 55, 0.012) 81px);
      animation: gridPulse 8s ease-in-out infinite;
    }
    @keyframes gridPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    /* Floating Islands Silhouettes */
    .floating-island {
      position: absolute; opacity: 0.12;
      animation: islandFloat linear infinite;
    }
    .island-1 {
      left: 5%; top: 15%; width: 180px; height: 100px;
      background: radial-gradient(ellipse at 50% 70%, #1a1a3a, transparent 70%);
      clip-path: polygon(10% 100%, 0% 60%, 15% 30%, 35% 10%, 55% 5%, 75% 15%, 90% 35%, 100% 55%, 95% 100%);
      animation-duration: 25s;
    }
    .island-2 {
      right: 8%; top: 20%; width: 140px; height: 80px;
      background: radial-gradient(ellipse at 50% 60%, #1a1a3a, transparent 70%);
      clip-path: polygon(5% 100%, 0% 50%, 20% 20%, 45% 5%, 70% 10%, 85% 30%, 100% 60%, 98% 100%);
      animation-duration: 30s; animation-delay: -10s;
    }
    @keyframes islandFloat {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-8px) translateX(4px); }
      50% { transform: translateY(-3px) translateX(-3px); }
      75% { transform: translateY(-10px) translateX(2px); }
    }
    /* Star Field */
    .star-field { position: absolute; inset: 0; }

    /* Particle + Rune Canvas */
    #particleCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

    /* ══════════════════════════════════════════════════
       HEADER — Bronze-etched nav bar
       ══════════════════════════════════════════════════ */
    .header {
      position: relative; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 20px;
      background: linear-gradient(180deg, rgba(15,15,30,0.95) 0%, rgba(8,8,20,0.9) 100%);
      border-bottom: 1px solid var(--border-rune);
      box-shadow: 0 2px 20px rgba(0,0,0,0.5), inset 0 -1px 0 rgba(212,175,55,0.06);
    }
    .header::after {
      content: ''; position: absolute; bottom: 0; left: 10%; right: 10%; height: 1px;
      background: var(--energy-border);
      animation: headerLine 4s ease-in-out infinite;
    }
    @keyframes headerLine {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    .h-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      text-decoration: none; font-size: 14px; color: var(--text-dim);
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; border: 1px solid var(--border-rune);
      background: rgba(20,20,40,0.8);
      transition: all 0.3s;
    }
    .back-btn:hover { color: var(--gold); border-color: var(--gold-dim); box-shadow: 0 0 12px rgba(212,175,55,0.15); }
    .title {
      font-family: var(--font-title); font-size: 20px; font-weight: 900;
      background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-dim) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 6px;
      filter: drop-shadow(0 0 6px rgba(212,175,55,0.3));
    }
    .h-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .currency-pill {
      display: flex; align-items: center; gap: 5px;
      background: rgba(15,15,35,0.8); padding: 4px 12px;
      border-radius: 6px; border: 1px solid var(--border-rune);
      font-family: var(--font-data); font-weight: 700; font-size: 11px;
      color: var(--text-bright); letter-spacing: 1px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .pill-jade { border-color: rgba(0,255,136,0.15); color: var(--jade); }
    .buff-pill {
      border-color: rgba(136,68,255,0.2); color: var(--purple);
      animation: buffGlow 2.5s ease-in-out infinite;
      box-shadow: 0 0 8px var(--purple-glow);
    }
    @keyframes buffGlow {
      0%, 100% { box-shadow: 0 0 6px rgba(136,68,255,0.1); }
      50% { box-shadow: 0 0 16px rgba(136,68,255,0.25); }
    }

    /* ══════════════════════════════════════════════════
       MAIN GRID
       ══════════════════════════════════════════════════ */
    .main-grid {
      position: relative; z-index: 5; flex: 1;
      display: grid; grid-template-columns: 280px 1fr 280px;
      gap: 12px; padding: 12px;
      height: calc(100vh - 50px);
    }

    /* ══════════════════════════════════════════════════
       RUNE PANEL — Etched bronze + energy crystal panels
       ══════════════════════════════════════════════════ */
    .rune-panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-rune);
      border-radius: 4px;
      padding: 16px;
      display: flex; flex-direction: column;
      overflow-y: auto;
      position: relative;
      box-shadow:
        0 4px 24px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(212,175,55,0.04),
        inset 0 0 30px rgba(0,0,0,0.3);
    }
    .rune-panel::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-dim) 20%, var(--gold) 50%, var(--gold-dim) 80%, transparent 100%);
      opacity: 0.5;
    }
    .rune-panel::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.1), transparent);
    }
    .panel-title {
      font-family: var(--font-title); font-size: 14px; font-weight: 700;
      color: var(--gold); letter-spacing: 3px;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
      text-shadow: 0 0 8px rgba(212,175,55,0.2);
    }
    .panel-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--gold-dim), transparent);
      opacity: 0.3;
    }

    /* ══════════════════════════════════════════════════
       LEFT: CYBER ALCHEMY STATION — Realm Panel
       ══════════════════════════════════════════════════ */
    .realm-avatar { text-align: center; margin-bottom: 12px; }
    .avatar-shrine {
      position: relative; width: 120px; height: 120px; margin: 0 auto 14px;
    }
    /* Energy mandala rings */
    .mandala-ring {
      position: absolute; inset: 0;
      border: 1px solid rgba(0,255,136,0.15);
      border-radius: 50%;
      animation: mandalaSpin 18s linear infinite;
    }
    .mandala-ring-2 {
      position: absolute; inset: -8px;
      border: 1px dashed rgba(212,175,55,0.1);
      border-radius: 50%;
      animation: mandalaSpin 28s linear infinite reverse;
    }
    .mandala-ring-3 {
      position: absolute; inset: -16px;
      border: 1px dotted rgba(0,212,255,0.06);
      border-radius: 50%;
      animation: mandalaSpin 40s linear infinite;
    }
    @keyframes mandalaSpin { 100% { transform: rotate(360deg); } }

    .avatar-core {
      position: absolute; inset: 10px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 40% 35%, rgba(0,255,136,0.12) 0%, transparent 50%),
        radial-gradient(circle, rgba(10,15,30,0.95) 0%, rgba(5,8,20,1) 100%);
      border: 2px solid var(--gold-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; z-index: 2;
      box-shadow:
        0 0 20px rgba(0,255,136,0.1),
        inset 0 0 15px rgba(0,255,136,0.05),
        0 0 40px rgba(0,0,0,0.5);
      transition: all 0.6s;
    }
    .avatar-core.realm-up {
      box-shadow: 0 0 40px rgba(255,215,0,0.4), 0 0 80px rgba(255,215,0,0.15);
      border-color: var(--gold-bright);
    }
    /* Rune energy nodes on the orbit */
    .energy-node {
      position: absolute; width: 6px; height: 6px;
      background: var(--cyan); border-radius: 50%;
      box-shadow: 0 0 6px var(--cyan-glow);
      animation: nodePulse 2s ease-in-out infinite;
    }
    .energy-node:nth-child(4) { top: -3px; left: 50%; animation-delay: 0s; }
    .energy-node:nth-child(5) { bottom: -3px; left: 50%; animation-delay: 0.5s; }
    .energy-node:nth-child(6) { left: -3px; top: 50%; animation-delay: 1s; }
    .energy-node:nth-child(7) { right: -3px; top: 50%; animation-delay: 1.5s; }
    @keyframes nodePulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    .realm-name {
      font-family: var(--font-title); font-size: 20px; font-weight: 900;
      letter-spacing: 3px;
      text-shadow: 0 0 10px currentColor;
      transition: all 0.5s;
    }
    .realm-desc {
      font-family: var(--font-data); font-size: 9px;
      color: var(--text-dim); margin-top: 3px; letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Qi Bar — Energy crystal style */
    .qi-bar-wrap { margin-top: 10px; }
    .qi-bar-bg {
      width: 100%; height: 8px;
      background: rgba(0,0,0,0.4);
      border-radius: 1px; overflow: hidden;
      border: 1px solid rgba(0,255,136,0.1);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
    }
    .qi-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--jade-dim), var(--jade), rgba(0,255,136,0.7));
      box-shadow: 0 0 8px rgba(0,255,136,0.3);
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .qi-bar-fill::after {
      content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 20px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2));
      animation: barShimmer 2s ease-in-out infinite;
    }
    @keyframes barShimmer { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    .qi-text {
      display: flex; justify-content: space-between;
      font-family: var(--font-data); font-size: 9px; margin-top: 4px;
      color: var(--text-dim); font-weight: 600; letter-spacing: 1px;
    }

    /* Stat Grid — Holographic micro-screens */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 14px; }
    .stat-box {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(0,212,255,0.06);
      border-radius: 3px; padding: 8px 6px; text-align: center;
      position: relative; overflow: hidden;
      transition: all 0.25s;
    }
    .stat-box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.1), transparent);
    }
    .stat-box:hover {
      border-color: rgba(0,212,255,0.15);
      box-shadow: 0 0 12px rgba(0,212,255,0.05);
      background: rgba(0,10,20,0.4);
    }
    .stat-v {
      font-family: var(--font-data); font-size: 16px; font-weight: 800;
      color: var(--gold); letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(212,175,55,0.2);
    }
    .stat-l {
      font-family: var(--font-data); font-size: 7px;
      color: var(--text-dim); margin-top: 3px;
      text-transform: uppercase; letter-spacing: 2px;
    }

    /* ══════════════════════════════════════════════════
       CENTER: DRAGON ARENA — Boss Chamber
       ══════════════════════════════════════════════════ */
    .boss-chamber {
      position: relative; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(255,34,68,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 60%, rgba(0,0,0,0.15) 0%, transparent 60%),
        rgba(5,5,16,0.35);
      border: 1px solid var(--border-rune); border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 0 60px rgba(0,0,0,0.15);
      backdrop-filter: blur(2px);
    }
    .boss-chamber::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--crimson-dim), var(--gold), var(--crimson-dim), transparent);
      opacity: 0.5;
    }
    /* Arena energy rings */
    .arena-ring {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      border: 1px solid rgba(255,34,68,0.05);
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(255,34,68,0.02);
      animation: arenaPulse 5s ease-in-out infinite;
    }
    .arena-ring-2 {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 380px; height: 380px;
      border: 1px dashed rgba(212,175,55,0.04);
      border-radius: 50%;
      animation: arenaPulse 7s ease-in-out infinite reverse;
    }
    @keyframes arenaPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
      50% { transform: translate(-50%, -50%) scale(1.06); opacity: 1; }
    }
    /* Floor rune circle glow */
    .floor-rune {
      position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
      width: 200px; height: 40px;
      background: radial-gradient(ellipse, rgba(255,34,68,0.06) 0%, transparent 70%);
      border-radius: 50%;
      animation: floorGlow 4s ease-in-out infinite;
    }
    @keyframes floorGlow {
      0%, 100% { opacity: 0.3; transform: translateX(-50%) scaleX(1); }
      50% { opacity: 0.8; transform: translateX(-50%) scaleX(1.15); }
    }

    .boss-title { position: absolute; top: 16px; text-align: center; z-index: 5; }
    .bt-name {
      font-family: var(--font-title); font-size: 22px; font-weight: 900;
      background: linear-gradient(135deg, var(--gold-bright), var(--crimson));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 5px;
      filter: drop-shadow(0 0 8px rgba(255,34,68,0.3));
    }
    .bt-desc {
      font-family: var(--font-data); font-size: 9px;
      color: var(--crimson); margin-top: 4px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      text-shadow: 0 0 6px var(--crimson-glow);
    }

    /* Dragon Avatar — Image-based boss art */
    .dragon-container {
      position: relative; z-index: 3; margin-top: 10px;
    }
    .boss-avatar {
      font-size: 110px;
      filter: drop-shadow(0 0 30px rgba(255,34,68,0.2)) drop-shadow(0 10px 20px rgba(0,0,0,0.4));
      animation: dragonFloat 5s ease-in-out infinite;
      transition: filter 0.3s;
      position: relative; z-index: 2;
      display: none; /* hide emoji */
    }
    .boss-img {
      width: 340px; height: auto;
      filter: drop-shadow(0 0 50px rgba(255,34,68,0.35)) drop-shadow(0 10px 40px rgba(0,0,0,0.6));
      animation: dragonFloat 5s ease-in-out infinite;
      transition: filter 0.3s;
      position: relative; z-index: 2;
      /* Aggressive edge dissolve — no rectangular feel */
      -webkit-mask-image: radial-gradient(ellipse 75% 75% at 50% 42%, black 25%, rgba(0,0,0,0.4) 45%, transparent 65%);
      mask-image: radial-gradient(ellipse 75% 75% at 50% 42%, black 25%, rgba(0,0,0,0.4) 45%, transparent 65%);
    }
    .boss-img.hit {
      filter: drop-shadow(0 0 50px rgba(255,215,0,0.5)) drop-shadow(0 10px 20px rgba(0,0,0,0.4)) brightness(1.5) saturate(1.8);
    }
    .boss-avatar.hit {
      filter: drop-shadow(0 0 40px rgba(255,215,0,0.5)) drop-shadow(0 10px 20px rgba(0,0,0,0.4)) brightness(1.5) saturate(1.8);
    }
    @keyframes dragonFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.02); }
    }
    /* Fire breath aura */
    .fire-aura {
      position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
      width: 80px; height: 80px;
      background: radial-gradient(circle, rgba(255,100,0,0.12) 0%, rgba(255,34,68,0.05) 50%, transparent 70%);
      border-radius: 50%;
      animation: fireAura 2s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes fireAura {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.5; }
      50% { transform: translateX(-50%) scale(1.4); opacity: 1; }
    }
    /* Smoke wisps */
    .smoke-wisp {
      position: absolute; width: 40px; height: 40px;
      background: radial-gradient(circle, rgba(100,100,120,0.08) 0%, transparent 70%);
      border-radius: 50%; filter: blur(8px);
      animation: smokeRise linear infinite;
    }
    .smoke-wisp:nth-child(2) { left: 40%; animation-duration: 4s; animation-delay: 0s; }
    .smoke-wisp:nth-child(3) { left: 55%; animation-duration: 5s; animation-delay: -1.5s; }
    .smoke-wisp:nth-child(4) { left: 48%; animation-duration: 3.5s; animation-delay: -2.5s; }
    @keyframes smokeRise {
      0% { bottom: 30%; opacity: 0.6; transform: scale(0.8); }
      100% { bottom: 90%; opacity: 0; transform: scale(2); }
    }

    /* HP Bar — Energy Crystal + Rune style */
    .boss-hp-area { width: 80%; max-width: 440px; margin-top: 20px; text-align: center; z-index: 5; position: relative; }
    .hp-frame {
      position: relative; padding: 3px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-dim));
      border-radius: 3px;
      box-shadow: 0 0 10px rgba(212,175,55,0.1);
    }
    .hp-inner {
      background: rgba(0,0,0,0.7);
      border-radius: 2px; overflow: hidden;
      height: 18px; position: relative;
    }
    .boss-hp-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #660011 0%, #cc1133 30%, #ff2244 60%, #ff5566 100%);
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .boss-hp-fill::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 40%, rgba(0,0,0,0.2) 100%);
    }
    .boss-hp-fill::after {
      content: ''; position: absolute; right: -2px; top: 0; bottom: 0; width: 4px;
      background: rgba(255,255,255,0.5);
      box-shadow: 0 0 8px rgba(255,100,100,0.5);
    }
    /* Rune markers on HP frame */
    .hp-rune {
      position: absolute; top: -1px; bottom: -1px; width: 1px;
      background: rgba(212,175,55,0.3);
    }
    .hp-rune:nth-child(1) { left: 25%; }
    .hp-rune:nth-child(2) { left: 50%; }
    .hp-rune:nth-child(3) { left: 75%; }

    .boss-hp-nums {
      font-family: var(--font-data); font-weight: 800; font-size: 13px;
      color: var(--text-bright); margin-top: 6px; letter-spacing: 1px;
      text-shadow: 0 0 6px rgba(255,34,68,0.2);
    }
    .boss-today-dmg {
      font-family: var(--font-data); font-size: 9px;
      color: var(--crimson); margin-top: 2px; font-weight: 600;
      letter-spacing: 1px; opacity: 0.7;
    }

    /* Raid Button — Bronze sword emblem */
    .btn-raid {
      margin-top: 20px; padding: 12px 36px;
      font-family: var(--font-title); font-size: 17px; font-weight: 900;
      color: var(--text-bright);
      background: linear-gradient(145deg, #2a1a08 0%, #1a1008 40%, #2a1a08 100%);
      border: 2px solid var(--gold-dim);
      border-radius: 3px; cursor: pointer;
      box-shadow:
        0 0 15px rgba(212,175,55,0.1),
        inset 0 1px 0 rgba(255,215,0,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.3);
      transition: all 0.3s; letter-spacing: 4px; z-index: 5;
      position: relative; overflow: hidden;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    .btn-raid::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(45deg, transparent 30%, rgba(255,215,0,0.08) 50%, transparent 70%);
      transform: translateX(-120%);
    }
    .btn-raid:hover {
      border-color: var(--gold);
      box-shadow: 0 0 25px rgba(212,175,55,0.2), 0 4px 20px rgba(0,0,0,0.4);
      background: linear-gradient(145deg, #3a2a10 0%, #2a1a08 40%, #3a2a10 100%);
    }
    .btn-raid:hover::before { transform: translateX(120%); transition: transform 0.8s; }
    .btn-raid:active { transform: scale(0.97); }
    .btn-raid:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

    /* ══════ Damage Text ══════ */
    .dmg-text {
      position: absolute; font-family: var(--font-data); font-weight: 900;
      pointer-events: none; opacity: 0; z-index: 20;
    }
    .dmg-crit { font-size: 36px; color: var(--gold-bright); text-shadow: 0 0 20px rgba(255,215,0,0.5), 0 2px 6px rgba(0,0,0,0.8); }
    .dmg-normal { font-size: 26px; color: var(--crimson); text-shadow: 0 0 12px var(--crimson-glow), 0 2px 4px rgba(0,0,0,0.8); }
    .dmg-miss { font-size: 20px; color: var(--text-dim); text-shadow: none; }
    @keyframes dmgFloat {
      0% { opacity: 1; transform: translateY(0) scale(0.7); }
      12% { transform: translateY(-14px) scale(1.3); }
      100% { opacity: 0; transform: translateY(-100px) scale(0.5); }
    }
    @keyframes screenShake {
      0%, 100% { transform: translate(0); }
      10% { transform: translate(-5px, 3px); }
      20% { transform: translate(5px, -3px); }
      30% { transform: translate(-3px, 2px); }
      40% { transform: translate(3px, -1px); }
    }

    /* ══════════════════════════════════════════════════
       RIGHT: SCROLL LEADERBOARD + FURNACE
       ══════════════════════════════════════════════════ */
    .lb-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: rgba(0,0,0,0.25); border-radius: 2px;

    .lb-item:hover { background: rgba(0,0,0,0.4); border-left-color: var(--cyan); }
    .lb-item.lb-gold { border-left-color: var(--gold); background: rgba(212,175,55,0.04); }
    .lb-item.lb-silver { border-left-color: #8892a8; background: rgba(100,110,140,0.04); }
    .lb-item.lb-bronze { border-left-color: #8b6914; background: rgba(139,105,20,0.03); }
    .lb-rank { font-family: var(--font-data); font-weight: 900; width: 28px; font-size: 12px; flex-shrink: 0; }
    .lb-name { flex: 1; font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-score { font-family: var(--font-data); font-weight: 700; font-size: 11px; flex-shrink: 0; letter-spacing: 0.5px; }

    /* Furnace */
    .shop-area { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border-rune); }
    .furnace-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.3); padding: 10px;
      border-radius: 3px; border: 1px solid rgba(212,175,55,0.06);
      position: relative; overflow: hidden;
    }
    .furnace-item::before {
      content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,100,0,0.15), transparent);
      animation: furnaceGlow 3s ease-in-out infinite;
    }
    @keyframes furnaceGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .furnace-icon {
      font-size: 24px;
      filter: drop-shadow(0 0 8px rgba(255,100,0,0.3));
      animation: pillFloat 3s ease-in-out infinite;
    }
    @keyframes pillFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    .furnace-info { flex: 1; }
    .fi-name { font-family: var(--font-title); font-weight: 700; color: var(--gold); font-size: 13px; letter-spacing: 1px; }
    .fi-desc { font-size: 9px; color: var(--text-dim); margin-top: 3px; line-height: 1.5; }
    .btn-buy {
      padding: 5px 12px;
      background: rgba(0,0,0,0.4); border: 1px solid var(--gold-dim);
      border-radius: 3px; color: var(--gold);
      font-family: var(--font-data); font-weight: 800; font-size: 10px;
      cursor: pointer; transition: all 0.2s; letter-spacing: 1px;

    .btn-buy:hover { background: rgba(212,175,55,0.1); border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.15); }

    /* ══════════════════════════════════════════════════
       QUIZ MODAL — Holographic rune interface
       ══════════════════════════════════════════════════ */
    .quiz-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(3,3,8,0.7);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.35s;
    }
    .quiz-overlay.active { opacity: 1; pointer-events: all; }
    .quiz-box {
      width: 92%; max-width: 520px;
      background: rgba(10,12,28,0.96);
      border: 1px solid var(--border-rune);
      border-radius: 4px; padding: 26px 24px;

      max-height: 85vh; overflow-y: auto; position: relative;
    }
    .quiz-box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.4;
    }
    .quiz-overlay.active .quiz-box { transform: translateY(0) scale(1); }
    .quiz-header {
      font-family: var(--font-title); font-size: 18px; font-weight: 900;
      color: var(--gold); letter-spacing: 3px; margin-bottom: 4px;
      text-shadow: 0 0 8px rgba(212,175,55,0.2);
    }
    .quiz-subject {
      font-family: var(--font-data); font-size: 10px; color: var(--text-dim);
      margin-bottom: 16px; font-weight: 600; letter-spacing: 1px;
      padding-bottom: 12px; border-bottom: 1px solid var(--border-rune);
    }
    .quiz-q {
      font-size: 14px; line-height: 1.8; margin-bottom: 16px;
      color: var(--text-bright); font-weight: 400;
    }
    .quiz-opts { display: flex; flex-direction: column; gap: 6px; }
    .quiz-opt {
      padding: 12px 14px; border-radius: 3px;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.04);
      cursor: pointer; font-size: 13px; color: var(--text-main);
      transition: all 0.2s; display: flex; align-items: flex-start; gap: 10px;
    }
    .quiz-opt:hover {
      border-color: var(--gold-dim); background: rgba(212,175,55,0.04);
      color: var(--text-bright);
    }
    .quiz-opt.correct { border-color: var(--jade-dim); background: rgba(0,255,136,0.05); color: var(--jade); }
    .quiz-opt.wrong { border-color: var(--crimson-dim); background: rgba(255,34,68,0.05); color: var(--crimson); }
    .quiz-opt.disabled { pointer-events: none; }
    .opt-letter {
      width: 22px; height: 22px; border-radius: 3px; flex-shrink: 0;
      background: rgba(255,255,255,0.03); display: flex; align-items: center;
      justify-content: center; font-family: var(--font-data); font-weight: 800;
      font-size: 10px; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.06);
    }
    .quiz-opt:hover .opt-letter { background: rgba(212,175,55,0.08); color: var(--gold); border-color: var(--gold-dim); }
    .quiz-opt.correct .opt-letter { background: rgba(0,255,136,0.1); color: var(--jade); border-color: var(--jade-dim); }
    .quiz-opt.wrong .opt-letter { background: rgba(255,34,68,0.1); color: var(--crimson); border-color: var(--crimson-dim); }
    .quiz-analysis {
      margin-top: 14px; padding: 12px; border-radius: 3px;
      background: rgba(0,255,136,0.03); border: 1px solid rgba(0,255,136,0.08);
      font-size: 12px; color: var(--text-main); line-height: 1.7;
      display: none;
    }
    .quiz-analysis.show { display: block; animation: fadeInUp 0.3s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .quiz-timer {
      position: absolute; top: 20px; right: 22px;
      font-family: var(--font-data); font-size: 28px; font-weight: 900;
      color: var(--crimson); text-shadow: 0 0 10px var(--crimson-glow);
    }

    /* ══════ Toast ══════ */
    .toast-container { position: fixed; top: 60px; right: 14px; z-index: 200; display: flex; flex-direction: column; gap: 6px; }
    .toast {
      padding: 10px 16px; border-radius: 3px;
      background: rgba(10,12,28,0.95); border: 1px solid var(--border-rune);
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      font-size: 12px; font-weight: 600; color: var(--text-main);
      transform: translateX(130%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 300px; line-height: 1.5;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { border-left: 3px solid var(--jade); }
    .toast.error { border-left: 3px solid var(--crimson); }
    .toast.buff { border-left: 3px solid var(--purple); }

    /* ══════ Breakthrough ══════ */
    .breakthrough-overlay {
      position: fixed; inset: 0; z-index: 150;
      background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, rgba(0,0,0,0.6) 100%);
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px;
      opacity: 0; pointer-events: none; transition: opacity 0.5s;
    }
    .breakthrough-overlay.active { opacity: 1; pointer-events: all; }
    .breakthrough-text {
      font-family: var(--font-title); font-size: 42px; font-weight: 900;
      text-shadow: 0 0 30px currentColor;
      animation: btPulse 1.8s ease-in-out;
    }
    .breakthrough-sub {
      font-family: var(--font-data); font-size: 12px; color: var(--text-dim);
      letter-spacing: 4px; text-transform: uppercase;
      animation: fadeInUp 0.8s ease 0.5s both;
    }
    @keyframes btPulse { 0% { transform: scale(0.2); opacity: 0; } 40% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.1); border-radius: 3px; }

    /* Mascot */
    .mascot {
      position: fixed; bottom: 15px; right: 15px; z-index: 50;
      width: 100px; height: auto; pointer-events: none;
      filter: drop-shadow(0 0 12px rgba(0,212,255,0.25));
      animation: mascotBob 4s ease-in-out infinite;
    }
    @keyframes mascotBob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }

    /* Rune panel backdrop */
    .rune-panel {
      backdrop-filter: blur(8px);
    }

    /* Responsive */
    @media (max-width: 1050px) { .main-grid { grid-template-columns: 240px 1fr 240px; gap: 8px; padding: 8px; } }
    @media (max-width: 850px) {
      .main-grid { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; height: auto; min-height: calc(100vh - 50px); overflow-y: auto; }
      body { overflow-y: auto; height: auto; min-height: 100vh; }
      .boss-chamber { min-height: 380px; }
      .arena-ring, .arena-ring-2 { display: none; }

    @media (max-width: 500px) {

      .currency-pill { font-size: 9px; padding: 3px 8px; }
      .boss-img { width: 180px; }
      .btn-raid { font-size: 14px; padding: 10px 24px; letter-spacing: 3px; }
      .mascot { display: none; }
    }
  </style>
</head>

  <script>
  // ══════════════════════════════════════════════════════════════
  //  神霄宫 v4.0 — Cyber Cultivation Dark Engine
  // ══════════════════════════════════════════════════════════════

  // ── Star Field ──
  (function initStars() {
    const sf = document.getElementById('starField');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.style.cssText = `position:absolute;width:${Math.random()*2+0.5}px;height:${Math.random()*2+0.5}px;
        background:rgba(255,255,255,${Math.random()*0.5+0.1});border-radius:50%;
        left:${Math.random()*100}%;top:${Math.random()*100}%;
        animation:starTwinkle ${Math.random()*4+2}s ease-in-out infinite;
        animation-delay:-${Math.random()*4}s;`;
      sf.appendChild(s);
    }
    const style = document.createElement('style');
    style.textContent = '@keyframes starTwinkle{0%,100%{opacity:0.2;}50%{opacity:1;}}';
    document.head.appendChild(style);
  })();

  // ── Particle + Rune System ──
  (function initParticles() {
    const canvas = document.getElementById('particleCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [], runes = [];

    // Rune characters for floating
    const RUNE_CHARS = '道法天地玄黄宇宙洪荒太极阴阳金木水火土乾坤离坎震巽艮兑';

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    class Particle {
      constructor() { this.reset(true); }
      reset(init) {
        this.x = Math.random() * canvas.width;
        this.y = init ? Math.random() * canvas.height : canvas.height + 10;
        this.size = Math.random() * 1.8 + 0.3;
        this.speedY = -(Math.random() * 0.2 + 0.05);
        this.speedX = (Math.random() - 0.5) * 0.1;
        this.opacity = Math.random() * 0.4 + 0.05;
        this.fadeDir = (Math.random() * 0.003 + 0.001) * (Math.random() > 0.5 ? 1 : -1);
        // Random color: gold, cyan, or purple
        const colors = [[212,175,55],[0,212,255],[136,68,255]];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }
      update() {
        this.x += this.speedX; this.y += this.speedY;
        this.opacity += this.fadeDir;
        if (this.opacity > 0.5 || this.opacity < 0.02) this.fadeDir *= -1;
        if (this.y < -10 || this.x < -10 || this.x > canvas.width + 10) this.reset(false);
      }
      draw() {
        const [r,g,b] = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${this.opacity})`;
        ctx.fill();
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${this.opacity * 0.08})`;
        ctx.fill();
      }
    }

    class FloatingRune {
      constructor() { this.reset(true); }
      reset(init) {
        this.x = Math.random() * canvas.width;
        this.y = init ? Math.random() * canvas.height : canvas.height + 30;
        this.char = RUNE_CHARS[Math.floor(Math.random() * RUNE_CHARS.length)];
        this.size = Math.random() * 10 + 8;
        this.speedY = -(Math.random() * 0.15 + 0.03);
        this.speedX = (Math.random() - 0.5) * 0.08;
        this.opacity = Math.random() * 0.06 + 0.01;
        this.fadeDir = Math.random() * 0.0005 * (Math.random() > 0.5 ? 1 : -1);
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.002;
      }
      update() {
        this.x += this.speedX; this.y += this.speedY;
        this.opacity += this.fadeDir;
        this.rotation += this.rotSpeed;
        if (this.opacity > 0.08 || this.opacity < 0.005) this.fadeDir *= -1;
        if (this.y < -30) this.reset(false);
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.font = `${this.size}px "Noto Serif SC", serif`;
        ctx.fillStyle = `rgba(212,175,55,${this.opacity})`;
        ctx.textAlign = 'center';
        ctx.fillText(this.char, 0, 0);
        ctx.restore();
      }
    }

    for (let i = 0; i < 50; i++) particles.push(new Particle());
    for (let i = 0; i < 15; i++) runes.push(new FloatingRune());

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      runes.forEach(r => { r.update(); r.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  })();

  // ══════ REALMS ══════
  const REALMS = [
    { name: '炼气期', desc: 'QI CONDENSATION', threshold: 0,     color: '#6b7280', emoji: '🧘‍♂️', nextQi: 500 },
    { name: '筑基期', desc: 'FOUNDATION BUILDING', threshold: 500,   color: '#00ff88', emoji: '🧘‍♂️', nextQi: 2000 },
    { name: '金丹期', desc: 'GOLDEN CORE', threshold: 2000,  color: '#ffd700', emoji: '🧙‍♂️', nextQi: 5000 },
    { name: '元婴期', desc: 'NASCENT SOUL', threshold: 5000,  color: '#8844ff', emoji: '🧝‍♂️', nextQi: 15000 },
    { name: '渡劫期', desc: 'TRIBULATION', threshold: 15000, color: '#ff2244', emoji: '⚡',  nextQi: 99999 },
  ];
  function getRealmIndex(qi) { for (let i = REALMS.length - 1; i >= 0; i--) { if (qi >= REALMS[i].threshold) return i; } return 0; }

  function showToast(msg, type = 'success', dur = 3000) {
    const t = document.createElement('div');
    t.className = `toast ${type}`; t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, dur);
  }

  // ══════ ENGINE ══════
  const Shenxiao = {
    crystals:0, qi:0, bossHp:1000000, bossMax:1000000,
    todayDmg:0, bossDate:'', buffEnd:0, buffInterval:null,
    raidInProgress:false, quizTimer:null, quizTimeLeft:30, prevRealmIdx:0,
    SAVE_KEY:'shenxiao_state',

    FALLBACK_QUESTIONS: [
      {q:'在OSI参考模型中，负责端到端可靠传输的是哪一层？',o:['网络层','传输层','会话层','数据链路层'],a:1,subject:'408',tip:'传输层(Transport Layer)提供端到端的可靠数据传输，TCP是典型协议。'},
      {q:'下列哪个排序算法的最坏时间复杂度为O(nlogn)？',o:['快速排序','冒泡排序','归并排序','选择排序'],a:2,subject:'408',tip:'归并排序在所有情况下时间复杂度都是O(nlogn)，空间复杂度O(n)。'},
      {q:'进程和线程的主要区别是什么？',o:['进程有独立地址空间，线程共享','线程有独立地址空间','进程不能并发','线程不能通信'],a:0,subject:'408',tip:'线程是CPU调度的基本单位，进程是资源分配的基本单位。'},
      {q:'TCP三次握手中，第二次握手报文的标志位是？',o:['SYN','ACK','SYN+ACK','FIN'],a:2,subject:'408',tip:'SYN+ACK：服务端确认客户端SYN并发送自己的SYN。'},
      {q:'虚拟内存的基本思想是？',o:['用更大物理内存','将磁盘作为内存扩展','缓存加速','压缩内存'],a:1,subject:'408',tip:'虚拟内存利用磁盘空间扩展逻辑可用内存容量。'},
      {q:'马克思主义哲学的直接理论来源是？',o:['英国古典政治经济学','德国古典哲学','法国空想社会主义','古希腊哲学'],a:1,subject:'101',tip:'黑格尔辩证法+费尔巴哈唯物主义=马克思主义哲学直接来源。'},
      {q:'中国特色社会主义最本质的特征是？',o:['社会主义市场经济','人民当家作主','中国共产党领导','依法治国'],a:2,subject:'101',tip:'党的领导是最本质特征，是最大制度优势。'},
      {q:'设f(x)在x=0处可导且f(0)=0，则lim(h→0) f(h)/h=？',o:["f'(0)",'f(0)','不存在',"f'(0)-f(0)"],a:0,subject:'301',tip:"导数定义：f'(0) = lim[f(h)-f(0)]/h。"},
      {q:'设A是n阶方阵，若|A|≠0，则A是？',o:['奇异矩阵','非奇异矩阵','零矩阵','对角矩阵'],a:1,subject:'301',tip:'行列式≠0 ⇔ 可逆 ⇔ 非奇异矩阵。'},
      {q:'"unprecedented" most likely means:',o:['very common','never happened before','extremely fast','highly expected'],a:1,subject:'201',tip:'un+precedent+ed → 前所未有的。'},
      {q:'Closest meaning to "deteriorate":',o:['improve','maintain','worsen','accelerate'],a:2,subject:'201',tip:'deteriorate = 恶化。de(下)+terior(更坏)。'},
      {q:'B树和B+树的主要区别是？',o:['B+树所有数据在叶节点','B树不支持范围查询','B+树不平衡','B树更快'],a:0,subject:'408',tip:'B+树数据全在叶节点，叶节点链表串联，利于范围查询。'},
      {q:'LRU页面置换算法的含义是？',o:['最近最久未使用','最近最少使用','先进先出','最优置换'],a:0,subject:'408',tip:'LRU(Least Recently Used)淘汰最久未访问的页面。'},
      {q:'唯物辩证法的实质和核心是？',o:['质量互变规律','对立统一规律','否定之否定','联系和发展'],a:1,subject:'101',tip:'矛盾规律揭示事物发展根本动力。'},
      {q:'全面依法治国的总目标是？',o:['建设法治政府','建设中国特色社会主义法治体系，建设社会主义法治国家','实现司法公正','完善法律制度'],a:1,subject:'101',tip:'五大体系：法律规范、法治实施、法治监督、法治保障、党内法规。'},
    ],

    init() { this.loadState(); this.aggregateStats(); this.checkDailyReset(); this.checkBuff(); this.updateUI(); this.renderLeaderboard(); console.log('[神霄宫] ✅ v4.0 Cyber Dark Engine'); },

    loadState() {
      try { const s=JSON.parse(localStorage.getItem(this.SAVE_KEY)||'{}'); this.qi=s.qi||0; this.bossHp=s.bossHp??this.bossMax; this.todayDmg=s.todayDmg||0; this.bossDate=s.bossDate||''; this.buffEnd=s.buffEnd||0; this.prevRealmIdx=s.prevRealmIdx||0; } catch(e){}
      this.crystals=parseInt(localStorage.getItem('ce_crystals')||'0');
    },
    saveState() {
      localStorage.setItem(this.SAVE_KEY,JSON.stringify({qi:this.qi,bossHp:this.bossHp,todayDmg:this.todayDmg,bossDate:this.bossDate,buffEnd:this.buffEnd,prevRealmIdx:this.prevRealmIdx}));
      localStorage.setItem('ce_crystals',String(this.crystals));
    },

    aggregateStats() {
      let f=localStorage.getItem('shenxiao_first_use'); if(!f){f=new Date().toISOString();localStorage.setItem('shenxiao_first_use',f);}
      const days=Math.max(1,Math.floor((Date.now()-new Date(f).getTime())/864e5)+1);
      let kills=0; try{const g=JSON.parse(localStorage.getItem('mgks2')||'{}');kills=g.kills||g.monstersKilled||0;}catch(e){}
      let cl=0; try{const c=JSON.parse(localStorage.getItem('crush_progress')||'{}');Object.values(c).forEach(v=>{if(typeof v==='number')cl+=v;});}catch(e){}
      let dr=0; try{dr=(JSON.parse(localStorage.getItem('debate_stats')||'{}')).totalRounds||0;}catch(e){}
      let rc=0; try{rc=JSON.parse(localStorage.getItem('pku_memory_tree_logs')||'[]').length;}catch(e){}
      let tc=0,ta=0; try{const g=JSON.parse(localStorage.getItem('mgks2')||'{}');tc+=g.correct||0;ta+=g.totalQ||g.questions||0;}catch(e){}
      document.getElementById('statDays').textContent=days;
      document.getElementById('statKills').textContent=kills+cl;
      document.getElementById('statAcc').textContent=ta>0?Math.round(tc/ta*100)+'%':'—';
      document.getElementById('statCombo').textContent=cl+dr+rc;
      if(!this._sl){const aq=kills*3+cl*10+days*5+dr*8+rc*2;if(aq>this.qi)this.qi=Math.max(this.qi,aq);this._sl=true;}
    },

    checkDailyReset() {
      const t=new Date().toISOString().slice(0,10);
      if(this.bossDate!==t){const w=!!this.bossDate;this.bossHp=this.bossMax;this.todayDmg=0;this.bossDate=t;this.saveState();if(w)showToast('🐲 龙武判官已重生！','buff',4000);}
    },

    updateUI() {
      document.getElementById('navCrystal').textContent=this.crystals;
      document.getElementById('navQi').textContent=this.qi.toLocaleString();
      const ri=getRealmIndex(this.qi),r=REALMS[ri];
      const fill=Math.min((this.qi-r.threshold)/(r.nextQi-r.threshold)*100,100);
      document.getElementById('qiBarFill').style.width=fill+'%';
      document.getElementById('qiProgressText').textContent=`${this.qi.toLocaleString()} / ${r.nextQi.toLocaleString()}`;
      document.getElementById('realmName').textContent=r.name;
      document.getElementById('realmName').style.color=r.color;
      document.getElementById('realmDesc').textContent=r.desc;
      document.getElementById('avatarCircle').textContent=r.emoji;
      if(ri>this.prevRealmIdx){this.triggerBreakthrough(r);this.prevRealmIdx=ri;}
      const hp=(this.bossHp/this.bossMax)*100;
      document.getElementById('bossHpFill').style.width=hp+'%';
      document.getElementById('bossHpNums').textContent=`${this.bossHp.toLocaleString()} / ${this.bossMax.toLocaleString()}`;
      document.getElementById('bossTodayDmg').textContent=`TODAY DMG: ${this.todayDmg.toLocaleString()}`;
      if(this.bossHp<=0){document.getElementById('bossAv').textContent='💀';document.getElementById('btDesc').textContent='SLAIN · RESETS AT DAWN';document.getElementById('btnRaid').disabled=true;document.getElementById('btnRaid').textContent='✅ 今日已斩';}
      else{document.getElementById('bossAv').textContent='🐲';document.getElementById('btDesc').textContent='WORLD BOSS · DAILY RESET';document.getElementById('btnRaid').disabled=false;document.getElementById('btnRaid').textContent='⚔ 结 阵 讨 伐';}
      this.saveState();
    },

    triggerBreakthrough(r) {
      document.getElementById('breakthroughText').textContent=`🌟 突破 · ${r.name} 🌟`;
      document.getElementById('breakthroughText').style.color=r.color;
      document.getElementById('breakthroughSub').textContent=r.desc;
      document.getElementById('breakthroughOvl').classList.add('active');
      document.getElementById('avatarCircle').classList.add('realm-up');
      setTimeout(()=>{document.getElementById('breakthroughOvl').classList.remove('active');document.getElementById('avatarCircle').classList.remove('realm-up');},3200);
      showToast(`突破至【${r.name}】！`,  'success', 4000);
    },

    renderLeaderboard() {
      const ma=parseFloat(document.getElementById('statAcc').textContent)||0;
      const d=[{name:'清华剑仙',score:99.8},{name:'道法自然(我)',score:Math.max(ma,50),isMe:true},{name:'红尘历劫客',score:88.5},{name:'408断天狂魔',score:81.2},{name:'微积分散人',score:79.9},{name:'英语修仙者',score:75.3},{name:'马原散修',score:72.1}].sort((a,b)=>b.score-a.score);
      const cls=['lb-gold','lb-silver','lb-bronze'],ico=['👑','🥈','🥉'],cols=['#ffd700','#8892a8','#8b6914'];
      document.getElementById('lbList').innerHTML=d.map((v,i)=>`<div class="lb-item ${cls[i]||''}"><div class="lb-rank" style="color:${cols[i]||'var(--cyan)'}">${ico[i]||'#'+(i+1)}</div><div class="lb-name" style="${v.isMe?'color:var(--jade);':''}">${v.name}</div><div class="lb-score" style="color:${cols[i]||'var(--cyan)'}">${v.score}%</div></div>`).join('');
    },

    startRaid() {
      if(this.raidInProgress||this.bossHp<=0)return; this.raidInProgress=true;
      const q=this.getRandomQuestion();
      if(!q){showToast('❌ 题库为空','error');this.raidInProgress=false;return;}
      this.showQuiz(q);
    },
    getRandomQuestion() {
      const subs=['408','101','301','201'],sub=subs[Math.floor(Math.random()*subs.length)];
      try{const r=localStorage.getItem('Global_Vault_'+sub);if(r){const v=JSON.parse(r);if(Array.isArray(v)&&v.length){const q=v[Math.floor(Math.random()*v.length)];return{q:q.q||q.stem||'',o:q.o||q.opts||q.options||[],a:typeof q.a==='number'?q.a:0,tip:q.analysis||q.tip||'',subject:sub};}}}catch(e){}
      if(typeof PKU_QBANK!=='undefined'){const qs=PKU_QBANK.getRandomQuestions(sub,1,'single');if(qs.length){const q=qs[0];return{q:q.stem||q.q||'',o:(q.options||q.o||[]).map(o=>o.replace(/^[A-D][.、]\s*/,'')),a:typeof q.answer==='number'?q.answer:(typeof q.a==='number'?q.a:0),tip:q.analysis||q.tip||'',subject:sub};}}
      return this.FALLBACK_QUESTIONS[Math.floor(Math.random()*this.FALLBACK_QUESTIONS.length)];
    },
    showQuiz(q) {
      const L=['A','B','C','D'],N={101:'政治',201:'英语',301:'数学',408:'计算机'};
      document.getElementById('quizHeader').textContent='⚔ 龙武试炼卷';
      document.getElementById('quizSubject').textContent=`SUBJECT: ${N[q.subject]||'综合'} · ANSWER TO DEAL DAMAGE`;
      document.getElementById('quizQ').textContent=q.q;
      document.getElementById('quizAnalysis').classList.remove('show');
      document.getElementById('quizAnalysis').textContent='';
      const oe=document.getElementById('quizOpts');oe.innerHTML='';
      (q.o||[]).forEach((o,i)=>{const d=document.createElement('div');d.className='quiz-opt';d.innerHTML=`<span class="opt-letter">${L[i]}</span><span>${o}</span>`;d.onclick=()=>this.handleAnswer(i,q);oe.appendChild(d);});
      this.quizTimeLeft=30;const te=document.getElementById('quizTimer');te.textContent='30';te.style.color='var(--crimson)';
      if(this.quizTimer)clearInterval(this.quizTimer);
      this.quizTimer=setInterval(()=>{this.quizTimeLeft--;te.textContent=this.quizTimeLeft;if(this.quizTimeLeft<=10)te.style.color='#ff0022';if(this.quizTimeLeft<=0){clearInterval(this.quizTimer);this.handleAnswer(-1,q);}},1000);
      document.getElementById('quizOverlay').classList.add('active');
    },
    handleAnswer(sel,q) {
      if(this.quizTimer)clearInterval(this.quizTimer);
      const ao=document.getElementById('quizOpts').querySelectorAll('.quiz-opt');ao.forEach(o=>o.classList.add('disabled'));
      const c=q.a,ok=sel===c,tb=Math.max(0,this.quizTimeLeft);
      if(sel>=0&&ao[sel])ao[sel].classList.add(ok?'correct':'wrong');
      if(!ok&&ao[c])ao[c].classList.add('correct');
      if(q.tip){const e=document.getElementById('quizAnalysis');e.textContent='💡 '+q.tip;e.classList.add('show');}
      let dmg=0,dt='miss';
      if(ok){const b=this.buffEnd>Date.now(),base=Math.floor(Math.random()*3000+2000);dmg=base+tb*100;if(b)dmg*=2;if(Math.random()<0.2){dmg=Math.floor(dmg*1.8);dt='crit';}else dt='normal';}
      setTimeout(()=>{document.getElementById('quizOverlay').classList.remove('active');this.raidInProgress=false;if(ok)this.applyDamage(dmg,dt);else{this.showDmgText('MISS','miss');showToast('❌ 答错！判官毫发无损','error');}},ok?1200:2000);
    },
    applyDamage(d,t) {
      this.bossHp=Math.max(0,this.bossHp-d);this.todayDmg+=d;
      document.getElementById('bossPanel').style.animation='screenShake 0.45s ease-out';setTimeout(()=>document.getElementById('bossPanel').style.animation='',450);
      const ba=document.getElementById('bossAv');ba.classList.add('hit');setTimeout(()=>ba.classList.remove('hit'),350);
      const bi=document.getElementById('bossImg');if(bi){bi.classList.add('hit');setTimeout(()=>bi.classList.remove('hit'),350);}
      const p=t==='crit'?'💥 CRIT! -':'-',s=t==='crit'?' 弱点识破！':' HIT!';
      this.showDmgText(`${p}${d.toLocaleString()}${s}`,t==='crit'?'crit':'normal');
      const qg=Math.floor(d/50);this.qi+=qg;
      showToast(`⚔ -${d.toLocaleString()} DMG · +${qg} QI`,'success');
      if(this.bossHp<=0)setTimeout(()=>{this.qi+=500;this.crystals+=100;showToast('🎉 BOSS SLAIN! +500QI +100💎','buff',5000);this.updateUI();},600);
      this.updateUI();
    },
    showDmgText(t,type) {
      const e=document.createElement('div');e.className=`dmg-text dmg-${type}`;e.textContent=t;
      e.style.left=`calc(50% + ${Math.random()*80-40}px)`;e.style.top=`calc(35% + ${Math.random()*40-20}px)`;
      e.style.animation='dmgFloat 1.5s forwards';
      document.querySelector('.boss-chamber').appendChild(e);setTimeout(()=>e.remove(),1500);
    },
    buyPill() {
      if(this.crystals<50){showToast('❌ 灵石不足！需50💎','error');return;}
      if(this.buffEnd>Date.now()){showToast('⚠ 玉露仍在生效','error');return;}
      this.crystals-=50;this.buffEnd=Date.now()+18e5;this.saveState();this.updateUI();this.startBuffTimer();
      showToast('💊 双倍玉露激活！30min QI×2','buff',4000);
    },
    checkBuff(){if(this.buffEnd>Date.now())this.startBuffTimer();},
    startBuffTimer() {
      const p=document.getElementById('buffPill'),t=document.getElementById('buffTimer');p.style.display='flex';
      if(this.buffInterval)clearInterval(this.buffInterval);
      this.buffInterval=setInterval(()=>{const r=this.buffEnd-Date.now();if(r<=0){clearInterval(this.buffInterval);p.style.display='none';showToast('💊 玉露效果结束','buff');return;}t.textContent=`${Math.floor(r/6e4)}:${Math.floor(r%6e4/1e3).toString().padStart(2,'0')}`;},1000);
    },
  };

  window.addEventListener('DOMContentLoaded',()=>Shenxiao.init());
  </script>
