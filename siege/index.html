<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>еҢ—еӨ§ж¶Ҳж¶Ҳд№?В· иҖғз ”дёүж¶ҲеӨ§дҪңжҲ?/title>
<meta name="description" content="ж¶ҲйҷӨж–№еқ—и§ҰеҸ‘иҖғз ”зңҹйўҳпјҢеӣӣз§?01/201/301/408е…ЁиҰҶзӣ?>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080f;--bg2:#10101c;--bg3:#181830;--card:rgba(20,20,42,.92);--text:#e8e8f0;--dim:#555570;--sub:#8888a8;--border:rgba(255,255,255,.06);--font-d:'Orbitron',monospace;--font-b:'Noto Sans SC',sans-serif;--accent:#ff2e63;--accent2:#ffd700}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-grid{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(255,46,99,.02) 50px),repeating-linear-gradient(90deg,transparent,transparent 49px,rgba(255,46,99,.02) 50px);pointer-events:none;z-index:0;animation:scanBg 10s linear infinite}
@keyframes scanBg{0%{background-position:0 0}100%{background-position:50px 50px}}
.subject-101{--sc:#ff2e63;--sc2:#ff6b8a;--sc3:rgba(255,46,99,.12)}
.subject-201{--sc:#3b82f6;--sc2:#60a5fa;--sc3:rgba(59,130,246,.12)}
.subject-301{--sc:#ffd700;--sc2:#ffe44d;--sc3:rgba(255,215,0,.12)}
.subject-408{--sc:#39ff14;--sc2:#6fff4d;--sc3:rgba(57,255,20,.12)}

/* Screens */
.screen{display:none;padding:16px;max-width:520px;margin:0 auto;min-height:100vh}
.screen.active{display:block}

/* Subject Select */
.hero{text-align:center;padding:30px 0 20px}
.hero h1{font-family:var(--font-d);font-size:22px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:12px;color:var(--dim);margin-top:6px;font-family:var(--font-d);letter-spacing:3px}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.sub-card{background:rgba(20,20,42,0.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;transition:.4s;position:relative;overflow:hidden}
.sub-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:.3s}
.sub-card:hover{transform:translateY(-8px);box-shadow:0 12px 40px rgba(0,0,0,.6);background:rgba(30,30,60,0.8);border-color:rgba(255,255,255,0.2)}
.sub-card:hover::before{opacity:1;box-shadow:0 0 10px currentColor}
.sub-card .sc-code{font-family:var(--font-d);font-size:36px;font-weight:900}
.sub-card .sc-name{font-size:14px;margin-top:6px;font-weight:600}
.sub-card .sc-desc{font-size:11px;color:var(--sub);margin-top:4px}
.sub-card.s101{color:#ff2e63}.sub-card.s101::before{background:linear-gradient(90deg,#ff2e63,#ff6b8a)}
.sub-card.s201{color:#3b82f6}.sub-card.s201::before{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.sub-card.s301{color:#ffd700}.sub-card.s301::before{background:linear-gradient(90deg,#ffd700,#ffe44d)}
.sub-card.s408{color:#39ff14}.sub-card.s408::before{background:linear-gradient(90deg,#39ff14,#6fff4d)}

/* Mode Select */
.mode-cards{display:grid;gap:12px;margin-top:16px}
.mode-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:14px}
.mode-card:hover{border-color:var(--sc);transform:translateY(-2px)}
.mode-card .mc-icon{font-size:32px;flex-shrink:0}
.mode-card .mc-title{font-size:16px;font-weight:700}
.mode-card .mc-desc{font-size:11px;color:var(--sub);margin-top:2px}

/* Game HUD */
.hud{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.hud-item{text-align:center;min-width:50px}
.hud-label{font-family:var(--font-d);font-size:8px;letter-spacing:1px;color:var(--dim)}
.hud-val{font-family:var(--font-d);font-size:18px;font-weight:900;color:var(--sc,var(--accent))}
.hud-combo{color:var(--accent2)!important;animation:comboFlash .5s ease}
@keyframes comboFlash{0%{transform:scale(1.5)}100%{transform:scale(1)}}
.btn-back{background:none;border:1px solid var(--border);color:var(--sub);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:var(--font-b)}

/* Grid */
.grid-wrap{position:relative;aspect-ratio:1;width:100%;max-width:480px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.grid{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:100%;height:100%;padding:4px;gap:2px}
.cell{border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,4vw,28px);cursor:pointer;transition:transform .15s,opacity .15s,background .2s;user-select:none;-webkit-user-select:none;position:relative}
.cell:active{transform:scale(.9)}
.cell.selected{outline:3px solid var(--sc,#fff);outline-offset:-2px;animation:selPulse .8s ease infinite}
@keyframes selPulse{0%,100%{outline-color:var(--sc,#fff)}50%{outline-color:transparent}}
.cell.matched{animation:matchPop .4s ease forwards}
@keyframes matchPop{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3)}100%{transform:scale(0);opacity:0}}
.cell.falling{animation:fallIn .3s ease}
@keyframes fallIn{from{transform:translateY(-60px);opacity:0}to{transform:translateY(0);opacity:1}}
.cell.hint{animation:hintGlow 1s ease infinite}
@keyframes hintGlow{0%,100%{box-shadow:0 0 0 rgba(255,215,0,0)}50%{box-shadow:0 0 16px rgba(255,215,0,.6)}}

/* Question Modal */
.q-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.q-overlay.show{display:flex}
.q-modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px;animation:modalIn .3s ease}
@keyframes modalIn{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.q-modal::-webkit-scrollbar{width:3px}
.q-modal::-webkit-scrollbar-thumb{background:var(--sc,var(--accent));border-radius:3px}
.q-badge{font-family:var(--font-d);font-size:9px;letter-spacing:2px;padding:3px 10px;border-radius:12px;display:inline-block;margin-bottom:12px;background:var(--sc3,rgba(255,46,99,.1));color:var(--sc,var(--accent));border:1px solid currentColor}
.q-stem{font-size:15px;line-height:1.9;margin-bottom:16px;white-space:pre-wrap}
.q-opts{display:grid;gap:8px}
.q-opt{padding:12px 16px;border:1px solid var(--border);border-radius:12px;cursor:pointer;font-size:14px;line-height:1.6;transition:.2s;text-align:left;background:var(--card)}
.q-opt:hover{border-color:var(--sc,var(--accent));background:var(--sc3,rgba(255,46,99,.06))}
.q-opt.correct{border-color:#39ff14!important;background:rgba(57,255,20,.12)!important;color:#39ff14}
.q-opt.wrong{border-color:#ff2e63!important;background:rgba(255,46,99,.12)!important;color:#ff2e63}
.q-opt.reveal{border-color:#39ff14!important;background:rgba(57,255,20,.06)!important}
.q-analysis{display:none;margin-top:16px;padding:14px;background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.15);border-radius:12px;font-size:13px;line-height:1.8;color:var(--sub)}
.q-analysis.show{display:block}
.q-analysis strong{color:var(--accent2)}
.q-next{display:none;width:100%;padding:12px;margin-top:12px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--sc,var(--accent)),var(--accent2));color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-b)}
.q-next.show{display:block}
.q-timer{font-family:var(--font-d);font-size:11px;color:var(--accent);float:right}

/* Results */
.result-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:12px;text-align:center}
.result-card h2{font-family:var(--font-d);font-size:14px;letter-spacing:2px;color:var(--sc,var(--accent));margin-bottom:16px}
.r-score{font-family:var(--font-d);font-size:52px;font-weight:900;background:linear-gradient(135deg,var(--sc,var(--accent)),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.r-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px}
.r-stat{padding:10px;background:var(--bg3);border-radius:10px}
.r-stat .rs-val{font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--text)}
.r-stat .rs-lbl{font-size:10px;color:var(--dim);margin-top:2px}
.btn-primary{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--sc,var(--accent)),var(--accent2));color:#000;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;font-family:var(--font-b);transition:.2s}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{width:100%;padding:12px;border:1px solid var(--border);border-radius:14px;background:transparent;color:var(--text);font-size:14px;cursor:pointer;margin-top:8px;font-family:var(--font-b)}

/* Error Book */
.err-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.err-item .ei-q{font-size:13px;line-height:1.7}
.err-item .ei-a{font-size:12px;color:#39ff14;margin-top:6px}
.err-item .ei-w{font-size:12px;color:#ff2e63;margin-top:2px}
.err-empty{text-align:center;color:var(--dim);padding:40px 0;font-size:14px}

/* Exam Mode */
.exam-progress{width:100%;height:4px;background:var(--bg3);border-radius:2px;margin:12px 0;overflow:hidden}
.exam-bar{height:100%;background:linear-gradient(90deg,var(--sc,var(--accent)),var(--accent2));border-radius:2px;transition:width .3s}
.exam-q-num{font-family:var(--font-d);font-size:11px;color:var(--dim);margin-bottom:8px}
</style>
</head>

<script>
// ============================================================
//  еҢ—еӨ§ж¶Ҳж¶Ҳд№?В· иҖғз ”дёүж¶ҲеӨ§дҪңжҲ?вҖ?жёёжҲҸеј•ж“Һ
// ============================================================

const GRID_SIZE = 8;
const PIECE_TYPES = {
  '101': ['рҹ”ҙ','вӯ?,'рҹ“•','рҹҸӣпё?,'вҡ–пёҸ','рҹ”Ҙ'],
  '201': ['рҹ”ө','рҹ“ҳ','вңҸпёҸ','рҹҢҚ','рҹ“–','рҹҺҜ'],
  '301': ['рҹҹЎ','рҹ“җ','рҹ”ў','рҹ“Ҡ','рҹ’Ў','вҡ?],
  '408': ['рҹҹў','рҹ’»','рҹ–Ҙпё?,'рҹ“Ў','рҹ”§','рҹҢҗ']
};
const SUB_CLASSES = {'101':'subject-101','201':'subject-201','301':'subject-301','408':'subject-408'};

// State
let currentSubject = '101';
let board = [];
let selected = null;
let isProcessing = false;
let score = 0, combo = 1, lives = 3, answered = 0, correct = 0;
let gameActive = false;
let currentQuestion = null;
let questionCallback = null;
let examQuestions = [], examIndex = 0, examStartTime = 0, examTimerId = 0;

// ---- Screen Management ----
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'scrErrors') renderErrorBook();
  if (id === 'scrSubject') updateTotalStats();
}

function selectSubject(sub) {
  currentSubject = sub;
  document.body.className = SUB_CLASSES[sub] || '';
  document.getElementById('modeTitle').textContent = {
    '101':'101 ж”ҝжІ» В· зәўиүІйЈҺжҡҙ','201':'201 иӢұиҜӯ В· еҜҶз Ғзҹ©йҳө',
    '301':'301 ж•°еӯҰ В· з®—з»Ҹиҝ·йҳө','408':'408 и®Ўз®—жң?В· еӨ©зҪ‘ж јж–—'
  }[sub];
  showScreen('scrMode');
}

// ---- Match-3 Engine ----
function initBoard() {
  const types = PIECE_TYPES[currentSubject];
  board = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    board[r] = [];
    for (let c = 0; c < GRID_SIZE; c++) {
      let t;
      do { t = types[Math.floor(Math.random() * types.length)]; }
      while ((c >= 2 && board[r][c-1] === t && board[r][c-2] === t) ||
             (r >= 2 && board[r-1][c] === t && board[r-2][c] === t));
      board[r][c] = t;
    }
  }
}

function renderBoard() {
  const grid = document.getElementById('gameGrid');
  grid.innerHTML = '';
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = board[r][c];
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.style.background = `rgba(255,255,255,.03)`;
      cell.addEventListener('click', () => onCellClick(r, c));
      grid.appendChild(cell);
    }
  }
}

function getCellEl(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function onCellClick(r, c) {
  if (isProcessing || !gameActive) return;
  if (!selected) {
    selected = {r, c};
    getCellEl(r, c)?.classList.add('selected');
    return;
  }
  getCellEl(selected.r, selected.c)?.classList.remove('selected');
  const dr = Math.abs(selected.r - r), dc = Math.abs(selected.c - c);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
    trySwap(selected.r, selected.c, r, c);
  }
  selected = null;
}

async function trySwap(r1, c1, r2, c2) {
  isProcessing = true;
  // Swap
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
  renderBoard();
  const matches = findAllMatches();
  if (matches.length === 0) {
    // Swap back
    await sleep(200);
    [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
    renderBoard();
    isProcessing = false;
    return;
  }
  await processMatches(matches);
  isProcessing = false;
}

function findAllMatches() {
  const matched = new Set();
  // Horizontal
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c <= GRID_SIZE - 3; c++) {
      if (board[r][c] && board[r][c] === board[r][c+1] && board[r][c] === board[r][c+2]) {
        let end = c + 2;
        while (end + 1 < GRID_SIZE && board[r][end+1] === board[r][c]) end++;
        for (let i = c; i <= end; i++) matched.add(`${r},${i}`);
      }
    }
  }
  // Vertical
  for (let c = 0; c < GRID_SIZE; c++) {
    for (let r = 0; r <= GRID_SIZE - 3; r++) {
      if (board[r][c] && board[r][c] === board[r+1][c] && board[r][c] === board[r+2][c]) {
        let end = r + 2;
        while (end + 1 < GRID_SIZE && board[end+1][c] === board[r][c]) end++;
        for (let i = r; i <= end; i++) matched.add(`${i},${c}`);
      }
    }
  }
  return [...matched].map(s => { const [r,c] = s.split(',').map(Number); return {r,c}; });
}

async function processMatches(matches) {
  // Determine match type by count
  const count = matches.length;
  const qType = count >= 7 ? 'material' : count >= 5 ? 'judge' : count >= 4 ? 'multi' : 'single';
  
  // Animate matched cells
  matches.forEach(({r,c}) => getCellEl(r,c)?.classList.add('matched'));
  await sleep(400);

  // Show question
  const q = getQuestion(currentSubject, qType);
  if (q) {
    const isCorrect = await showQuestion(q, qType);
    answered++;
    if (isCorrect) {
      correct++;
      const points = {single:1,multi:3,judge:5,material:10}[qType] * combo;
      score += points;
      combo++;
    } else {
      lives--;
      combo = 1;
      saveError(q);
      if (lives <= 0) { endGame(); return; }
    }
    updateHUD();
  }

  // Remove matched & fill
  matches.forEach(({r,c}) => board[r][c] = null);
  await dropPieces();
  renderBoard();
  
  // Chain check
  await sleep(200);
  const newMatches = findAllMatches();
  if (newMatches.length > 0) {
    await processMatches(newMatches);
  }
}

async function dropPieces() {
  const types = PIECE_TYPES[currentSubject];
  for (let c = 0; c < GRID_SIZE; c++) {
    let writePos = GRID_SIZE - 1;
    for (let r = GRID_SIZE - 1; r >= 0; r--) {
      if (board[r][c] !== null) {
        board[writePos][c] = board[r][c];
        if (writePos !== r) board[r][c] = null;
        writePos--;
      }
    }
    for (let r = writePos; r >= 0; r--) {
      board[r][c] = types[Math.floor(Math.random() * types.length)];
    }
  }
}

// ---- Question System ----
function getQuestion(subject, type) {
  // дјҳе…Ҳд»ҺдёӯиҪ¬з«ҷжӢүеҸ–
  if (window.PKU_RELAY?.ready) {
    const q = PKU_RELAY.getQuestion(subject, type);
    if (q) return q;
  }
  // FallbackеҲ°жң¬ең°йўҳеә?  if (typeof QUESTION_BANK === 'undefined') return null;
  const bank = QUESTION_BANK[subject];
  if (!bank) return null;
  const pool = bank.filter(q => {
    if (type === 'single') return q.type === 'single';
    if (type === 'multi') return q.type === 'multi';
    if (type === 'judge') return q.type === 'judge';
    return q.type === 'material' || q.type === 'fill';
  });
  if (pool.length === 0) return bank[Math.floor(Math.random() * bank.length)];
  return pool[Math.floor(Math.random() * pool.length)];
}

function showQuestion(q, matchType) {
  return new Promise(resolve => {
    const overlay = document.getElementById('qOverlay');
    const badge = document.getElementById('qBadge');
    const stem = document.getElementById('qStem');
    const opts = document.getElementById('qOpts');
    const analysis = document.getElementById('qAnalysis');
    const next = document.getElementById('qNext');
    const timerEl = document.getElementById('qTimer');

    const typeNames = {single:'еҚ•йҖүйўҳ',multi:'еӨҡйҖүйўҳ',judge:'еҲӨж–ӯйў?,fill:'еЎ«з©әйў?,material:'жқҗж–ҷеҲҶжһҗ'};
    const points = {single:1,multi:3,judge:5,material:10,fill:5};
    badge.textContent = `${typeNames[q.type]||'йҖүжӢ©йў?} В· ${points[matchType]||1}еҲҶ`;
    stem.textContent = q.stem;
    opts.innerHTML = '';
    analysis.classList.remove('show');
    next.classList.remove('show');

    // Timer
    let timeLeft = q.timeLimit || (q.type === 'material' ? 180 : 60);
    timerEl.textContent = timeLeft + 's';
    const timer = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft + 's';
      if (timeLeft <= 0) {
        clearInterval(timer);
        finishQuestion(false);
      }
    }, 1000);

    let answered = false;
    function finishQuestion(isCorrect) {
      if (answered) return;
      answered = true;
      clearInterval(timer);
      // Show analysis
      analysis.innerHTML = `<strong>зӯ”жЎҲпј?{q.answer}</strong><br>${q.analysis || ''}`;
      analysis.classList.add('show');
      next.classList.add('show');
      questionCallback = () => {
        overlay.classList.remove('show');
        resolve(isCorrect);
      };
    }

    // Render options
    if (q.options) {
      q.options.forEach((opt, i) => {
        const btn = document.createElement('div');
        btn.className = 'q-opt';
        btn.textContent = opt;
        btn.addEventListener('click', () => {
          if (answered) return;
          const optLetter = opt.charAt(0);
          const isCorrect = q.type === 'multi'
            ? opt.charAt(0) === q.answer // simplified multi
            : optLetter === q.answer || opt === q.answer;
          
          // For single choice
          if (q.type === 'single' || q.type === 'judge') {
            const correct = optLetter === q.answer;
            btn.classList.add(correct ? 'correct' : 'wrong');
            if (!correct) {
              opts.querySelectorAll('.q-opt').forEach(o => {
                if (o.textContent.charAt(0) === q.answer) o.classList.add('reveal');
              });
            }
            finishQuestion(correct);
          } else if (q.type === 'multi') {
            btn.classList.toggle('correct');
          }
        });
        opts.appendChild(btn);
      });
      
      // Multi-choice submit
      if (q.type === 'multi') {
        const submitBtn = document.createElement('div');
        submitBtn.className = 'q-opt';
        submitBtn.style.cssText = 'text-align:center;background:linear-gradient(135deg,var(--sc,#ff2e63),var(--accent2));color:#000;font-weight:700;';
        submitBtn.textContent = 'вң?жҸҗдәӨзӯ”жЎҲ';
        submitBtn.addEventListener('click', () => {
          if (answered) return;
          const selected = [...opts.querySelectorAll('.q-opt.correct')].map(o => o.textContent.charAt(0)).sort().join('');
          const correctAns = q.answer.split('').sort().join('');
          finishQuestion(selected === correctAns);
        });
        opts.appendChild(submitBtn);
      }
    }

    overlay.classList.add('show');
  });
}

function closeQuestion() {
  if (questionCallback) questionCallback();
  questionCallback = null;
}

  });

    const results = await AI_QUESTION_ENGINE.batchGenerate(subject, count, (msg, pct) => {

    btn.textContent = 'рҹҺү е®ҢжҲҗпј?;
    setTimeout(() => showAIPanel(), 2000); // еҲ·ж–°з»ҹи®Ў
  } catch(e) {
    progText.textContent = 'вқ?' + e.message;
