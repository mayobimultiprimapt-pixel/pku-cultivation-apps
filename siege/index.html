<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>词汇消消乐 · 完形填空三消 — 北大考研修仙应用集</title>
  <meta name="description" content="Candy Crush式三消 x 英语完形填空 — 消除正确词汇填入空格">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;600;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="crush-style.css">
</head>
<body>
  <div id="app">
    <!-- Level Select -->
    <section id="levelScreen" class="screen">
      <div class="lv-bg"></div>
      <header class="lv-header">
        <a href="../index.html" class="back-btn" title="返回门户">🏠</a>
        <h1 class="lv-title">🧩 词汇消消乐</h1>
        <div class="lv-stars" id="lvTotalStars">⭐ 0/60</div>
      </header>
      <div class="lv-tabs">
        <button class="lv-tab" data-mode="politics" id="tabPol">101 政治填空</button>
        <button class="lv-tab active" data-mode="english" id="tabEng">201 英语完形</button>
        <button class="lv-tab" data-mode="math" id="tabMath">301 数学填空</button>
        <button class="lv-tab" data-mode="cs" id="tabCs">408 计算机</button>
      </div>
      <div class="lv-map" id="lvMap"></div>
      <div class="lv-popup hidden" id="lvPopup">
        <div class="lv-popup-card">
          <div class="lv-popup-close" onclick="CrushApp.closePopup()">x</div>
          <div class="lv-popup-level" id="popLevel">Level 1</div>
          <div class="lv-popup-sentence" id="popSentence">Loading...</div>
          <div class="lv-popup-meta">
            <span>🎯 消除正确词汇 x3</span>
            <span id="popMoves">📦 25步</span>
          </div>
          <button class="btn-gold" onclick="CrushApp.startLevel()">开始挑战</button>
        </div>
      </div>
    </section>

    <!-- Game -->
    <section id="gameScreen" class="screen hidden">
      <div class="game-bg"></div>
      <div class="game-hud">
        <div class="hud-left">
          <button class="hud-back" onclick="CrushApp.backToLevels()">←</button>
          <span class="hud-level" id="gameLevel">Lv.1</span>
        </div>
        <div class="hud-center">
          <span class="hud-score" id="gameScore">0</span>
        </div>
        <div class="hud-right">
          <span class="hud-moves" id="gameMoves">25</span>
          <small>步</small>
        </div>
      </div>
      <div class="game-sentence" id="gameSentence">
        <div class="sentence-text" id="sentenceText">Loading...</div>
        <div class="sentence-hint" id="sentenceHint"></div>
      </div>
      <div class="game-progress">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
        <span class="progress-text" id="progressText">0/20</span>
      </div>
      <div class="game-grid-wrap">
        <div class="game-grid" id="gameGrid"></div>
      </div>
      <div class="combo-display hidden" id="comboDisplay">
        <span class="combo-text" id="comboText">COMBO x3!</span>
      </div>
      <!-- float-score elements are now created dynamically -->
    </section>

    <!-- Result -->
    <section id="resultScreen" class="screen hidden">
      <div class="result-bg"></div>
      <div class="result-card">
        <div class="result-stars" id="resultStars">⭐⭐⭐</div>
        <h2 class="result-title" id="resultTitle">通关!</h2>
        <div class="result-sentence" id="resultSentence"></div>
        <div class="result-grid">
          <div class="rg"><span class="rg-l">得分</span><span class="rg-v" id="rScore">0</span></div>
          <div class="rg"><span class="rg-l">步数</span><span class="rg-v" id="rMoves">0/25</span></div>
          <div class="rg"><span class="rg-l">最高连消</span><span class="rg-v" id="rCombo">0</span></div>
          <div class="rg"><span class="rg-l">词汇</span><span class="rg-v" id="rWords">0</span></div>
          <div class="rg"><span class="rg-l">用时</span><span class="rg-v" id="rTime">0:00</span></div>
          <div class="rg"><span class="rg-l">灵气</span><span class="rg-v" id="rQi">+0</span></div>
        </div>
        <div class="result-learn" id="resultLearn"></div>
        <div class="result-btns">
          <button class="btn-gold" onclick="CrushApp.nextLevel()">下一关</button>
          <button class="btn-ghost" onclick="CrushApp.backToLevels()">返回</button>
        </div>
      </div>
    </section>
  </div>

  <script src="crush-data.js"></script>
  <script src="crush-engine.js"></script>
  <script src="crush-app.js"></script>
</body>
</html>
