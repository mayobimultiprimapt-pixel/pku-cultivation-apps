<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>题库搜集站 · 绝密考卷金库</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060e;--bg2:#0c0c18;--bg3:#141428;--card:rgba(16,16,36,.95);--text:#e4e4f0;--dim:#4a4a6a;--sub:#7a7a9a;--border:rgba(255,255,255,.06);--gold:#ffd700;--red:#ff2e63;--blue:#3b82f6;--green:#39ff14;--font-d:'Orbitron',monospace;--font-b:'Noto Sans SC',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:16px}
.vault-header{text-align:center;padding:30px 0 20px;position:relative}
.vault-header::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.vault-title{font-family:var(--font-d);font-size:20px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--gold),var(--red));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.vault-sub{font-family:var(--font-d);font-size:9px;letter-spacing:4px;color:var(--dim);margin-top:6px}
.vault-badge{display:inline-block;margin-top:10px;padding:4px 14px;border:1px solid var(--red);border-radius:20px;font-family:var(--font-d);font-size:8px;letter-spacing:3px;color:var(--red);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:20px 0}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:.2s}
.stat-card:hover,.stat-card.active{transform:translateY(-2px);border-color:var(--gold)}
.stat-card .sc-num{font-family:var(--font-d);font-size:24px;font-weight:900}
.stat-card .sc-label{font-size:10px;color:var(--sub);margin-top:2px}
.stat-card.s101 .sc-num{color:var(--red)}.stat-card.s201 .sc-num{color:var(--blue)}
.stat-card.s301 .sc-num{color:var(--gold)}.stat-card.s408 .sc-num{color:var(--green)}

/* Sections */
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px}
.section-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title .icon{font-size:20px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 16px;border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;white-space:nowrap;transition:.2s}
.tab.active{border-color:var(--gold);background:rgba(255,215,0,.08);color:var(--gold)}

/* Engine Grid */
.engine-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.engine-card{padding:10px;border:1px solid var(--border);border-radius:10px;text-align:center;transition:.2s}
.engine-card.active{border-color:var(--gold);background:rgba(255,215,0,.05)}
.engine-card .ec-model{font-family:var(--font-d);font-size:9px;font-weight:700}
.engine-card .ec-status{font-size:9px;margin-top:4px;color:var(--green)}

/* Controls */
select{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:var(--font-b);margin:4px 0}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-b);transition:.2s;margin-top:8px}
.btn-gold{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000}
.btn-red{background:linear-gradient(135deg,var(--red),#ff6b8a);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.5;cursor:not-allowed}

/* Progress */
.progress-wrap{margin:12px 0;display:none}
.progress-wrap.show{display:block}
.progress-text{font-size:11px;color:var(--sub);margin-bottom:6px}
.progress-bar{width:100%;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--red));border-radius:2px;transition:width .3s;width:0%}

/* Log */
.log{max-height:200px;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:8px;font-family:monospace;font-size:11px;line-height:1.8}
.log::-webkit-scrollbar{width:3px}.log::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
.log-entry{border-bottom:1px solid var(--border);padding:2px 0}
.log-entry.success{color:var(--green)}.log-entry.error{color:var(--red)}.log-entry.info{color:var(--blue)}

/* Paper Cards */
.paper-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:8px;transition:.2s}
.paper-card:hover{border-color:var(--gold)}
.paper-head{display:flex;justify-content:space-between;align-items:center}
.paper-title{font-size:14px;font-weight:700}
.paper-badge{font-family:var(--font-d);font-size:9px;padding:3px 10px;border-radius:6px;letter-spacing:1px}
.paper-badge.s101{background:rgba(255,46,99,.1);color:var(--red);border:1px solid rgba(255,46,99,.3)}
.paper-badge.s201{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.paper-badge.s301{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.paper-badge.s408{background:rgba(57,255,20,.1);color:var(--green);border:1px solid rgba(57,255,20,.3)}
.paper-meta{font-size:10px;color:var(--sub);margin-top:4px}
.paper-preview{margin-top:10px;padding:10px;background:var(--bg);border-radius:8px;font-size:12px;line-height:1.8;max-height:200px;overflow-y:auto;display:none}
.paper-preview.show{display:block}
.paper-q{padding:6px 0;border-bottom:1px solid var(--border)}
.paper-q .stem{font-weight:600}.paper-q .opts{color:var(--sub);margin-left:16px}
.paper-q .ans{color:var(--green);font-size:11px;margin-left:16px}

/* Subject Filter Tabs */
.subj-tabs{display:flex;gap:6px;margin-bottom:12px}
.subj-tab{padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--border);transition:.2s}
.subj-tab.active{border-color:var(--gold);background:rgba(255,215,0,.08);color:var(--gold)}

/* Nav */
.back-btn{display:inline-flex;align-items:center;gap:4px;color:var(--sub);font-size:12px;text-decoration:none;margin-bottom:12px}.back-btn:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
  <a class="back-btn" href="../">← 返回应用集</a>
  
  <div class="vault-header">
    <div class="vault-title">题库搜集站</div>

      <div class="subj-tabs">

        <div class="subj-tab" onclick="filterSubj('101')">101 政治</div>

</div>

<script src="../api-keys.js"></script>
<script>
// ============================================================

// ============================================================

    topics: '词汇/语法/上下文连贯、阅读理解(主旨/细节/推断/态度/词义)、七选五/段落排序/小标题匹配',
    sections: [
      { type:'cloze',   label:'完形填空',   count:20, score:0.5, note:'约350词文章20空，四选一考词汇/语法/连贯' },
      { type:'reading', label:'阅读理解A节', count:20, score:2,   note:'4篇文章各5题，主旨/细节/推断/态度/词义' },
      { type:'newtype', label:'新题型B节',   count:5,  score:2,   note:'七选五/段落排序/小标题匹配' }
    ],

  },

    structure: '单选10题(每题5分=50分) + 填空6题(每题5分=30分) + 解答6题(共70分)',
    topics: '高等数学60%(极限/导数/积分/微分方程/级数/多元函数) 线性代数20%(行列式/矩阵/特征值/二次型) 概率论20%(随机变量/数字特征/假设检验)',
    sections: [
      { type:'single', label:'选择题', count:10, score:5, note:'四选一，基本概念/性质/计算/简单应用' },
      { type:'blank',  label:'填空题', count:6,  score:5, note:'直接填写结果，基本运算/公式/简单推理' }
    ],
    count: 16
  },
  '408': {
    name: '计算机学科专业基础', score: 150, time: 180,
    structure: '单选40题(每题2分=80分) + 综合应用7题(共70分)',
    topics: '数据结构45分(线性表/树/图/排序/查找) 计算机组成原理45分(CPU/存储器/总线/IO) 操作系统35分(进程/内存/文件) 计算机网络25分(TCP/IP/路由/HTTP)',
    sections: [
      { type:'single', label:'单项选择题', count:40, score:2, note:'四选一，覆盖四大模块所有基础知识点' }
    ],
    count: 40
  }

const MODELS = {
  // Gemini 全家族
  gemini31pro:  { url: 'GEMINI', model: 'gemini-3.1-pro-preview',       name: 'Gemini-3.1-Pro',   icon: '💎' },
  gemini3flash: { url: 'GEMINI', model: 'gemini-3-flash-preview',       name: 'Gemini-3-Flash',   icon: '⚡' },
  gemini25pro:  { url: 'GEMINI', model: 'gemini-2.5-pro',               name: 'Gemini-2.5-Pro',   icon: '🧠' },
  gemini25flash:{ url: 'GEMINI', model: 'gemini-2.5-flash',             name: 'Gemini-2.5-Flash', icon: '💨' },
  gemini31lite: { url: 'GEMINI', model: 'gemini-3.1-flash-lite-preview',name: 'Gemini-3.1-Lite',  icon: '🪶' },
  // 其他最强模型
  claude:       { url: 'OR', model: 'anthropic/claude-sonnet-4.5', name: 'Claude-4.5',  icon: '🎯' },
  gpt4:         { url: 'OR', model: 'openai/gpt-4.1',             name: 'GPT-4.1',    icon: '🌐' },
  deepseek:     { url: 'OR', model: 'deepseek/deepseek-r1-0528',   name: 'DeepSeek-R1', icon: '🔬' },
  deepseekV3:   { url: 'OR', model: 'deepseek/deepseek-v3.2',      name: 'V3.2',        icon: '🚀' }
};

// ---- Storage ----
function getVault(subj) {
  try { return JSON.parse(localStorage.getItem(`vault_${subj}`) || '[]'); } catch(e) { return []; }
}
function saveVault(subj, papers) {
  localStorage.setItem(`vault_${subj}`, JSON.stringify(papers));
}
function addPaper(subj, paper) {
  const vault = getVault(subj);
  vault.unshift(paper);
  saveVault(subj, vault);
  updateStats();
}

// ---- Stats ----
function updateStats() {
  ['101','201','301','408'].forEach(s => {
    document.getElementById('st' + s).textContent = getVault(s).length;
  });
}

// ---- Tab Switch ----
function switchTab(tab) {
  document.querySelectorAll('.vault-tab').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (tab === 'collect') {
    document.getElementById('tabCollect').style.display = 'block';
  } else {
    document.getElementById('tabVault').style.display = 'block';
    renderVault();
  }
  event.target.classList.add('active');
}
// ---- AI Call (直连OpenRouter, Gemini走中转, 55s超时) ----
function getORKey() {
  if (window.PKU_KEYS?.OPENROUTER_API_KEY) return window.PKU_KEYS.OPENROUTER_API_KEY;
  return atob('c2stb3ItdjEtYzdiZWEyMDc3ZGFlM2Q5MzA0ODM3NmFmMTdiNjljNzZiNmQ4ZjdlNjRiYWFjNDAwOTg0YzM5YWEzZTk4NDM5YQ==');
}

async function callAI(channel, messages) {
  const m = MODELS[channel];
  let url, headers, body;

  if (m.url === 'GEMINI') {
    // Gemini全家族走中转(不支持CORS)
    url = `${RELAY_URL}/gemini/generate`;
    headers = { 'Content-Type': 'application/json' };
    body = { model: m.model, messages, max_tokens: 8000 };
  } else {
    // OpenRouter直连(默认通过Relay中转)
    url = window.PKU_KEYS?.OPENROUTER_URL || `${RELAY_URL}/v1/chat/completions`;
    headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${getORKey()}`,
      'HTTP-Referer': 'https://mayobimultiprimapt-pixel.github.io',
      'X-Title': 'PKU Exam Vault'
    };
    body = { model: m.model, messages, temperature: 0.7, max_tokens: 8000 };
  }

  const ctrl = new AbortController();
  const tmout = setTimeout(() => ctrl.abort(), 55000);
  try {
    const res = await fetch(url, {
      method: 'POST', headers, body: JSON.stringify(body), signal: ctrl.signal
    });
    clearTimeout(tmout);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(`${m.name} ${res.status}: ${err.error?.message || ''}`);
    }
    const data = await res.json();
    return data.choices?.[0]?.message?.content || '';
  } catch(e) {
    clearTimeout(tmout);
    if (e.name === 'AbortError') throw new Error(`${m.name}: 55s超时`);
    throw e;
  }
}

// ---- JSON修复器 ----
function repairJSON(raw) {
  let s = raw.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
  s = s.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  const start = s.indexOf('[');
  if (start === -1) throw new Error('未找到JSON数组');
  s = s.substring(start);
  const end = s.lastIndexOf(']');
  if (end === -1) { s = s.replace(/,\s*$/, '') + ']'; }
  else { s = s.substring(0, end + 1); }
  s = s.replace(/,\s*([}\]])/g, '$1');
  try { return JSON.parse(s); } catch(e1) {
    const objs = [];
    const re = /\{[^{}]*(?:\{[^{}]*\}[^{}]*)*\}/g;
    let m;
    while ((m = re.exec(s)) !== null) {
      try { objs.push(JSON.parse(m[0])); } catch(e2) {
        try { objs.push(JSON.parse(m[0].replace(/,\s*}/g, '}'))); } catch(e3) {}
      }
    }
    if (objs.length > 0) return objs;
    throw new Error('JSON修复失败');
  }
}

// ---- 采集一套完整密卷 ----
async function collectPaper() {
  const subj = document.getElementById('paperSubject').value;
  const enginePref = document.getElementById('paperEngine').value;
  const btn = document.getElementById('btnCollect');
  const pw = document.getElementById('progressWrap');
  const pt = document.getElementById('progressText');
  const pf = document.getElementById('progressFill');
  const log = document.getElementById('collectLog');
  const meta = SUBJECTS[subj];

  btn.disabled = true;
  btn.textContent = '⏳ 采集中...';
  pw.classList.add('show');
  log.style.display = 'block';
  log.innerHTML = '';

  function addLog(msg, cls = '') {
    log.innerHTML += `<div class="log-entry ${cls}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    log.scrollTop = log.scrollHeight;
  }

  const paperNum = getVault(subj).length + 1;
  addLog(`📋 开始采集 ${meta.name} 第${paperNum}套密卷 (${meta.count}题·${meta.score}分·${meta.time}分钟)`, 'info');

  // 按sections生成精确的分节说明
  const sectionsDesc = meta.sections.map(s =>
    `▸ ${s.label}：严格生成 ${s.count} 题，type="${s.type}"，每题${s.score}分 — ${s.note}`
  ).join('\n');

  const totalBySection = meta.sections.map(s => `${s.label}${s.count}题`).join(' + ');

  const prompt = `你是全国硕士研究生招生考试命题组核心专家。严格按真实试卷结构生成 ${meta.name}(${subj}) 第${paperNum}套模拟密卷。

【试卷规格】
科目：${meta.name}(${subj}) | 满分：${meta.score}分 | 时长：${meta.time}分钟
真实结构：${meta.structure}
本次生成客观题部分：${totalBySection} = 共${meta.count}题

【分节出题要求（必须严格遵守题数）】
${sectionsDesc}

【考点覆盖】
${meta.topics}

【质量标准】
1. 每一节的题目数量必须精确（不多不少）
2. 每道题有4个选项(ABCD)，多选题有≥2个正确答案
3. 难度分布：基础30% + 中等45% + 拔高25%
4. 每题配专业级详细解析（含考点出处和解题思路）
5. 严格符合考研真题难度，像黄冈密卷一样精准

【输出格式】纯JSON数组，第一个字符[，最后一个字符]，禁止多余文字
[{"id":"q001","type":"${meta.sections[0].type}","stem":"题干","options":["A. ...","B. ...","C. ...","D. ..."],"answer":"A","analysis":"详细解析","chapter":"章节","difficulty":3,"score":${meta.sections[0].score}}]`;

  const channels = enginePref === 'all'
    ? ['gemini31pro','claude','gpt4','gemini3flash','deepseekV3','gemini25pro','deepseek']
    : [enginePref];

  let questions = null;
  let usedEngine = '';

  for (const ch of channels) {
    try {
      addLog(`${MODELS[ch].icon} ${MODELS[ch].name} 正在出卷...`);
      pf.style.width = '40%';
      pt.textContent = `${MODELS[ch].name} 生成中...`;

      const content = await callAI(ch, [
        { role: 'system', content: '你是考研命题专家。严格输出JSON数组，第一个字符必须是[，最后一个字符必须是]。禁止任何多余文字。' },
        { role: 'user', content: prompt }
      ]);

      questions = repairJSON(content);
      usedEngine = MODELS[ch].name;
      addLog(`✅ ${MODELS[ch].name} 出卷成功! ${questions.length}题`, 'success');
      break;
    } catch(e) {
      addLog(`❌ ${MODELS[ch].name}: ${e.message}`, 'error');
    }
  }

  if (!questions || questions.length === 0) {
    addLog('❌ 所有通道均失败', 'error');
    pt.textContent = '❌ 采集失败';
    btn.textContent = '⚡ 重新采集';
    btn.disabled = false;
    return;
  }

  // 组装完整试卷
  pf.style.width = '80%';
  pt.textContent = '📋 组装试卷...';

  const paper = {
    id: `paper-${subj}-${Date.now()}`,
    title: `${meta.name} · 密卷 #${paperNum}`,
    subject: subj,
    subjectName: meta.name,
    totalScore: meta.score,
    timeMinutes: meta.time,
    structure: meta.structure,
    engine: usedEngine,
    generatedAt: new Date().toISOString(),
    questionCount: questions.length,
    questions: questions.map((q, i) => ({
      ...q,
      id: q.id || `q${String(i+1).padStart(3,'0')}`,
      num: i + 1
    }))
  };

  addPaper(subj, paper);
  addLog(`📋 ${paper.title} (${paper.questionCount}题) 已存入金库`, 'success');

  // 推送中转阁 — 完整密卷存入万法归宗金库
  try {
    const relayResp = await fetch(`${RELAY_URL}/vault/papers`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        paper: { questions: paper.questions },
        subject: subj,
        source: usedEngine,
        paperNum: paperNum,
        metadata: {
          title: paper.title,
          totalScore: paper.totalScore,
          timeMinutes: paper.timeMinutes,
          structure: paper.structure,
          generatedAt: paper.generatedAt
        }
      })
    });
    const relayData = await relayResp.json();
    if (relayData.success) {
      addLog(`📡 密卷已同步中转阁 | 第${relayData.paperNum}套 | 全库${relayData.totalPapers}套`, 'success');
    } else {
      addLog('⚠️ 中转阁同步失败: ' + (relayData.error || ''), 'error');
    }
  } catch(e) {
    addLog('⚠️ 中转阁推送失败(本地已保存): ' + e.message.slice(0,30), 'error');
  }

  pf.style.width = '100%';
  pt.textContent = `✅ ${paper.title} 采集完成！`;
  btn.textContent = '⚡ 采集下一套';
  btn.disabled = false;
  updateStats();
}

// ---- 试卷金库渲染 ----
let currentFilter = 'all';

function filterSubj(subj) {
  currentFilter = subj;
  document.querySelectorAll('.subj-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderVault();
}

function renderVault() {
  const list = document.getElementById('vaultList');
  let allPapers = [];

  const subjects = currentFilter === 'all' ? ['101','201','301','408'] : [currentFilter];
  subjects.forEach(s => {
    getVault(s).forEach(p => allPapers.push(p));
  });

  allPapers.sort((a, b) => new Date(b.generatedAt) - new Date(a.generatedAt));

  if (allPapers.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--dim);padding:30px">暂无试卷，去「采集密卷」生成吧！</p>';
    return;
  }

  list.innerHTML = allPapers.map((p, idx) => `
    <div class="paper-card">
      <div class="paper-head">
        <div>
          <div class="paper-title">${p.title}</div>
          <div class="paper-meta">${p.questionCount || p.questions?.length || 0}题 · ${p.totalScore || '?'}分 · ${p.timeMinutes || 180}min · ${p.engine || 'AI'} · ${new Date(p.generatedAt).toLocaleString('zh-CN')}</div>
        </div>
        <span class="paper-badge s${p.subject}">${p.subject}</span>
      </div>
      <div style="margin-top:8px">
        <button class="btn btn-outline" style="padding:8px;font-size:12px;margin:0" onclick="togglePreview(${idx})">📖 展开试卷</button>
      </div>
      <div class="paper-preview" id="preview-${idx}">
        ${(p.questions || []).map((q, qi) => `
          <div class="paper-q">
            <div class="stem">${q.num || qi+1}. ${q.stem || q.question || ''}</div>
            <div class="opts">${(q.options || []).join(' &nbsp; ')}</div>
            <div class="ans">✅ ${q.answer || ''} ${q.analysis ? '| ' + q.analysis.substring(0, 60) + '...' : ''}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function togglePreview(idx) {
  const el = document.getElementById('preview-' + idx);
  el.classList.toggle('show');
}

// ---- Export & Clear ----
function exportAll() {
  const data = {};
  ['101','201','301','408'].forEach(s => { data[s] = getVault(s); });
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `exam_vault_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function clearAll() {
  if (!confirm('确认清空所有试卷？此操作不可恢复！')) return;
  ['101','201','301','408'].forEach(s => localStorage.removeItem(`vault_${s}`));
  updateStats();
  renderVault();
}

// ---- Init ----
updateStats();
</script>
</body>
</html>
