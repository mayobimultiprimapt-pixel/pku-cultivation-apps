    hexes.push({yao:[...cur], shi:4});
    // еҪ’йӯӮ: lower trigram = palace original
    cur[0]=py[0]; cur[1]=py[1]; cur[2]=py[2];
    hexes.push({yao:[...cur], shi:3});
    PALACE_HEXAGRAMS[p] = hexes;
  }
}
buildPalaces();

function yaoToTriNum(y0,y1,y2) {
  for (let k = 1; k <= 8; k++) {
    const t = TRIGRAMS[k].yao;
    if (t[0]===y0 && t[1]===y1 && t[2]===y2) return k;
  }
  return 8;
}

function findPalace(sixYao) {
  for (let p = 1; p <= 8; p++) {
    for (let i = 0; i < 8; i++) {
      const h = PALACE_HEXAGRAMS[p][i];
      if (h.yao.every((v,j) => v === sixYao[j])) return {palace:p, idx:i, shi:h.shi};
    }
  }
  return {palace:1, idx:0, shi:6};
}

// ========== жў…иҠұиө·еҚҰ ==========
function divinate(n1, n2, n3) {
  const upperNum = ((n1 - 1) % 8) + 1;
  const lowerNum = ((n2 - 1) % 8) + 1;
  const dongYao = ((n3 - 1) % 6) + 1; // 1-6
  const upper = TRIGRAMS[upperNum], lower = TRIGRAMS[lowerNum];

  // жң¬еҚҰе…ӯзҲ» [еҲқзҲ»вҶ’е…ӯзҲ»] = [дёӢеҚҰ0,1,2, дёҠеҚҰ0,1,2]
  const benYao = [...lower.yao, ...upper.yao];
  const hexName = HEX_NAMES[upperNum * 10 + lowerNum] || `${TRI_NATURE[upperNum-1]}${TRI_NATURE[lowerNum-1]}еҚҰ`;

  // дә’еҚҰ: дәҢиҮіеӣӣзҲ»дёәдёӢдә? дёүиҮідә”зҲ»дёәдёҠдә?  const huLower = yaoToTriNum(benYao[1], benYao[2], benYao[3]);
  const huUpper = yaoToTriNum(benYao[2], benYao[3], benYao[4]);
  const huName = HEX_NAMES[huUpper * 10 + huLower] || 'дә’еҚҰ';

  // еҸҳеҚҰ: еҠЁзҲ»йҳҙйҳідә’еҸҳ
  const bianYao = [...benYao];
  bianYao[dongYao - 1] = 1 - bianYao[dongYao - 1];
  const bianLower = yaoToTriNum(bianYao[0], bianYao[1], bianYao[2]);
  const bianUpper = yaoToTriNum(bianYao[3], bianYao[4], bianYao[5]);
  const bianName = HEX_NAMES[bianUpper * 10 + bianLower] || 'еҸҳеҚҰ';

  // дҪ“з”Ё: еҠЁзҲ»ең?-3(дёӢеҚҰеҠЁвҶ’дёӢеҚҰдёәз”Ё,дёҠеҚҰдёәдҪ“), еҠЁзҲ»ең?-6(дёҠеҚҰеҠЁвҶ’дёҠеҚҰдёәз”Ё,дёӢеҚҰдёәдҪ“)
  const tiNum = dongYao <= 3 ? upperNum : lowerNum;
  const yongNum = dongYao <= 3 ? lowerNum : upperNum;
  const tiWx = TRIGRAMS[tiNum].wx, yongWx = TRIGRAMS[yongNum].wx;
  const rel = wxRelation(tiWx, yongWx);

  let fortune = 'е№?;
  if (rel.includes('жҜ”е’Ң')) fortune = 'еӨ§еҗү';
  else if (rel === yongWx+'з”?+tiWx) fortune = 'еҗүВ·еҫ—еҠ?;
  else if (rel === tiWx+'з”?+yongWx) fortune = 'е°ҸеҮ¶В·ж¶ҲиҖ?;
  else if (rel === tiWx+'е…?+yongWx) fortune = 'е°ҸеҗүВ·иҙ№еҠӣеҸҜжҺ§';
  else if (rel === yongWx+'е…?+tiWx) fortune = 'еҮ¶В·еӨ–еҺӢеӨ§';

  // е…ӯзҲ»зәіз”І
  const palaceInfo = findPalace(benYao);
  const pNum = palaceInfo.palace;
  const shi = palaceInfo.shi;
  const ying = shi <= 3 ? shi + 3 : shi - 3;
  const palaceWx = TRIGRAMS[pNum].wx;

  // зәіе№Іж”?  const lowerZhi = NA_ZHI[lowerNum] || NA_ZHI[8];
  const upperZhi = NA_ZHI[upperNum] || NA_ZHI[8];
  const allZhi = [lowerZhi[0],lowerZhi[1],lowerZhi[2],upperZhi[0],upperZhi[1],upperZhi[2]];

  // е…ӯдәІ
  function sixRelation(zhiWx) {
    if (zhiWx === palaceWx) return 'е…„ејҹ';
    const pIdx = WX_ORDER.indexOf(palaceWx), eIdx = WX_ORDER.indexOf(zhiWx);
    if ((pIdx + 1) % 5 === eIdx) return 'еӯҗеӯҷ'; // жҲ‘з”ҹ
    if ((eIdx + 1) % 5 === pIdx) return 'зҲ¶жҜҚ'; // з”ҹжҲ‘
    if ((pIdx + 2) % 5 === eIdx) return 'еҰ»иҙў'; // жҲ‘е…Ӣ
    return 'е®ҳй¬ј'; // е…ӢжҲ‘
  }
  const wxOfZhi = z => {const m={'ж°?:'ж°?,'жң?:'жң?,'зҒ?:'зҒ?,'йҮ?:'йҮ?,'ең?:'ең?};return m[z[z.length-1]]||'ең?};
  const allRelations = allZhi.map(z => sixRelation(wxOfZhi(z)));

  // е…ӯзҘһ (з®ҖеҢ? з”ЁеҪ“еүҚе°Ҹж—¶дј°з®—ж—Ҙе№?
  const now = new Date();
  const dayCount = Math.floor(now.getTime() / 86400000);
  const ganIdx = dayCount % 10; // 0-9 еҜ№еә”з”І~зҷ?  const spiritStart = ganIdx <= 1 ? 0 : ganIdx <= 3 ? 1 : ganIdx === 4 ? 2 : ganIdx === 5 ? 3 : ganIdx <= 7 ? 4 : 5;
  const allSpirits = Array.from({length:6}, (_,i) => SPIRITS[(spiritStart + i) % 6]);

  return {
    nums: {n1, n2, n3},
    ben: {upper:upperNum, lower:lowerNum, name:hexName, yao:benYao},
    hu: {upper:huUpper, lower:huLower, name:huName},
    bian: {upper:bianUpper, lower:bianLower, name:bianName, yao:bianYao},
    dong: dongYao,
    ti: {num:tiNum, name:TRIGRAMS[tiNum].name, wx:tiWx, pos:dongYao<=3?'дё?:'дё?},
    yong: {num:yongNum, name:TRIGRAMS[yongNum].name, wx:yongWx, pos:dongYao<=3?'дё?:'дё?},
    rel, fortune,
    najia: {
      palace:pNum, palaceName:TRIGRAMS[pNum].name+'е®?, palaceWx,
      shi, ying, zhi:allZhi, relations:allRelations, spirits:allSpirits,
      ganName: TIAN_GAN[ganIdx]
    }
  };
}

    <div class="ty-box">
      <div style="font-size:13px;color:var(--sub)">дҪ“еҚҰ <strong style="color:var(--gold)">${g.ti.name}В·${g.ti.wx}</strong>(${g.ti.pos}) пҪ?з”ЁеҚҰ <strong style="color:var(--cyan)">${g.yong.name}В·${g.yong.wx}</strong>(${g.yong.pos})</div>
      <div class="ty-rel">${g.rel}</div>
      <div class="ty-fort ${fc}">${g.fortune}</div>
    </div>
    <div style="font-size:11px;color:var(--dim);text-align:center">еҠЁзҲ»пјҡз¬¬${g.dong}зҲ?| ${g.najia.palaceName}</div>`;
}

// ========== жёІжҹ“е…ӯзҲ»зәіз”І ==========
function renderNajia(g) {
  const panel = document.getElementById('najiaPanel'); panel.style.display = '';
  const nj = g.najia;
  let rows = '';
  for (let i = 5; i >= 0; i--) {
    const isDong = (i + 1) === g.dong;
    const isShi = (i + 1) === nj.shi;
    const isYing = (i + 1) === nj.ying;
    const yinYang = g.ben.yao[i] === 1 ? 'в”Ғв”Ғв”? : 'в”?в”?;
    const mark = isShi ? 'дё? : isYing ? 'еә? : '';
    rows += `<tr class="${isDong?'dong-row':''}">
      <td>${['еҲ?,'дә?,'дё?,'еӣ?,'дә?,'е…?][i]}зҲ?/td>
      <td>${yinYang}</td>
      <td>${nj.zhi[i]}</td>
      <td>${nj.relations[i]}</td>
      <td>${nj.spirits[i]}</td>
      <td style="color:var(--gold);font-weight:bold">${mark}</td>
      <td>${isDong?'вҳ?еҠ?:'вҖ?}</td>
    </tr>`;
  }
  document.getElementById('najiaOut').innerHTML = `
    <div style="text-align:center;margin-bottom:10px;font-size:13px;color:var(--sub)">
      ${nj.palaceName}(${nj.palaceWx}) В· дё?{nj.shi}еә?{nj.ying} В· ж—Ҙе№І${nj.ganName}
    </div>
    <table class="najia-table">
      <tr><th>зҲ»дҪҚ</th><th>йҳҙйҳі</th><th>ең°ж”Ҝ</th><th>е…ӯдәІ</th><th>е…ӯзҘһ</th><th>дё–еә”</th><th>еҠ?/th></tr>
      ${rows}
    </table>`;
}

loadCachedIntel('101');
