<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词汇仙途 · 考研英语修炼场</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-deep: #0a0a1a;
  --bg-card: rgba(20,20,50,0.85);
  --bg-glass: rgba(255,255,255,0.04);
  --accent-purple: #a855f7;
  --accent-blue: #6366f1;
  --accent-cyan: #22d3ee;
  --accent-green: #34d399;
  --accent-amber: #fbbf24;
  --accent-rose: #fb7185;
  --accent-orange: #f97316;
  --text-primary: #f0f0ff;
  --text-secondary: rgba(240,240,255,0.6);
  --text-dim: rgba(240,240,255,0.35);
  --glow-purple: 0 0 30px rgba(168,85,247,0.3);
  --glow-cyan: 0 0 30px rgba(34,211,238,0.3);
  --glow-green: 0 0 30px rgba(52,211,153,0.3);
  --glow-amber: 0 0 30px rgba(251,191,36,0.3);
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === BACKGROUND PARTICLES === */
.bg-particles {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(34,211,238,0.05) 0%, transparent 50%);
}

.floating-orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  animation: floatOrb 8s ease-in-out infinite;
}
.floating-orb:nth-child(1) { width:300px;height:300px;top:-50px;left:-80px;background:radial-gradient(circle,rgba(168,85,247,0.08),transparent 70%);animation-duration:10s; }
.floating-orb:nth-child(2) { width:200px;height:200px;bottom:10%;right:-40px;background:radial-gradient(circle,rgba(34,211,238,0.06),transparent 70%);animation-duration:12s;animation-delay:-3s; }
.floating-orb:nth-child(3) { width:250px;height:250px;top:40%;left:50%;background:radial-gradient(circle,rgba(99,102,241,0.05),transparent 70%);animation-duration:14s;animation-delay:-6s; }

@keyframes floatOrb {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(30px,-20px) scale(1.1); }
  66% { transform: translate(-20px,30px) scale(0.9); }
}

/* === MAIN CONTAINER === */
.app-container {
  position: relative; z-index: 1;
  max-width: 520px; margin: 0 auto; padding: 16px;
  min-height: 100vh;
}

/* === HEADER === */
.header {
  text-align: center; padding: 24px 0 16px;
}
.header h1 {
  font-size: 28px; font-weight: 900;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 4px;
  text-shadow: none;
}
.header .subtitle {
  font-size: 13px; color: var(--text-secondary); margin-top: 6px; letter-spacing: 2px;
}

/* === PLAYER STATS BAR === */
.stats-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius); padding: 14px 18px;
  margin-bottom: 16px;
  backdrop-filter: blur(10px);
}
.stat-item { text-align: center; flex: 1; }
.stat-item .stat-label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
.stat-item .stat-value {
  font-size: 20px; font-weight: 700; margin-top: 2px;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.stat-item .stat-value.level-text {
  background: linear-gradient(135deg, var(--accent-amber), var(--accent-orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  font-size: 16px;
}

/* === XP BAR === */
.xp-bar-container {
  margin-bottom: 20px;
}
.xp-bar-bg {
  height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden;
}
.xp-bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 0 12px rgba(168,85,247,0.4);
}
.xp-bar-text {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-dim); margin-top: 4px;
}

/* === MODE CARDS === */
.mode-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-bottom: 20px;
}
.mode-card {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius); padding: 20px 14px;
  text-align: center; cursor: pointer;
  transition: all 0.3s ease;
  position: relative; overflow: hidden;
}
.mode-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.02));
  transition: opacity 0.3s;
}
.mode-card:hover {
  transform: translateY(-3px);
  border-color: rgba(255,255,255,0.12);
}
.mode-card:active { transform: translateY(-1px); }
.mode-card .mode-icon { font-size: 36px; margin-bottom: 10px; display: block; }
.mode-card .mode-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.mode-card .mode-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
.mode-card .mode-badge {
  position: absolute; top: 10px; right: 10px;
  font-size: 10px; padding: 2px 8px; border-radius: 20px;
  background: rgba(168,85,247,0.2); color: var(--accent-purple);
  font-weight: 500;
}

.mode-card.mode-roots { border-color: rgba(168,85,247,0.15); }
.mode-card.mode-roots:hover { box-shadow: var(--glow-purple); border-color: rgba(168,85,247,0.3); }
.mode-card.mode-familiar { border-color: rgba(34,211,238,0.15); }
.mode-card.mode-familiar:hover { box-shadow: var(--glow-cyan); border-color: rgba(34,211,238,0.3); }
.mode-card.mode-journal { border-color: rgba(52,211,153,0.15); }
.mode-card.mode-journal:hover { box-shadow: var(--glow-green); border-color: rgba(52,211,153,0.3); }
.mode-card.mode-spelling { border-color: rgba(251,191,36,0.15); }
.mode-card.mode-spelling:hover { box-shadow: var(--glow-amber); border-color: rgba(251,191,36,0.3); }

/* === SCREENS === */
.screen {
  display: none;
  animation: fadeSlideIn 0.4s ease;
}
.screen.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === GAME SCREEN === */
.game-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.back-btn {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary); border-radius: var(--radius-sm);
  padding: 8px 14px; font-size: 13px; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.back-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
.game-title {
  font-size: 16px; font-weight: 700;
}
.game-progress {
  font-size: 13px; color: var(--text-secondary);
}

/* Score/Lives */
.game-info-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm); padding: 10px 16px;
  margin-bottom: 16px; font-size: 13px;
}
.game-score { color: var(--accent-cyan); font-weight: 700; }
.game-streak { color: var(--accent-amber); }
.game-lives span { color: var(--accent-rose); }

/* Question Card */
.question-card {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius); padding: 28px 22px;
  margin-bottom: 16px;
  text-align: center;
  min-height: 160px;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  position: relative;
  transition: border-color 0.3s;
}
.question-card.correct-flash {
  border-color: var(--accent-green) !important;
  box-shadow: var(--glow-green);
}
.question-card.wrong-flash {
  border-color: var(--accent-rose) !important;
  box-shadow: 0 0 30px rgba(251,113,133,0.3);
  animation: shakeX 0.4s ease;
}
@keyframes shakeX {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.question-word {
  font-size: 32px; font-weight: 900; letter-spacing: 2px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff, rgba(255,255,255,0.8));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.question-roots {
  font-size: 14px; color: var(--accent-purple); margin-bottom: 12px;
  letter-spacing: 1px; font-weight: 500;
}
.question-hint {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  max-width: 90%;
}
.question-sentence {
  font-size: 14px; color: var(--text-secondary); line-height: 1.8;
  margin-top: 10px; font-style: italic;
}
.question-sentence .blank {
  display: inline-block; min-width: 80px;
  border-bottom: 2px dashed var(--accent-cyan);
  color: var(--accent-cyan); font-style: normal; font-weight: 600;
  padding: 0 4px;
}
.question-label {
  font-size: 11px; color: var(--text-dim); letter-spacing: 2px;
  margin-bottom: 12px; text-transform: uppercase;
}

/* Choices */
.choices-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 16px;
}
.choice-btn {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  padding: 14px 12px; font-size: 14px;
  color: var(--text-primary); cursor: pointer;
  transition: all 0.25s; font-family: inherit;
  text-align: center; line-height: 1.4;
}
.choice-btn:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}
.choice-btn.selected-correct {
  background: rgba(52,211,153,0.15) !important;
  border-color: var(--accent-green) !important;
  color: var(--accent-green) !important;
  box-shadow: var(--glow-green);
}
.choice-btn.selected-wrong {
  background: rgba(251,113,133,0.15) !important;
  border-color: var(--accent-rose) !important;
  color: var(--accent-rose) !important;
}
.choice-btn.reveal-correct {
  background: rgba(52,211,153,0.1) !important;
  border-color: rgba(52,211,153,0.4) !important;
  color: var(--accent-green) !important;
}
.choice-btn:disabled { pointer-events: none; }

/* Spelling Input */
.spelling-input-area {
  margin-bottom: 16px; text-align: center;
}
.spelling-input {
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  padding: 14px 18px; font-size: 20px; font-weight: 600;
  color: var(--text-primary); text-align: center;
  width: 100%; max-width: 300px; font-family: inherit;
  letter-spacing: 3px; outline: none;
  transition: border-color 0.3s;
}
.spelling-input:focus {
  border-color: var(--accent-amber);
  box-shadow: var(--glow-amber);
}
.spelling-input.correct { border-color: var(--accent-green) !important; box-shadow: var(--glow-green); }
.spelling-input.wrong { border-color: var(--accent-rose) !important; animation: shakeX 0.4s; }
.spelling-submit {
  margin-top: 12px;
  background: linear-gradient(135deg, var(--accent-amber), var(--accent-orange));
  border: none; border-radius: var(--radius-sm);
  padding: 12px 32px; font-size: 15px; font-weight: 600;
  color: #fff; cursor: pointer; font-family: inherit;
  transition: all 0.3s;
}
.spelling-submit:hover { transform: translateY(-2px); box-shadow: var(--glow-amber); }

.hint-btn {
  background: none; border: 1px solid rgba(251,191,36,0.3);
  color: var(--accent-amber); border-radius: 20px;
  padding: 6px 16px; font-size: 12px; cursor: pointer;
  font-family: inherit; margin-top: 8px; transition: all 0.2s;
}
.hint-btn:hover { background: rgba(251,191,36,0.1); }

/* Explanation Banner */
.explanation {
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.15);
  border-radius: var(--radius-sm);
  padding: 14px 18px; margin-bottom: 16px;
  font-size: 13px; line-height: 1.7; color: var(--text-secondary);
  animation: fadeSlideIn 0.3s ease;
}
.explanation strong { color: var(--accent-cyan); }
.explanation .exp-word { color: var(--accent-purple); font-weight: 700; }

/* Next Button */
.next-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
  border: none; border-radius: var(--radius-sm);
  padding: 14px; font-size: 15px; font-weight: 600;
  color: #fff; cursor: pointer; font-family: inherit;
  transition: all 0.3s;
}
.next-btn:hover { transform: translateY(-2px); box-shadow: var(--glow-purple); }

/* === RESULT SCREEN === */
.result-card {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius); padding: 32px 24px;
  text-align: center; margin-bottom: 16px;
}
.result-icon { font-size: 56px; margin-bottom: 16px; display: block; }
.result-title { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.result-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
.result-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px;
}
.result-stat {
  background: var(--bg-glass); border-radius: var(--radius-sm); padding: 14px 8px;
}
.result-stat .rs-val { font-size: 24px; font-weight: 900; }
.result-stat .rs-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.result-stat.stat-correct .rs-val { color: var(--accent-green); }
.result-stat.stat-wrong .rs-val { color: var(--accent-rose); }
.result-stat.stat-xp .rs-val {
  background: linear-gradient(135deg, var(--accent-amber), var(--accent-orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.result-xp-gain {
  font-size: 14px; color: var(--accent-amber); margin-bottom: 20px; font-weight: 600;
}

/* Review List */
.review-section { margin-top: 20px; text-align: left; }
.review-title { font-size: 14px; font-weight: 700; color: var(--text-secondary); margin-bottom: 10px; }
.review-item {
  background: var(--bg-glass); border-radius: var(--radius-sm);
  padding: 12px 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; border-left: 3px solid var(--accent-green);
}
.review-item.wrong { border-left-color: var(--accent-rose); }
.review-item .ri-word { font-weight: 700; min-width: 90px; }
.review-item .ri-meaning { color: var(--text-secondary); }

/* === LEVEL UP MODAL === */
.level-up-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  display: none; justify-content: center; align-items: center;
  animation: fadeIn 0.3s;
}
.level-up-overlay.show { display: flex; }
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

.level-up-card {
  background: var(--bg-card);
  border: 2px solid var(--accent-amber);
  border-radius: var(--radius); padding: 40px 32px;
  text-align: center; max-width: 340px;
  box-shadow: 0 0 60px rgba(251,191,36,0.2);
  animation: levelPop 0.5s cubic-bezier(0.16,1,0.3,1);
}
@keyframes levelPop {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.level-up-card .lu-icon { font-size: 64px; margin-bottom: 16px; }
.level-up-card .lu-text {
  font-size: 14px; color: var(--accent-amber); letter-spacing: 3px; margin-bottom: 8px;
}
.level-up-card .lu-level { font-size: 28px; font-weight: 900; margin-bottom: 16px; }
.level-up-card .lu-btn {
  background: linear-gradient(135deg, var(--accent-amber), var(--accent-orange));
  border: none; border-radius: var(--radius-sm);
  padding: 12px 32px; font-size: 14px; font-weight: 600;
  color: #fff; cursor: pointer; font-family: inherit;
}

/* === FOOTER === */
.footer {
  text-align: center; padding: 20px 0;
  font-size: 11px; color: var(--text-dim);
}

/* === COMBO ANIMATION === */
.combo-popup {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 48px; font-weight: 900; z-index: 50;
  pointer-events: none; opacity: 0;
  text-shadow: 0 0 30px rgba(251,191,36,0.5);
}
.combo-popup.show {
  animation: comboPop 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes comboPop {
  0% { transform: translate(-50%,-50%) scale(0); opacity:0; }
  30% { transform: translate(-50%,-50%) scale(1.3); opacity:1; }
  100% { transform: translate(-50%,-80%) scale(0.8); opacity:0; }
}

/* === XP FLOAT === */
.xp-float {
  position: fixed; z-index: 50;
  font-size: 18px; font-weight: 700; color: var(--accent-amber);
  pointer-events: none;
  animation: xpFloat 1s ease forwards;
}
@keyframes xpFloat {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-60px); }
}

/* === DAILY STATS === */
.daily-section {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius); padding: 18px;
  margin-bottom: 16px;
}
.daily-title {
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
  margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
}
.daily-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px;
}
.daily-item { text-align: center; }
.daily-item .di-val { font-size: 18px; font-weight: 700; color: var(--text-primary); }
.daily-item .di-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* === RESPONSIVE === */
@media (max-width: 380px) {
  .question-word { font-size: 26px; }
  .choices-grid { gap: 8px; }
  .choice-btn { padding: 12px 10px; font-size: 13px; }
}
</style>
</head>
<body>

<div class="bg-particles"></div>
<div class="floating-orb"></div>
<div class="floating-orb"></div>
<div class="floating-orb"></div>

<div class="combo-popup" id="comboPopup"></div>

<div class="app-container">

  <!-- ============ HOME SCREEN ============ -->
  <div class="screen active" id="homeScreen">
    <div class="header">
      <h1>词 汇 仙 途</h1>
      <div class="subtitle">考研英语 · 201 · 修炼场</div>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-label">境界</div>
        <div class="stat-value level-text" id="levelText">练气期</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">词力</div>
        <div class="stat-value" id="totalXp">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">已修</div>
        <div class="stat-value" id="totalWords">0</div>
      </div>
    </div>

    <div class="xp-bar-container">
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div></div>
      <div class="xp-bar-text">
        <span id="xpCurrent">0</span>
        <span>下一境界: <span id="xpNext">100</span></span>
      </div>
    </div>

    <div class="daily-section">
      <div class="daily-title">📊 今日修炼</div>
      <div class="daily-grid">
        <div class="daily-item"><div class="di-val" id="todayRounds">0</div><div class="di-label">闯关</div></div>
        <div class="daily-item"><div class="di-val" id="todayCorrect">0</div><div class="di-label">正确</div></div>
        <div class="daily-item"><div class="di-val" id="todayStreak">0</div><div class="di-label">最高连击</div></div>
        <div class="daily-item"><div class="di-val" id="todayXp">0</div><div class="di-label">获得词力</div></div>
      </div>
    </div>

    <div class="mode-grid">
      <div class="mode-card mode-roots" onclick="startGame('roots')">
        <span class="mode-icon">🔮</span>
        <div class="mode-name">词根炼丹</div>
        <div class="mode-desc">拆解词根词缀<br>推断超纲词义</div>
        <span class="mode-badge" id="rootsBadge">0 已修</span>
      </div>
      <div class="mode-card mode-familiar" onclick="startGame('familiar')">

  { chinese:"敏感的", word:"sensitive", hint:"sens(感觉) + itive", sentence:"This is a very ___ topic." },
  { chinese:"词汇", word:"vocabulary", hint:"voc(声音/叫) + abul + ary", sentence:"You need to expand your ___." },
];

// ============================================================
//  GAME STATE
// ============================================================

const LEVELS = [
  { name:"练气期", xp:0 },
  { name:"筑基期", xp:100 },
  { name:"金丹期", xp:300 },
  { name:"元婴期", xp:600 },
  { name:"化神期", xp:1000 },
  { name:"合体期", xp:1600 },
  { name:"大乘期", xp:2500 },
  { name:"渡劫期", xp:4000 },
  { name:"仙人境", xp:6000 },
  { name:"大罗金仙", xp:10000 },
];

const QUESTIONS_PER_ROUND = 10;

let state = loadState();
let currentMode = '';
let currentQuestions = [];
let currentIndex = 0;
let roundScore = 0;
let roundStreak = 0;
let maxStreak = 0;
let roundCorrect = 0;
let roundWrong = 0;
let roundLives = 3;
let answered = false;
let roundReview = [];
let hintUsed = false;

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('vocabXiantu'));
    if (s && s.xp !== undefined) return s;
  } catch(e) {}
  return {
    xp: 0,
    totalWords: 0,
    modeStats: { roots:0, familiar:0, journal:0, spelling:0 },
    daily: { date:'', rounds:0, correct:0, streak:0, xp:0 }
  };
}

function saveState() {
  localStorage.setItem('vocabXiantu', JSON.stringify(state));
}

function getLevel(xp) {
  let lv = LEVELS[0];
  for (const l of LEVELS) {
    if (xp >= l.xp) lv = l;
    else break;
  }
  return lv;
}

function getNextLevel(xp) {
  for (const l of LEVELS) {
    if (xp < l.xp) return l;
  }
  return null;
}

function updateHomeUI() {
  const lv = getLevel(state.xp);
  const nlv = getNextLevel(state.xp);
  document.getElementById('levelText').textContent = lv.name;
  document.getElementById('totalXp').textContent = state.xp;
  document.getElementById('totalWords').textContent = state.totalWords;

  if (nlv) {
    const progress = ((state.xp - lv.xp) / (nlv.xp - lv.xp)) * 100;
    document.getElementById('xpBarFill').style.width = progress + '%';
    document.getElementById('xpCurrent').textContent = state.xp + ' 词力';
    document.getElementById('xpNext').textContent = nlv.name + ' (' + nlv.xp + ')';
  } else {
    document.getElementById('xpBarFill').style.width = '100%';
    document.getElementById('xpCurrent').textContent = '已达巅峰';
    document.getElementById('xpNext').textContent = '—';
  }

  document.getElementById('rootsBadge').textContent = state.modeStats.roots + ' 已修';
  document.getElementById('familiarBadge').textContent = state.modeStats.familiar + ' 已修';
  document.getElementById('journalBadge').textContent = state.modeStats.journal + ' 已修';
  document.getElementById('spellingBadge').textContent = state.modeStats.spelling + ' 已修';

  // daily
  const today = new Date().toDateString();
  if (state.daily.date !== today) {
    state.daily = { date: today, rounds:0, correct:0, streak:0, xp:0 };
    saveState();
  }
  document.getElementById('todayRounds').textContent = state.daily.rounds;
  document.getElementById('todayCorrect').textContent = state.daily.correct;
  document.getElementById('todayStreak').textContent = state.daily.streak;
  document.getElementById('todayXp').textContent = state.daily.xp;
}

// ============================================================
//  SCREEN MANAGEMENT
// ============================================================

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  updateHomeUI();
  showScreen('homeScreen');
}

// ============================================================
//  GAME LOGIC
// ============================================================

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length -1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame(mode) {
  currentMode = mode;
  let bank;
  let title;
  switch(mode) {
    case 'roots': bank = WORD_ROOTS; title = '🔮 词根炼丹'; break;
    case 'familiar': bank = WORD_FAMILIAR; title = '👻 熟词幻变'; break;
    case 'journal': bank = WORD_JOURNAL; title = '📜 外刊秘境'; break;
    case 'spelling': bank = WORD_SPELLING; title = '✍️ 笔试炼狱'; break;
  }

  currentQuestions = shuffle(bank).slice(0, QUESTIONS_PER_ROUND);
  currentIndex = 0;
  roundScore = 0;
  roundStreak = 0;
  maxStreak = 0;
  roundCorrect = 0;
  roundWrong = 0;
  roundLives = 3;
  roundReview = [];

  document.getElementById('gameTitle').textContent = title;
  showScreen('gameScreen');
  renderQuestion();
}

function renderQuestion() {
  if (currentIndex >= currentQuestions.length || roundLives <= 0) {
    endRound();
    return;
  }

  answered = false;
  hintUsed = false;
  const q = currentQuestions[currentIndex];
  const card = document.getElementById('questionCard');
  card.className = 'question-card';

  document.getElementById('gameProgress').textContent = (currentIndex+1) + '/' + currentQuestions.length;
  document.getElementById('roundScore').textContent = roundScore;
  document.getElementById('roundStreak').textContent = roundStreak;
  document.getElementById('roundLives').textContent = '❤️'.repeat(roundLives);
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  const choicesGrid = document.getElementById('choicesGrid');
  const spellingArea = document.getElementById('spellingArea');

  if (currentMode === 'spelling') {
    // Spelling mode
    choicesGrid.style.display = 'none';
    spellingArea.style.display = 'block';
    document.getElementById('questionLabel').textContent = '请拼写以下单词';
    document.getElementById('questionWord').textContent = q.chinese;
    document.getElementById('questionRoots').textContent = '';
    document.getElementById('questionHint').textContent = '';
    document.getElementById('questionSentence').innerHTML = '例句：' + q.sentence.replace('___', '<span class="blank">???</span>');
    const input = document.getElementById('spellingInput');
    input.value = '';
    input.className = 'spelling-input';
    input.disabled = false;
    input.focus();
    document.getElementById('spellingSubmit').disabled = false;
    document.getElementById('hintBtn').style.display = '';
  } else {
    // Multiple choice modes
    choicesGrid.style.display = 'grid';
    spellingArea.style.display = 'none';

    if (currentMode === 'roots') {
      document.getElementById('questionLabel').textContent = '词根推断';
      document.getElementById('questionWord').textContent = q.word;
      document.getElementById('questionRoots').textContent = q.roots;
      document.getElementById('questionHint').textContent = '根据词根词缀，推断该词含义：';
      document.getElementById('questionSentence').textContent = '';
    } else if (currentMode === 'familiar') {
      document.getElementById('questionLabel').textContent = '熟词僻义';
      document.getElementById('questionWord').textContent = q.word;
      document.getElementById('questionRoots').textContent = '常见义：' + q.common;
      document.getElementById('questionHint').textContent = '';
      document.getElementById('questionSentence').innerHTML = '在以下语境中，它的意思是？<br><em>"' + q.sentence + '"</em>';
    } else if (currentMode === 'journal') {
      document.getElementById('questionLabel').textContent = '外刊填空';
      document.getElementById('questionWord').textContent = '（' + q.meaning + '）';
      document.getElementById('questionRoots').textContent = '';
      document.getElementById('questionHint').textContent = '选择正确的英文单词填入空格：';
      document.getElementById('questionSentence').innerHTML = q.sentence.replace('___', '<span class="blank">???</span>');
    }

    // render choices
    choicesGrid.innerHTML = '';
    q.choices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c;
      btn.onclick = () => selectChoice(i);
      choicesGrid.appendChild(btn);
    });
  }
}

function selectChoice(idx) {
  if (answered) return;
  answered = true;

  const q = currentQuestions[currentIndex];
  const btns = document.querySelectorAll('.choice-btn');
  const card = document.getElementById('questionCard');
  const isCorrect = idx === q.answer;

  btns.forEach((b,i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('reveal-correct');
    if (i === idx && !isCorrect) b.classList.add('selected-wrong');
    if (i === idx && isCorrect) b.classList.add('selected-correct');
  });

  processAnswer(isCorrect, q);
}

function checkSpelling() {
  if (answered) return;
  const q = currentQuestions[currentIndex];
  const input = document.getElementById('spellingInput');
  const val = input.value.trim().toLowerCase();
  if (!val) return;

  answered = true;
  input.disabled = true;
  document.getElementById('spellingSubmit').disabled = true;

  const isCorrect = val === q.word.toLowerCase();
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  processAnswer(isCorrect, q);
}

function showSpellingHint() {
  if (hintUsed) return;
  hintUsed = true;
  const q = currentQuestions[currentIndex];
  document.getElementById('questionRoots').textContent = '💡 ' + q.hint;
  document.getElementById('hintBtn').style.display = 'none';
}

function processAnswer(isCorrect, q) {
  const card = document.getElementById('questionCard');
  const expEl = document.getElementById('explanation');

  if (isCorrect) {
    card.classList.add('correct-flash');
    roundStreak++;
    if (roundStreak > maxStreak) maxStreak = roundStreak;
    let pts = 10;
    if (roundStreak >= 3) pts += Math.min(roundStreak * 2, 20);
    if (currentMode === 'spelling' && !hintUsed) pts += 5;
    roundScore += pts;
    roundCorrect++;
    roundReview.push({ word: q.word, meaning: getMeaning(q), correct: true });

    showXpFloat('+' + pts);
    if (roundStreak >= 3) showCombo(roundStreak);
  } else {
    card.classList.add('wrong-flash');
    roundStreak = 0;
    roundLives--;
    roundWrong++;
    roundReview.push({ word: q.word, meaning: getMeaning(q), correct: false });
    document.getElementById('roundLives').textContent = '❤️'.repeat(Math.max(0,roundLives));
  }

  // Show explanation
  let expHTML = '';
  if (currentMode === 'roots') {
    expHTML = `<span class="exp-word">${q.word}</span>：${q.meaning}<br><strong>词根解析</strong>：${q.roots}`;
  } else if (currentMode === 'familiar') {
    expHTML = `<span class="exp-word">${q.word}</span><br>常见义：${q.common}<br><strong>考研义</strong>：${q.rare}<br>例：${q.sentence}`;
  } else if (currentMode === 'journal') {
    expHTML = `<span class="exp-word">${q.word}</span>：${q.meaning}<br>例：${q.sentence.replace('___', '<strong>' + q.word + '</strong>')}`;
  } else if (currentMode === 'spelling') {
    expHTML = `正确拼写：<span class="exp-word">${q.word}</span><br>含义：${q.chinese}<br>记忆：${q.hint}`;
  }
  expEl.innerHTML = expHTML;
  expEl.style.display = 'block';

  document.getElementById('roundScore').textContent = roundScore;
  document.getElementById('roundStreak').textContent = roundStreak;

  document.getElementById('nextBtn').style.display = 'block';
}

function getMeaning(q) {
  if (currentMode === 'roots') return q.meaning;
  if (currentMode === 'familiar') return q.rare;
  if (currentMode === 'journal') return q.meaning;
  if (currentMode === 'spelling') return q.chinese;
  return '';
}

function nextQuestion() {
  currentIndex++;
  renderQuestion();
}

function endRound() {
  const oldLevel = getLevel(state.xp);

  // update state
  state.xp += roundScore;
  state.totalWords += roundCorrect;
  state.modeStats[currentMode] += roundCorrect;

  const today = new Date().toDateString();
  if (state.daily.date !== today) {
    state.daily = { date: today, rounds:0, correct:0, streak:0, xp:0 };
  }
  state.daily.rounds++;
  state.daily.correct += roundCorrect;
  if (maxStreak > state.daily.streak) state.daily.streak = maxStreak;
  state.daily.xp += roundScore;

  saveState();

  // Check level up
  const newLevel = getLevel(state.xp);
  if (newLevel.name !== oldLevel.name) {
    setTimeout(() => {
      document.getElementById('luLevel').textContent = newLevel.name;
      document.getElementById('levelUpOverlay').classList.add('show');
    }, 500);
  }

  // Render result
  const rate = currentQuestions.length > 0 ? Math.round((roundCorrect / (roundCorrect + roundWrong)) * 100) : 0;
  let icon='🎉', title='修炼完成', subtitle='';
  if (rate >= 90) { icon='🌟'; title='完美修炼！'; subtitle='距离飞升又近了一步'; }
  else if (rate >= 70) { icon='✨'; title='修炼有成'; subtitle='继续精进'; }
  else if (rate >= 50) { icon='💪'; title='尚需磨练'; subtitle='多加复习即可突破'; }
  else { icon='📖'; title='道阻且长'; subtitle='建议回顾错题再战'; }

  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSubtitle').textContent = subtitle;
  document.getElementById('resultCorrect').textContent = roundCorrect;
  document.getElementById('resultWrong').textContent = roundWrong;
  document.getElementById('resultXp').textContent = '+' + roundScore;
  document.getElementById('resultXpGain').textContent = '连击最高 ' + maxStreak + ' · 正确率 ' + rate + '%';

  // Review list
  const reviewSection = document.getElementById('reviewSection');
  let reviewHTML = '<div class="review-title">📝 本轮回顾</div>';
  roundReview.forEach(r => {
    reviewHTML += `<div class="review-item ${r.correct?'':'wrong'}">
      <span class="ri-word">${r.word}</span>
      <span class="ri-meaning">${r.meaning}</span>
    </div>`;
  });
  reviewSection.innerHTML = reviewHTML;

  showScreen('resultScreen');
}

function closeLevelUp() {
  document.getElementById('levelUpOverlay').classList.remove('show');
}

// ============================================================
//  EFFECTS
// ============================================================

function showXpFloat(text) {
  const el = document.createElement('div');
  el.className = 'xp-float';
  el.textContent = text;
  el.style.left = (window.innerWidth / 2 - 20) + 'px';
  el.style.top = (window.innerHeight / 2 - 40) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function showCombo(n) {
  const el = document.getElementById('comboPopup');
  el.textContent = '🔥 ' + n + '连击！';
  el.className = 'combo-popup show';
  setTimeout(() => { el.className = 'combo-popup'; }, 800);
}

// ============================================================
//  KEYBOARD SUPPORT
// ============================================================

document.addEventListener('keydown', e => {
  if (document.getElementById('gameScreen').classList.contains('active')) {
    if (currentMode === 'spelling') {
      if (e.key === 'Enter') {
        if (answered) nextQuestion();
        else checkSpelling();
      }
    } else {
      if (!answered && e.key >= '1' && e.key <= '4') {
        selectChoice(parseInt(e.key) - 1);
      }
      if (answered && (e.key === 'Enter' || e.key === ' ')) {
        e.preventDefault();
        nextQuestion();
      }
    }
  }
});

// ============================================================
//  INIT
// ============================================================

updateHomeUI();
</script>
