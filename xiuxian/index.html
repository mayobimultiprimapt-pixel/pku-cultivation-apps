.tool-box input:focus,.tool-box textarea:focus{border-color:var(--g)}

.ai-out{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px;font-size:13px;line-height:2;white-space:pre-wrap;max-height:60vh;overflow-y:auto;margin-top:8px}

// ======== MEIHUA ENGINE ========
function calcGua(u,l,d){
  u=((u%8)+8)%8;l=((l%8)+8)%8;d=d<1?1:(d>6?6:d);
  var bu=BY[u],bl=BY[l],ben=[...bl,...bu];
  var hu=[ben[1],ben[2],ben[3],ben[2],ben[3],ben[4]];
  var bian=[...ben];bian[d-1]=bian[d-1]?0:1;
  function y2n(y){for(var i=0;i<8;i++)if(BY[i][0]===y[0]&&BY[i][1]===y[1]&&BY[i][2]===y[2])return i;return 0}
  var un=BN[u],ln=BN[l];
  var hui=y2n(hu.slice(3)),hli=y2n(hu.slice(0,3));
  var bni=y2n(bian.slice(3)),bli=y2n(bian.slice(0,3));
  return{upper:u,lower:l,dong:d,ben:ben,hu:hu,bian:bian,benName:GN64[un+ln]||un+ln,huName:GN64[BN[hui]+BN[hli]]||BN[hui]+BN[hli],bianName:GN64[BN[bni]+BN[bli]]||BN[bni]+BN[bli],upperName:un,lowerName:ln,tiWX:BW[l],yongWX:BW[u],tiName:ln,yongName:un};
}
function wxRel(ti,yong){
  var wx=['金','水','木','火','土'],sh={金:'水',水:'木',木:'火',火:'土',土:'金'},ke={金:'木',水:'火',木:'土',火:'金',土:'水'};
  if(ti===yong)return'比和·吉（平稳）';if(sh[ti]===yong)return'体生用·小凶（耗泄）';if(sh[yong]===ti)return'用生体·大吉（得助）';if(ke[ti]===yong)return'体克用·小吉（有得）';if(ke[yong]===ti)return'用克体·大凶（受制）';return'比和·中平';
}
function yaoHTML(yao,dong){var h='';for(var i=5;i>=0;i--){var c=yao[i]===1?'yang':'yin';var dm=(i+1)===dong?' dong':'';h+='<div class="yao '+c+dm+'"></div>'}return h}

async function doMH(){
  var q=document.getElementById('mh_q').value||'求问天机';
  var now=new Date(),u,l,d,info;
  if(curMethod==='datetime'){var y=now.getFullYear(),m=now.getMonth()+1,dd=now.getDate(),hh=now.getHours();u=(y+m+dd)%8||8;l=(y+m+dd+hh)%8||8;d=(y+m+dd+hh)%6||6;info='时间卦：'+y+'年'+m+'月'+dd+'日'+hh+'时'}
  else if(curMethod==='numbers'){u=parseInt(document.getElementById('mh_n1')?.value)||~~(Math.random()*8+1);l=parseInt(document.getElementById('mh_n2')?.value)||~~(Math.random()*8+1);d=(u+l)%6||6;info='报数卦：'+u+'、'+l}
  else{var txt=document.getElementById('mh_txt')?.value||'天机';var s=0;for(var i=0;i<txt.length;i++)s+=txt.charCodeAt(i);u=s%8||8;l=(s+txt.length)%8||8;d=(s*txt.length)%6||6;info='文字卦：'+txt}
  var g=calcGua(u-1,l-1,d),wr=wxRel(g.tiWX,g.yongWX);
  document.getElementById('mh_result').innerHTML='<div class="gua-display"><div style="font-size:10px;color:var(--cy);margin-bottom:6px">'+info+'</div><div class="gua-row"><div class="gua-box"><div class="gua-lbl">本卦</div>'+yaoHTML(g.ben,g.dong)+'<div class="gua-nm">'+g.benName+'</div></div><div class="gua-box"><div class="gua-lbl">互卦</div>'+yaoHTML(g.hu,0)+'<div class="gua-nm">'+g.huName+'</div></div><div class="gua-box"><div class="gua-lbl">变卦</div>'+yaoHTML(g.bian,0)+'<div class="gua-nm">'+g.bianName+'</div></div></div><div class="ty-box">体：'+g.tiName+'('+g.tiWX+') ｜ 用：'+g.yongName+'('+g.yongWX+')<br><strong style="color:var(--g)">'+wr+'</strong><br>动爻：第'+g.dong+'爻</div></div>';

    var r=await callDS(prompt);aiBox.textContent=r;saveLog('mh',q,info+' → '+g.benName,r);
  }catch(e){aiBox.textContent='解卦失败：'+e.message}
}

// ======== LOG ========
function saveLog(art,q,info,result){
  var logs=JSON.parse(localStorage.getItem('ss_logs')||'[]');
  logs.unshift({art:art,q:q,info:info,result:result.substring(0,300),time:new Date().toLocaleString(),ts:Date.now()});
  if(logs.length>50)logs=logs.slice(0,50);
  localStorage.setItem('ss_logs',JSON.stringify(logs));
  if(curArt)renderLog(curArt._id);
}
function renderLog(id){
  var logs=JSON.parse(localStorage.getItem('ss_logs')||'[]').filter(l=>l.art===id);
  var area=document.getElementById('logArea');

}
